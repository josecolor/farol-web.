<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redacción | El Farol al Día</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#0b0b0b; color:#fff; font-family:'Segoe UI',sans-serif; line-height:1.6; padding:20px; }
        .container { max-width:800px; margin:0 auto; background:#1a1a1a; border-radius:16px; padding:30px; border-left:4px solid #FF8C00; box-shadow:0 10px 30px rgba(255,140,0,0.2); }
        h1 { color:#FF8C00; margin-bottom:20px; font-size:2.2em; text-align:center; }
        label { display:block; margin:20px 0 8px; color:#FF8C00; font-weight:bold; font-size:1.1em; }
        input, select, textarea { width:100%; padding:14px 16px; border-radius:12px; border:2px solid #333; background:#222; color:white; font-size:1em; transition:all 0.3s; }
        input:focus, select:focus, textarea:focus { outline:none; border-color:#FF8C00; background:#2a2a2a; }
        textarea { min-height:150px; resize:vertical; }
        .file-area { border:2px dashed #FF8C00; border-radius:12px; padding:30px; text-align:center; background:#222; margin:15px 0; cursor:pointer; transition:background 0.3s; }
        .file-area:hover { background:#2a2a2a; }
        .file-area span { display:block; font-size:1.2em; color:#FF8C00; margin-bottom:10px; }
        .file-area small { color:#888; }
        #preview, #fotoRedactorPreview { width:100%; max-height:300px; object-fit:cover; border-radius:12px; margin-top:15px; display:none; border:2px solid #FF8C00; }
        .foto-redactor-preview { width:70px; height:70px; border-radius:50%; object-fit:cover; border:3px solid #FF8C00; display:none; }
        .foto-redactor-placeholder { width:70px; height:70px; border-radius:50%; background:#222; border:3px dashed #FF8C00; display:flex; align-items:center; justify-content:center; color:#FF8C00; cursor:pointer; }
        .pin-input { background:#222; border:2px solid #FF8C00; color:white; font-size:1.5em; letter-spacing:4px; text-align:center; }
        button { width:100%; padding:18px; background:linear-gradient(145deg, #FF8C00, #ffaa33); color:black; border:none; border-radius:40px; font-size:1.3em; font-weight:bold; margin:10px 0; cursor:pointer; transition:0.2s; text-transform:uppercase; letter-spacing:1px; }
        button:hover { transform:translateY(-2px); box-shadow:0 8px 20px rgba(255,140,0,0.6); }
        button:disabled { opacity:0.6; transform:none; }
        .alert { padding:15px; border-radius:40px; margin:20px 0; text-align:center; font-weight:bold; display:none; }
        .alert.success { background:rgba(76,175,80,0.2); border:2px solid #4CAF50; color:#4CAF50; }
        .alert.error { background:rgba(244,67,54,0.2); border:2px solid #f44336; color:#ff6b6b; }
        .info { color:#888; font-size:0.9em; margin-top:5px; }
        hr { border:1px solid #333; margin:30px 0; }
        .stats { background:#222; padding:15px; border-radius:12px; margin-bottom:20px; }
        .programacion { background:#222; border-radius:12px; padding:20px; margin:20px 0; border:1px solid #FF8C00; }
        .radio-group { display:flex; gap:20px; margin:10px 0; }
        .radio-group label { display:flex; align-items:center; gap:5px; color:white; font-weight:normal; }
        .fecha-input { background:#333; border:2px solid #FF8C00; color:white; padding:10px; border-radius:8px; width:100%; }
        @media (max-width:600px) { .container { padding:20px; } h1 { font-size:1.8em; } }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏮 Redacción del Búnker</h1>
        <div id="alert" class="alert"></div>

        <form id="formulario">
            <label>📰 Sección</label>
            <select id="seccion" required>
                <option value="">-- Selecciona una sección --</option>
                <option value="Nacionales">🇩🇴 Nacionales</option>
                <option value="Deportes">⚽ Deportes</option>
                <option value="Internacionales">🌍 Internacionales</option>
                <option value="Espectáculos">🎬 Espectáculos</option>
                <option value="Economía">💼 Economía</option>
            </select>

            <label>📝 Título</label>
            <input type="text" id="titulo" placeholder="Ej: ¡Fuego en el terreno de juego!" required maxlength="200">

            <label>✍️ Contenido</label>
            <textarea id="contenido" placeholder="Escribe la noticia aquí..." required maxlength="5000"></textarea>

            <label>🎬 Imagen de la noticia (opcional)</label>
            <div class="file-area" id="fileArea">
                <span>📸 + 🎥</span>
                <small>Toca para elegir una imagen o video (MP4)</small>
            </div>
            <input type="file" id="multimedia" accept="image/*,video/mp4" style="display: none;">
            <img id="preview" src="#" alt="Vista previa">
            <div id="fileInfo" class="info"></div>

            <hr style="border-color:#FF8C00;">
            <h2 style="color:#FF8C00;">👤 Datos del periodista</h2>

            <label>Nombre del redactor</label>
            <input type="text" id="redactor" value="mxl" placeholder="Ej: José Gregorio">

            <label>Foto del periodista (opcional)</label>
            <div style="display: flex; align-items: center; gap: 15px;">
                <img id="fotoRedactorPreview" class="foto-redactor-preview" src="#" alt="Foto periodista">
                <div id="fotoRedactorPlaceholder" class="foto-redactor-placeholder" onclick="document.getElementById('fotoRedactorInput').click()">
                    📸
                </div>
                <input type="file" id="fotoRedactorInput" accept="image/*" style="display: none;">
                <div class="info" id="fotoRedactorInfo">Toca para añadir foto</div>
            </div>

            <hr style="border-color:#FF8C00;">
            <h2 style="color:#FF8C00;">🔍 SEO de la noticia (opcional)</h2>

            <label>📌 Título para SEO</label>
            <input type="text" id="seoTitle" placeholder="Si lo dejas vacío, se usará el título normal">

            <label>📝 Descripción para SEO</label>
            <textarea id="seoDesc" placeholder="Máximo 160 caracteres" maxlength="160"></textarea>

            <label>🏷️ Palabras clave (separadas por comas)</label>
            <input type="text" id="seoKeywords" placeholder="ej: accidente, tránsito, santo domingo">

            <hr style="border-color:#FF8C00;">
            <h2 style="color:#FF8C00;">📅 Programación</h2>
            <div class="programacion">
                <div class="radio-group">
                    <label>
                        <input type="radio" name="tipoPublicacion" value="ahora" checked> Publicar ahora
                    </label>
                    <label>
                        <input type="radio" name="tipoPublicacion" value="programar"> Programar para más tarde
                    </label>
                </div>
                <div id="campoFecha" style="display: none;">
                    <label>Fecha y hora de publicación</label>
                    <input type="datetime-local" id="fechaProgramada" class="fecha-input">
                </div>
            </div>

            <hr style="border-color:#FF8C00;">
            <h2 style="color:#FF8C00;">📊 Google Analytics</h2>
            <label>ID de Analytics (ej: G-XXXXXXXX)</label>
            <input type="text" id="analyticsId" placeholder="G-XXXXXXXX" value="">
            <button type="button" id="btnGuardarAnalytics" style="background:#FF8C00; color:black;">Guardar Analytics</button>

            <hr style="border-color:#FF8C00;">
            <h2 style="color:#FF8C00;">📈 Estadísticas rápidas</h2>
            <div id="stats" class="stats">Cargando...</div>

            <label>🔐 PIN</label>
            <input type="password" id="pin" class="pin-input" placeholder="311" maxlength="6" required>

            <button type="submit" id="btnPublicar">🚀 PUBLICAR / PROGRAMAR</button>
        </form>
    </div>

    <script>
        // Elementos del DOM
        const form = document.getElementById('formulario');
        const btn = document.getElementById('btnPublicar');
        const alertDiv = document.getElementById('alert');
        const fileArea = document.getElementById('fileArea');
        const fileInput = document.getElementById('multimedia');
        const preview = document.getElementById('preview');
        const fileInfo = document.getElementById('fileInfo');
        const fotoInput = document.getElementById('fotoRedactorInput');
        const fotoPreview = document.getElementById('fotoRedactorPreview');
        const fotoPlaceholder = document.getElementById('fotoRedactorPlaceholder');
        const fotoInfo = document.getElementById('fotoRedactorInfo');
        const radioAhora = document.querySelector('input[value="ahora"]');
        const radioProgramar = document.querySelector('input[value="programar"]');
        const campoFecha = document.getElementById('campoFecha');
        const fechaInput = document.getElementById('fechaProgramada');

        radioProgramar.addEventListener('change', () => campoFecha.style.display = 'block');
        radioAhora.addEventListener('change', () => campoFecha.style.display = 'none');

        let imagenBase64 = "";
        let fotoRedactorBase64 = "";

        fileArea.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            fileInfo.textContent = '⏳ Comprimiendo...';
            if (file.type.startsWith('video/')) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    imagenBase64 = e.target.result;
                    preview.src = imagenBase64;
                    preview.style.display = 'block';
                    fileInfo.textContent = `✅ Video listo (${(imagenBase64.length / (1024*1024)).toFixed(2)} MB)`;
                };
                reader.readAsDataURL(file);
            } else {
                try {
                    imagenBase64 = await comprimirImagen(file, 720);
                    preview.src = imagenBase64;
                    preview.style.display = 'block';
                    fileInfo.textContent = `✅ Imagen lista (${(imagenBase64.length / (1024*1024)).toFixed(2)} MB)`;
                } catch (err) {
                    fileInfo.textContent = '❌ Error al comprimir la imagen';
                }
            }
        });

        fotoInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            fotoInfo.textContent = '⏳ Comprimiendo...';
            try {
                fotoRedactorBase64 = await comprimirImagen(file, 150);
                fotoPreview.src = fotoRedactorBase64;
                fotoPreview.style.display = 'block';
                fotoPlaceholder.style.display = 'none';
                fotoInfo.textContent = '✅ Foto lista';
            } catch (err) {
                fotoInfo.textContent = '❌ Error al comprimir la foto';
            }
        });

        function comprimirImagen(file, maxWidth) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        if (width > maxWidth) {
                            height = (height * maxWidth) / width;
                            width = maxWidth;
                        }
                        canvas.width = width;
                        canvas.height = height;
                        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                        canvas.toBlob((blob) => {
                            const reader2 = new FileReader();
                            reader2.onload = () => resolve(reader2.result);
                            reader2.readAsDataURL(blob);
                        }, 'image/webp', 0.8);
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const titulo = document.getElementById('titulo').value.trim();
            const seccion = document.getElementById('seccion').value;
            const contenido = document.getElementById('contenido').value.trim();
            const redactor = document.getElementById('redactor').value.trim() || 'mxl';
            const pin = document.getElementById('pin').value.trim();

            if (!titulo || !seccion || !contenido) {
                mostrarAlerta('❌ Faltan campos obligatorios', 'error');
                return;
            }
            if (pin !== '311') {
                mostrarAlerta('❌ PIN incorrecto', 'error');
                return;
            }

            let fechaProgramada = null;
            if (radioProgramar.checked) {
                fechaProgramada = fechaInput.value;
                if (!fechaProgramada) {
                    mostrarAlerta('❌ Debes seleccionar una fecha para programar', 'error');
                    return;
                }
            }

            btn.disabled = true;
            btn.textContent = '⏳ PROCESANDO...';

            const noticia = {
                pin,
                titulo,
                seccion,
                contenido,
                ubicacion: '',
                redactor,
                redactorFoto: fotoRedactorBase64 || null,
                imagen: imagenBase64 || null,
                seoTitle: document.getElementById('seoTitle').value.trim() || undefined,
                seoDesc: document.getElementById('seoDesc').value.trim() || undefined,
                seoKeywords: document.getElementById('seoKeywords').value.trim() || undefined,
                fechaProgramada: fechaProgramada || undefined
            };

            try {
                const res = await fetch('/api/publicar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(noticia)
                });
                const data = await res.json();
                if (data.success) {
                    mostrarAlerta(data.message, 'success');
                    form.reset();
                    preview.style.display = 'none';
                    fotoPreview.style.display = 'none';
                    fotoPlaceholder.style.display = 'flex';
                    imagenBase64 = '';
                    fotoRedactorBase64 = '';
                    fileInfo.textContent = '';
                    fotoInfo.textContent = 'Toca para añadir foto';
                    campoFecha.style.display = 'none';
                    radioAhora.checked = true;
                    if (data.message.includes('programada')) {
                        setTimeout(() => window.location.reload(), 2000);
                    } else {
                        setTimeout(() => window.location.href = '/', 2000);
                    }
                } else {
                    mostrarAlerta('❌ Error: ' + data.error, 'error');
                }
            } catch (error) {
                mostrarAlerta('❌ Error de conexión', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = '🚀 PUBLICAR / PROGRAMAR';
            }
        });

        function mostrarAlerta(mensaje, tipo) {
            alertDiv.textContent = mensaje;
            alertDiv.className = `alert ${tipo}`;
            alertDiv.style.display = 'block';
            setTimeout(() => alertDiv.style.display = 'none', 4000);
        }

        (async function() {
            const res = await fetch('/api/configuracion');
            const data = await res.json();
            if (data.success && data.config.googleAnalytics) {
                document.getElementById('analyticsId').value = data.config.googleAnalytics;
            }
        })();

        document.getElementById('btnGuardarAnalytics').addEventListener('click', async () => {
            const pin = document.getElementById('pin').value.trim();
            if (pin !== '311') {
                mostrarAlerta('❌ PIN incorrecto', 'error');
                return;
            }
            const googleAnalytics = document.getElementById('analyticsId').value;
            const res = await fetch('/api/configuracion', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ pin, googleAnalytics })
            });
            const data = await res.json();
            if (data.success) {
                mostrarAlerta('✅ Analytics guardado', 'success');
            } else {
                mostrarAlerta('❌ Error: ' + data.error, 'error');
            }
        });

        (async function() {
            try {
                const res = await fetch('/api/estadisticas');
                const data = await res.json();
                if (data.success) {
                    document.getElementById('stats').innerHTML = `
                        <p>📰 Noticias publicadas: <strong>${data.totalNoticias}</strong></p>
                        <p>👁️ Vistas totales: <strong>${data.totalVistas}</strong></p>
                    `;
                } else {
                    document.getElementById('stats').innerHTML = '<p>Error al cargar estadísticas</p>';
                }
            } catch (e) {
                document.getElementById('stats').innerHTML = '<p>Error al cargar estadísticas</p>';
            }
        })();
    </script>
</body>
</html>
