<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redacción | El Farol al Día</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 500px;
            background: #1a1a1a;
            padding: 30px;
            border-radius: 15px;
            border-top: 4px solid #ff9800;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 {
            color: #ff9800;
            text-align: center;
            margin-bottom: 10px;
            font-size: 1.8rem;
        }
        p.subtitle {
            text-align: center;
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }
        label {
            display: block;
            margin-bottom: 10px;
            color: #ff9800;
            font-weight: bold;
        }
        select {
            width: 100%;
            padding: 12px;
            background: #252525;
            border: 1px solid #333;
            color: #fff;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 1rem;
        }
        button {
            width: 100%;
            padding: 15px;
            background: #ff9800;
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }
        button:hover {
            background: #e68a00;
            transform: translateY(-2px);
        }
        button:disabled {
            background: #555;
            cursor: not-allowed;
        }
        .alert {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            display: none;
            font-weight: bold;
        }
        .alert.success { display: block; background: rgba(76, 175, 80, 0.2); color: #4caf50; border: 1px solid #4caf50; }
        .alert.error { display: block; background: rgba(244, 67, 54, 0.2); color: #f44336; border: 1px solid #f44336; }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 25px;
            color: #888;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .back-link:hover { color: #ff9800; }
    </style>
</head>
<body>

<div class="container">
    <h1>🏮 Redacción IA</h1>
    <p class="subtitle">El Farol al Día - Panel de Control</p>
    
    <label>Sección de la noticia:</label>
    <select id="categoriaIA">
        <option value="">-- Selecciona una categoría --</option>
        <option value="Nacionales">🏛️ Nacionales</option>
        <option value="Deportes">⚽ Deportes</option>
        <option value="Internacionales">🌍 Internacionales</option>
        <option value="Economía">💼 Economía</option>
        <option value="Tecnología">💻 Tecnología</option>
        <option value="Espectáculos">🎬 Espectáculos</option>
    </select>

    <button id="btnGenerar">🤖 Generar Noticia Ahora</button>

    <div id="resultado" class="alert"></div>

    <a href="/" class="back-link">← Volver al Periódico</a>
</div>

<script>
    const btn = document.getElementById('btnGenerar');
    const resDiv = document.getElementById('resultado');

    btn.addEventListener('click', async () => {
        const categoria = document.getElementById('categoriaIA').value;
        
        if (!categoria) {
            resDiv.textContent = "⚠️ Elige una categoría primero";
            resDiv.className = "alert error";
            return;
        }

        btn.disabled = true;
        btn.textContent = "⏳ Escribiendo noticia...";
        resDiv.style.display = "none";

        try {
            const response = await fetch('/api/generar-noticia', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ categoria })
            });

            const data = await response.json();

            if (data.success) {
                resDiv.innerHTML = `✅ Publicada: <br> <small>${data.titulo}</small>`;
                resDiv.className = "alert success";
            } else {
                resDiv.textContent = "❌ Error: " + data.error;
                resDiv.className = "alert error";
            }
        } catch (e) {
            resDiv.textContent = "❌ Error de conexión con el servidor";
            resDiv.className = "alert error";
        } finally {
            btn.disabled = false;
            btn.textContent = "🤖 Generar Noticia Ahora";
        }
    });
</script>

</body>
</html>
