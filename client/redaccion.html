<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Búnker de Redacción 🏮 | Admin</title>
    <style>
        :root {
            --naranja: #FF8C00;
            --negro: #0b0b0b;
            --gris: #1a1a1a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--negro);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 15px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--naranja);
            padding-bottom: 10px;
        }

        .tab-btn {
            padding: 10px 20px;
            background: transparent;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
            font-size: 0.9em;
        }

        .tab-btn.active {
            color: var(--naranja);
            border-bottom-color: var(--naranja);
        }

        .tab-btn:hover {
            color: var(--naranja);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .panel {
            background: var(--gris);
            padding: 20px;
            border-radius: 25px;
            border: 2px solid var(--naranja);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--naranja);
        }

        h2 {
            color: var(--naranja);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 1.6em;
        }

        .subtitle {
            color: #aaa;
            font-size: 0.85em;
            margin-top: 5px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--naranja);
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9em;
        }

        input[type="text"],
        input[type="password"],
        input[type="file"],
        textarea,
        select {
            width: 100%;
            padding: 12px 15px;
            border-radius: 12px;
            border: 1px solid #333;
            background: #222;
            color: white;
            font-size: 1em;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="password"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: var(--naranja);
            box-shadow: 0 0 10px rgba(255, 140, 0, 0.3);
            background: #2a2a2a;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        select {
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2'%3e%3cpath d='M6 9l6 6 6-6'/%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 12px center;
            background-size: 20px;
            padding-right: 40px;
        }

        .file-label {
            display: block;
            background: #333;
            color: white;
            padding: 15px;
            text-align: center;
            border-radius: 12px;
            cursor: pointer;
            border: 2px dashed var(--naranja);
            margin-bottom: 10px;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .file-label:hover {
            background: #404040;
            border-color: #ff9d1f;
        }

        #preview, #previewEditar {
            width: 100%;
            max-height: 300px;
            margin-top: 10px;
            border-radius: 12px;
            display: none;
            border: 1px solid #444;
            object-fit: cover;
        }

        #previewVideo, #previewVideoEditar {
            width: 100%;
            max-height: 300px;
            margin-top: 10px;
            border-radius: 12px;
            display: none;
            border: 1px solid #444;
        }

        .file-info {
            font-size: 0.85em;
            color: #888;
            margin-top: 5px;
        }

        .char-count {
            font-size: 0.8em;
            color: #888;
            margin-top: 4px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-publicar, .btn-actualizar, .btn-eliminar, .btn-limpiar {
            flex: 1;
            border: none;
            padding: 16px;
            border-radius: 50px;
            font-weight: 900;
            font-size: 1em;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .btn-publicar {
            background: linear-gradient(135deg, var(--naranja), #ff6b35);
            color: white;
        }

        .btn-publicar:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 140, 0, 0.6);
        }

        .btn-actualizar {
            background: #4CAF50;
            color: white;
        }

        .btn-actualizar:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(76, 175, 80, 0.6);
        }

        .btn-eliminar {
            background: #f44336;
            color: white;
        }

        .btn-eliminar:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(244, 67, 54, 0.6);
        }

        .btn-limpiar {
            background: #666;
            color: white;
        }

        .btn-limpiar:hover:not(:disabled) {
            transform: translateY(-2px);
        }

        .loader {
            display: none;
            text-align: center;
            color: var(--naranja);
            font-weight: bold;
            margin-top: 15px;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .alert {
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 15px;
            display: none;
            border-left: 4px solid;
        }

        .alert.success {
            background: rgba(76, 175, 80, 0.1);
            border-left-color: #4caf50;
            color: #4caf50;
        }

        .alert.error {
            background: rgba(244, 67, 54, 0.1);
            border-left-color: #f44336;
            color: #ff6b6b;
        }

        .info-box {
            background: #2a4a2a;
            border: 1px solid #4caf50;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            color: #4caf50;
            font-size: 0.9em;
        }

        @media (max-width: 480px) {
            .panel {
                padding: 15px;
            }

            h2 {
                font-size: 1.3em;
            }

            .button-group {
                flex-direction: column;
            }

            .btn-publicar, .btn-actualizar, .btn-eliminar, .btn-limpiar {
                font-size: 0.9em;
                padding: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- TABS -->
        <div class="tabs">
            <button class="tab-btn active" id="btnPublicar" onclick="cambiarTab('publicar')">🚀 Publicar Nueva</button>
            <button class="tab-btn" id="btnEditar" onclick="cambiarTab('editar')">✏️ Editar</button>
        </div>

        <!-- TAB 1: PUBLICAR NUEVA -->
        <div id="tab-publicar" class="tab-content active">
            <div class="panel">
                <div class="header">
                    <h2>🏮 PUBLICAR NOTICIA</h2>
                    <p class="subtitle">Redacción Multimedia Profesional</p>
                </div>

                <div id="alert" class="alert"></div>

                <form id="formulario" onsubmit="event.preventDefault(); publicarNoticia();">
                    <div class="form-group">
                        <label for="seccion">📰 SECCIÓN *</label>
                        <select id="seccion" required>
                            <option value="">-- Selecciona una sección --</option>
                            <option value="Nacionales">🇩🇴 Nacionales</option>
                            <option value="Deportes">⚽ Deportes</option>
                            <option value="Internacionales">🌍 Internacionales</option>
                            <option value="Espectáculos">🎬 Espectáculos</option>
                            <option value="Economía">💼 Economía</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="titulo">📝 TÍTULO *</label>
                        <input type="text" id="titulo" placeholder="Título principal" maxlength="200" required>
                        <div class="char-count"><span id="tituloCount">0</span>/200</div>
                    </div>

                    <div class="form-group">
                        <label for="redactor">👤 REDACTOR</label>
                        <input type="text" id="redactor" value="mxl" placeholder="Tu nombre" maxlength="50">
                    </div>

                    <div class="form-group">
                        <label for="ubicacion">📍 UBICACIÓN</label>
                        <input type="text" id="ubicacion" placeholder="Ej: Santo Domingo Este" maxlength="100">
                    </div>

                    <div class="form-group">
                        <label for="contenido">✍️ CONTENIDO *</label>
                        <textarea id="contenido" placeholder="Cuerpo de la noticia" maxlength="5000" required></textarea>
                        <div class="char-count"><span id="contenidoCount">0</span>/5000</div>
                    </div>

                    <div class="form-group">
                        <label>🎬 MULTIMEDIA (Video MP4 o Imagen)</label>
                        <label class="file-label" for="multimedia" id="labelMultimedia">
                            🎥 TOCA PARA SUBIR VIDEO O IMAGEN
                        </label>
                        <input type="file" id="multimedia" accept="video/mp4,image/*" style="display: none;">
                        <img id="preview">
                        <video id="previewVideo" controls style="display: none;"></video>
                        <div class="file-info" id="fileInfo"></div>
                    </div>

                    <div class="form-group">
                        <label for="pin">🔐 PIN *</label>
                        <input type="password" id="pin" placeholder="Introduce el PIN" maxlength="6" required>
                    </div>

                    <div id="loader" class="loader">⏳ PUBLICANDO...</div>

                    <div class="button-group">
                        <button id="btnPublicarNueva" class="btn-publicar" type="submit">🚀 PUBLICAR</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- TAB 2: EDITAR -->
        <div id="tab-editar" class="tab-content">
            <div class="panel">
                <div class="header">
                    <h2>✏️ EDITAR NOTICIA</h2>
                    <p class="subtitle">Modificar noticia ya publicada</p>
                </div>

                <div id="alertEditar" class="alert"></div>

                <div class="info-box" id="infoBox" style="display: none;">
                    ✅ Noticia cargada: <span id="noticiaInfo"></span>
                </div>

                <!-- FORMULARIO DE EDICIÓN (OCULTO HASTA CARGAR) -->
                <form id="formularioEditar" onsubmit="event.preventDefault(); actualizarNoticia();" style="display: none;">
                    <div class="form-group">
                        <label for="seccionEditar">📰 SECCIÓN *</label>
                        <select id="seccionEditar" required>
                            <option value="Nacionales">🇩🇴 Nacionales</option>
                            <option value="Deportes">⚽ Deportes</option>
                            <option value="Internacionales">🌍 Internacionales</option>
                            <option value="Espectáculos">🎬 Espectáculos</option>
                            <option value="Economía">💼 Economía</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="tituloEditar">📝 TÍTULO *</label>
                        <input type="text" id="tituloEditar" maxlength="200" required>
                        <div class="char-count"><span id="tituloEditarCount">0</span>/200</div>
                    </div>

                    <div class="form-group">
                        <label for="redactorEditar">👤 REDACTOR</label>
                        <input type="text" id="redactorEditar" maxlength="50">
                    </div>

                    <div class="form-group">
                        <label for="ubicacionEditar">📍 UBICACIÓN</label>
                        <input type="text" id="ubicacionEditar" maxlength="100">
                    </div>

                    <div class="form-group">
                        <label for="contenidoEditar">✍️ CONTENIDO *</label>
                        <textarea id="contenidoEditar" maxlength="5000" required></textarea>
                        <div class="char-count"><span id="contenidoEditarCount">0</span>/5000</div>
                    </div>

                    <div class="form-group">
                        <label>🎬 MULTIMEDIA (Opcional)</label>
                        <label class="file-label" for="multimediaEditar" id="labelMultimediaEditar">
                            🎥 TOCA PARA CAMBIAR MULTIMEDIA
                        </label>
                        <input type="file" id="multimediaEditar" accept="video/mp4,image/*" style="display: none;">
                        <img id="previewEditar">
                        <video id="previewVideoEditar" controls style="display: none;"></video>
                        <div class="file-info" id="fileInfoEditar"></div>
                    </div>

                    <div class="form-group">
                        <label for="pinEditar">🔐 PIN *</label>
                        <input type="password" id="pinEditar" placeholder="Introduce el PIN" maxlength="6" required>
                    </div>

                    <div id="loaderEditar" class="loader">⏳ ACTUALIZANDO...</div>

                    <div class="button-group">
                        <button id="btnActualizar" class="btn-actualizar" type="submit">✏️ ACTUALIZAR</button>
                        <button id="btnEliminar" class="btn-eliminar" type="button" onclick="eliminarNoticia()">🗑️ ELIMINAR</button>
                        <button id="btnLimpiar" class="btn-limpiar" type="button" onclick="limpiarEdicion()">🔄 LIMPIAR</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        let multimediaBase64 = "";
        let multimediaBase64Editar = "";
        let noticiaEditarId = null;

        // ==================== TABS ====================
        function cambiarTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            if (tab === 'publicar') document.getElementById('btnPublicar').classList.add('active');
            if (tab === 'editar') document.getElementById('btnEditar').classList.add('active');
        }

        // ==================== AUTO-CARGA POR URL ====================
        function cargarParametroURL() {
            const params = new URLSearchParams(window.location.search);
            const editId = params.get('edit');

            if (editId) {
                cambiarTab('editar');
                cargarNoticiaParaEditar(editId);
            }
        }

        // ==================== CARGAR NOTICIA POR ID ====================
        async function cargarNoticiaParaEditar(id) {
            try {
                const res = await fetch(`/noticia/${id}`);
                const data = await res.json();

                if (!data.success) {
                    mostrarAlerta('❌ Noticia no encontrada', 'error', 'editar');
                    return;
                }

                const noticia = data.noticia;
                noticiaEditarId = id;

                // Llenar campos
                document.getElementById('tituloEditar').value = noticia.titulo;
                document.getElementById('seccionEditar').value = noticia.seccion;
                document.getElementById('contenidoEditar').value = noticia.contenido;
                document.getElementById('redactorEditar').value = noticia.redactor || '';
                document.getElementById('ubicacionEditar').value = noticia.ubicacion || '';

                // Mostrar multimedia
                if (noticia.imagen) {
                    multimediaBase64Editar = noticia.imagen;
                    if (noticia.imagen.includes('data:video') || noticia.imagen.endsWith('.mp4')) {
                        document.getElementById('previewVideoEditar').src = noticia.imagen;
                        document.getElementById('previewVideoEditar').style.display = 'block';
                        document.getElementById('previewEditar').style.display = 'none';
                    } else {
                        document.getElementById('previewEditar').src = noticia.imagen;
                        document.getElementById('previewEditar').style.display = 'block';
                        document.getElementById('previewVideoEditar').style.display = 'none';
                    }
                }

                // Mostrar formulario
                document.getElementById('formularioEditar').style.display = 'block';
                document.getElementById('infoBox').style.display = 'block';
                document.getElementById('noticiaInfo').textContent = `"${noticia.titulo}"`;

                mostrarAlerta(`✅ Listo para editar`, 'success', 'editar');

            } catch (error) {
                mostrarAlerta('❌ Error: ' + error.message, 'error', 'editar');
            }
        }

        // ==================== CONTADORES ====================
        document.getElementById('titulo').addEventListener('input', (e) => {
            document.getElementById('tituloCount').textContent = e.target.value.length;
        });

        document.getElementById('contenido').addEventListener('input', (e) => {
            document.getElementById('contenidoCount').textContent = e.target.value.length;
        });

        document.getElementById('tituloEditar').addEventListener('input', (e) => {
            document.getElementById('tituloEditarCount').textContent = e.target.value.length;
        });

        document.getElementById('contenidoEditar').addEventListener('input', (e) => {
            document.getElementById('contenidoEditarCount').textContent = e.target.value.length;
        });

        // ==================== MULTIMEDIA ====================
        document.getElementById('multimedia').addEventListener('change', async (e) => {
            await procesarArchivo(e.target.files[0], 'publicar');
        });

        document.getElementById('multimediaEditar').addEventListener('change', async (e) => {
            await procesarArchivo(e.target.files[0], 'editar');
        });

        async function procesarArchivo(file, tipo) {
            if (!file) return;

            try {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const base64 = event.target.result;
                    const sizeMB = (base64.length / (1024 * 1024)).toFixed(2);

                    if (tipo === 'publicar') {
                        multimediaBase64 = base64;
                        if (file.type.startsWith('video/')) {
                            document.getElementById('preview').style.display = 'none';
                            document.getElementById('previewVideo').src = base64;
                            document.getElementById('previewVideo').style.display = 'block';
                            document.getElementById('labelMultimedia').innerHTML = '✅ VIDEO LISTO';
                        } else {
                            document.getElementById('previewVideo').style.display = 'none';
                            document.getElementById('preview').src = base64;
                            document.getElementById('preview').style.display = 'block';
                            document.getElementById('labelMultimedia').innerHTML = '✅ IMAGEN LISTA';
                        }
                        document.getElementById('fileInfo').innerHTML = `✅ ${file.type} | ${sizeMB}MB`;
                    } else {
                        multimediaBase64Editar = base64;
                        if (file.type.startsWith('video/')) {
                            document.getElementById('previewEditar').style.display = 'none';
                            document.getElementById('previewVideoEditar').src = base64;
                            document.getElementById('previewVideoEditar').style.display = 'block';
                            document.getElementById('labelMultimediaEditar').innerHTML = '✅ VIDEO LISTO';
                        } else {
                            document.getElementById('previewVideoEditar').style.display = 'none';
                            document.getElementById('previewEditar').src = base64;
                            document.getElementById('previewEditar').style.display = 'block';
                            document.getElementById('labelMultimediaEditar').innerHTML = '✅ IMAGEN LISTA';
                        }
                        document.getElementById('fileInfoEditar').innerHTML = `✅ ${file.type} | ${sizeMB}MB`;
                    }
                };
                reader.readAsDataURL(file);
            } catch (error) {
                mostrarAlerta('❌ Error: ' + error.message, 'error');
            }
        }

        // ==================== PUBLICAR ====================
        async function publicarNoticia() {
            const titulo = document.getElementById('titulo').value.trim();
            const seccion = document.getElementById('seccion').value;
            const contenido = document.getElementById('contenido').value.trim();
            const redactor = document.getElementById('redactor').value.trim();
            const ubicacion = document.getElementById('ubicacion').value.trim();
            const pin = document.getElementById('pin').value;

            if (!titulo || !seccion || !contenido) {
                mostrarAlerta('❌ Faltan campos obligatorios', 'error', 'publicar');
                return;
            }

            if (pin !== '311') {
                mostrarAlerta('❌ PIN incorrecto', 'error', 'publicar');
                return;
            }

            document.getElementById('btnPublicarNueva').disabled = true;
            document.getElementById('loader').style.display = 'block';

            try {
                const res = await fetch('/publicar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        titulo,
                        seccion,
                        contenido,
                        redactor,
                        ubicacion,
                        imagen: multimediaBase64,
                        pin
                    })
                });

                const data = await res.json();

                if (data.success) {
                    mostrarAlerta('✅ NOTICIA PUBLICADA 🏮', 'success', 'publicar');
                    setTimeout(() => {
                        limpiarFormulario();
                    }, 1500);
                } else {
                    mostrarAlerta('❌ Error: ' + data.error, 'error', 'publicar');
                }
            } catch (error) {
                mostrarAlerta('❌ Error: ' + error.message, 'error', 'publicar');
            } finally {
                document.getElementById('btnPublicarNueva').disabled = false;
                document.getElementById('loader').style.display = 'none';
            }
        }

        function limpiarFormulario() {
            document.getElementById('titulo').value = '';
            document.getElementById('seccion').value = '';
            document.getElementById('contenido').value = '';
            document.getElementById('redactor').value = 'mxl';
            document.getElementById('ubicacion').value = '';
            document.getElementById('pin').value = '';
            document.getElementById('multimedia').value = '';
            document.getElementById('preview').style.display = 'none';
            document.getElementById('previewVideo').style.display = 'none';
            document.getElementById('labelMultimedia').innerHTML = '🎥 TOCA PARA SUBIR VIDEO O IMAGEN';
            document.getElementById('fileInfo').textContent = '';
            multimediaBase64 = '';
            document.getElementById('tituloCount').textContent = '0';
            document.getElementById('contenidoCount').textContent = '0';
        }

        // ==================== EDITAR ====================
        async function actualizarNoticia() {
            const titulo = document.getElementById('tituloEditar').value.trim();
            const seccion = document.getElementById('seccionEditar').value;
            const contenido = document.getElementById('contenidoEditar').value.trim();
            const redactor = document.getElementById('redactorEditar').value.trim();
            const ubicacion = document.getElementById('ubicacionEditar').value.trim();
            const pin = document.getElementById('pinEditar').value;

            if (!titulo || !seccion || !contenido) {
                mostrarAlerta('❌ Faltan campos obligatorios', 'error', 'editar');
                return;
            }

            if (pin !== '311') {
                mostrarAlerta('❌ PIN incorrecto', 'error', 'editar');
                return;
            }

            document.getElementById('btnActualizar').disabled = true;
            document.getElementById('loaderEditar').style.display = 'block';

            try {
                const res = await fetch(`/noticia/${noticiaEditarId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        titulo,
                        seccion,
                        contenido,
                        redactor,
                        ubicacion,
                        imagen: multimediaBase64Editar,
                        pin
                    })
                });

                const data = await res.json();

                if (data.success) {
                    mostrarAlerta('✅ NOTICIA ACTUALIZADA ✏️', 'success', 'editar');
                    setTimeout(() => {
                        limpiarEdicion();
                        window.location.href = '/';
                    }, 2000);
                } else {
                    mostrarAlerta('❌ Error: ' + data.error, 'error', 'editar');
                }
            } catch (error) {
                mostrarAlerta('❌ Error: ' + error.message, 'error', 'editar');
            } finally {
                document.getElementById('btnActualizar').disabled = false;
                document.getElementById('loaderEditar').style.display = 'none';
            }
        }

        async function eliminarNoticia() {
            if (!confirm('⚠️ ¿Estás seguro de eliminar esta noticia?')) {
                return;
            }

            const pin = document.getElementById('pinEditar').value;

            if (pin !== '311') {
                mostrarAlerta('❌ PIN incorrecto', 'error', 'editar');
                return;
            }

            document.getElementById('btnEliminar').disabled = true;

            try {
                const res = await fetch(`/noticia/${noticiaEditarId}`, {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pin })
                });

                const data = await res.json();

                if (data.success) {
                    mostrarAlerta('✅ NOTICIA ELIMINADA 🗑️', 'success', 'editar');
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 2000);
                } else {
                    mostrarAlerta('❌ Error: ' + data.error, 'error', 'editar');
                }
            } catch (error) {
                mostrarAlerta('❌ Error: ' + error.message, 'error', 'editar');
            } finally {
                document.getElementById('btnEliminar').disabled = false;
            }
        }

        function limpiarEdicion() {
            document.getElementById('formularioEditar').style.display = 'none';
            document.getElementById('infoBox').style.display = 'none';
            document.getElementById('tituloEditar').value = '';
            document.getElementById('seccionEditar').value = '';
            document.getElementById('contenidoEditar').value = '';
            document.getElementById('redactorEditar').value = '';
            document.getElementById('ubicacionEditar').value = '';
            document.getElementById('pinEditar').value = '';
            document.getElementById('previewEditar').style.display = 'none';
            document.getElementById('previewVideoEditar').style.display = 'none';
            document.getElementById('labelMultimediaEditar').innerHTML = '🎥 TOCA PARA CAMBIAR MULTIMEDIA';
            document.getElementById('fileInfoEditar').textContent = '';
            multimediaBase64Editar = '';
            noticiaEditarId = null;
            document.getElementById('tituloEditarCount').textContent = '0';
            document.getElementById('contenidoEditarCount').textContent = '0';
        }

        // ==================== ALERTAS ====================
        function mostrarAlerta(mensaje, tipo, tab = 'publicar') {
            const alertBox = document.getElementById(tab === 'editar' ? 'alertEditar' : 'alert');
            alertBox.textContent = mensaje;
            alertBox.className = `alert ${tipo}`;
            alertBox.style.display = 'block';

            if (tipo === 'success') {
                setTimeout(() => alertBox.style.display = 'none', 3000);
            }
        }

        // ==================== INICIALIZAR ====================
        window.addEventListener('load', () => {
            cargarParametroURL();
            console.log('✅ Búnker de Redacción cargado');
        });
    </script>
</body>
</html>
