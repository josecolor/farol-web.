<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Redacción · El Farol al Día</title>
    <style>
        :root { --naranja: #FF5500; --fondo: #0a0a0a; --tarjeta: #1a1a1a; --texto: #eee; --borde: #333; }
        body { background: var(--fondo); color: var(--texto); font-family: sans-serif; margin: 0; padding: 20px; }
        .panel { max-width: 800px; margin: 0 auto; background: var(--tarjeta); border: 1px solid var(--borde); border-radius: 12px; padding: 25px; }
        h1 { color: var(--naranja); font-size: 20px; border-bottom: 1px solid var(--borde); padding-bottom: 10px; margin-top: 0; }
        .grupo { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 14px; color: #aaa; }
        select, input, textarea { width: 100%; padding: 12px; background: #000; border: 1px solid var(--borde); color: #fff; border-radius: 6px; }
        .btn { background: var(--naranja); color: #fff; border: none; padding: 15px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .btn:hover { background: #ff7733; }
        .btn:disabled { background: #555; cursor: not-allowed; }
        #log { margin-top: 20px; padding: 15px; background: #000; border-radius: 6px; font-family: monospace; font-size: 12px; min-height: 50px; border-left: 4px solid var(--naranja); white-space: pre-wrap; }
        .error { color: #ff4444; }
        .exito { color: #44ff44; }
        .loading { display: inline-block; animation: spin 1s linear infinite; margin-right: 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="panel">
    <h1>🏮 PANEL DE REDACCIÓN MXL</h1>
    
    <div class="grupo">
        <label>Usuario Administrador:</label>
        <input type="text" id="user" value="mxl">
    </div>

    <div class="grupo">
        <label>PIN de Seguridad:</label>
        <input type="password" id="pin" placeholder="****">
    </div>

    <div class="grupo">
        <label>Categoría para generar:</label>
        <select id="categoria">
            <option value="Nacionales">🏛️ Nacionales (SDE / RD)</option>
            <option value="Deportes">⚽ Deportes</option>
            <option value="Internacionales">🌍 Internacionales</option>
            <option value="Economía">💰 Economía</option>
            <option value="Tecnología">💻 Tecnología</option>
            <option value="Espectáculos">🎬 Espectáculos</option>
        </select>
    </div>

    <button class="btn" id="btnGenerar" onclick="mandarGenerar()">⚡ GENERAR NOTICIA CON IA</button>

    <div id="log">Esperando orden...</div>
</div>

<script>
    async function mandarGenerar() {
        const btn = document.getElementById('btnGenerar');
        const log = document.getElementById('log');
        const user = document.getElementById('user').value;
        const pin = document.getElementById('pin').value;
        const cat = document.getElementById('categoria').value;

        if (!pin) {
            log.innerHTML = '<span class="error">❌ Debes poner el PIN de seguridad.</span>';
            return;
        }

        // Bloquear botón
        btn.disabled = true;
        btn.innerHTML = '<span class="loading">⏳</span> PROCESANDO CON GEMINI...';
        log.innerHTML = `📡 Conectando con el motor modular...\nCategoría: ${cat}\nPor favor, espera (esto toma 30-60 segundos)...`;

        try {
            // Creamos la credencial de acceso (Basic Auth)
            const auth = btoa(`${user}:${pin}`);

            // IMPORTANTE: La ruta ahora es /api/generar
            const response = await fetch('/api/generar', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Basic ${auth}`
                },
                body: JSON.stringify({ categoria: cat })
            });

            // Si el servidor devuelve HTML en vez de JSON, aquí se captura
            const textoRaw = await response.text();
            let data;
            
            try {
                data = JSON.parse(textoRaw);
            } catch (e) {
                console.error("Respuesta no es JSON:", textoRaw);
                throw new Error("El servidor respondió con un error de página. Revisa los logs de Railway.");
            }

            if (data.success) {
                log.innerHTML = `<span class="exito">✅ ¡NOTICIA PUBLICADA CON ÉXITO!</span>\nSlug: ${data.slug}\n\nYa puedes verla en la página principal.`;
                toast("¡Publicado!");
            } else {
                log.innerHTML = `<span class="error">❌ ERROR: ${data.error || 'No se pudo generar'}</span>`;
            }

        } catch (error) {
            log.innerHTML = `<span class="error">❌ FALLO DE CONEXIÓN:</span>\n${error.message}`;
        } finally {
            btn.disabled = false;
            btn.innerHTML = '⚡ GENERAR NOTICIA CON IA';
        }
    }

    function toast(msg) {
        console.log("Notificación:", msg);
    }
</script>

</body>
</html>
