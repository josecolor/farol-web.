<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redacción V37 🏮 El Farol al Día</title>
    <style>
        :root { --fuego: #FF5500; --negro: #070707; --tarjeta: #111; --crema: #EDE8DF; }
        body { background: var(--negro); color: var(--crema); font-family: sans-serif; padding: 20px; }
        .card { background: var(--tarjeta); border: 1px solid #222; border-radius: 12px; padding: 20px; max-width: 500px; margin: 0 auto; }
        h2 { color: var(--fuego); text-transform: uppercase; font-size: 14px; letter-spacing: 2px; }
        select, input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #000; color: #fff; }
        button { background: var(--fuego); border: none; font-weight: bold; cursor: pointer; }
        #log { background: #000; padding: 10px; font-family: monospace; font-size: 11px; color: #888; border-left: 3px solid var(--fuego); height: 100px; overflow-y: auto; }
    </style>
</head>
<body>

<div class="card">
    <h2>🏮 REDACCIÓN V37.0</h2>
    <label>Categoría:</label>
    <select id="categoria">
        <option value="Nacionales">🏛️ Nacionales</option>
        <option value="Deportes">⚽ Deportes</option>
        <option value="Economía">💰 Economía</option>
    </select>
    
    <button id="btn" onclick="generar()">⚡ PUBLICAR AHORA</button>
    
    <div id="log">Listo para el reporte diario...</div>
</div>

<script>
    async function generar() {
        const log = document.getElementById('log');
        const cat = document.getElementById('categoria').value;
        log.innerHTML = "📡 Conectando como 'director'...";
        
        try {
            // BASIC AUTH PARA V37 (director:311)
            const auth = btoa("director:311");
            
            const r = await fetch('/api/generar-noticia', {
                method: 'POST',
                headers: { 
                    'Authorization': `Basic ${auth}`,
                    'Content-Type': 'application/json' 
                },
                body: JSON.stringify({ categoria: cat })
            });

            const data = await r.json();
            if (data.success) {
                log.innerHTML = `✅ ¡PUBLICADA!\nSlug: ${data.slug}\nBarrios: ${data.stats.barrios.join(', ')}`;
            } else {
                log.innerHTML = `❌ ERROR: ${data.error}`;
            }
        } catch (e) {
            log.innerHTML = "❌ Error de Red: El servidor no respondió.";
        }
    }
</script>
</body>
</html>
