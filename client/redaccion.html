<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Redacción Móvil 🏮</title>
    <style>
        /* (mismos estilos que ya tienes, no los repito para no alargar, pero en tu código real deben estar) */
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { background:#0b0b0b; color:white; font-family:sans-serif; padding:12px; }
        .container { max-width:600px; margin:0 auto; }
        .btn-gigante { width:100%; padding:22px; font-size:1.4em; border:none; border-radius:60px; background:linear-gradient(145deg,#FF8C00,#ff6b35); color:white; margin:15px 0; cursor:pointer; }
        .btn-secundario { width:100%; padding:18px; font-size:1.2em; border:2px solid #FF8C00; border-radius:50px; background:transparent; color:#FF8C00; margin:8px 0; cursor:pointer; font-weight:bold; }
        input, textarea, select { width:100%; padding:18px 20px; font-size:1.2em; border-radius:30px; border:2px solid #333; background:#1a1a1a; color:white; margin:8px 0; }
        textarea { min-height:200px; }
        label { display:block; font-size:1.1em; color:#FF8C00; font-weight:bold; margin-top:20px; }
        .file-area { border:3px dashed #FF8C00; border-radius:40px; padding:30px 20px; text-align:center; background:#1a1a1a; margin:15px 0; cursor:pointer; }
        #preview, #previewVideo { width:100%; max-height:300px; border-radius:25px; margin:15px 0; display:none; background:#000; }
        .char-count { text-align:right; color:#888; font-size:0.9em; }
        .alert { padding:20px; border-radius:30px; margin:15px 0; font-weight:bold; text-align:center; display:none; }
        .alert.success { background:rgba(76,175,80,0.2); border:2px solid #4CAF50; color:#4CAF50; }
        .alert.error { background:rgba(244,67,54,0.2); border:2px solid #f44336; color:#ff6b6b; }
        .autosave { text-align:center; color:#4CAF50; font-size:0.9em; margin:10px 0; display:none; }
        h1 { text-align:center; color:#FF8C00; font-size:2.2em; margin:20px 0; }
        .button-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin:20px 0; }
        .redactor-foto-area { display:flex; align-items:center; gap:15px; margin:10px 0; }
        .redactor-foto-preview { width:70px; height:70px; border-radius:50%; background:#333; border:3px solid #FF8C00; object-fit:cover; display:none; }
        .redactor-foto-placeholder { width:70px; height:70px; border-radius:50%; background:#333; border:3px dashed #FF8C00; display:flex; align-items:center; justify-content:center; color:#FF8C00; font-size:1.5em; cursor:pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏮 REDACCIÓN</h1>
        <div id="autosaveIndicator" class="autosave">✅ Borrador guardado</div>
        <div id="alert" class="alert"></div>

        <form id="formulario" onsubmit="event.preventDefault(); publicarNoticia();">
            <label>📰 SECCIÓN</label>
            <select id="seccion" required>
                <option value="Nacionales">🇩🇴 Nacionales</option>
                <option value="Deportes">⚽ Deportes</option>
                <option value="Internacionales">🌍 Internacionales</option>
                <option value="Espectáculos">🎬 Espectáculos</option>
                <option value="Economía">💼 Economía</option>
            </select>

            <label>📝 TÍTULO</label>
            <input type="text" id="titulo" placeholder="Título" maxlength="200">
            <div class="char-count"><span id="tituloCount">0</span>/200</div>

            <label>✍️ CONTENIDO</label>
            <textarea id="contenido" placeholder="Escribe la noticia..." maxlength="10000"></textarea>
            <div class="char-count"><span id="contenidoCount">0</span>/10000</div>

            <label>📍 UBICACIÓN (opcional)</label>
            <input type="text" id="ubicacion" placeholder="Ej: Santo Domingo Este">

            <label>👤 REDACTOR</label>
            <input type="text" id="redactor" value="mxl">

            <!-- Foto del periodista -->
            <div style="margin-top:10px;">
                <div style="display:flex; align-items:center; gap:15px;">
                    <img id="redactorFotoPreview" class="redactor-foto-preview">
                    <div id="redactorFotoPlaceholder" class="redactor-foto-placeholder" onclick="document.getElementById('redactorFotoInput').click()">📸</div>
                    <input type="file" id="redactorFotoInput" accept="image/*" style="display:none;">
                    <div class="redactor-foto-info" id="redactorFotoInfo">Toca para añadir foto</div>
                </div>
            </div>

            <label>🎬 MULTIMEDIA</label>
            <div class="file-area" id="fileArea">
                <span>📸 + 🎥</span>
                <small>Toca para elegir foto o video<br>Se comprime automáticamente</small>
            </div>
            <input type="file" id="multimedia" accept="image/*,video/mp4" style="display:none;">
            <img id="preview">
            <video id="previewVideo" controls></video>
            <div id="fileInfo" style="color:#888; text-align:center; margin:10px;"></div>

            <label>🔐 PIN</label>
            <input type="password" id="pin" placeholder="311" maxlength="6" value="311">

            <button id="btnPublicar" class="btn-gigante" type="submit">🚀 PUBLICAR AHORA</button>

            <div class="button-grid">
                <button class="btn-secundario" type="button" onclick="cargarBorrador()">📂 Cargar</button>
                <button class="btn-secundario" type="button" onclick="limpiarFormulario()">🗑️ Limpiar</button>
            </div>
        </form>

        <div style="margin-top:40px;">
            <h2 style="color:#FF8C00; margin-bottom:20px;">✏️ EDITAR RÁPIDO</h2>
            <div id="noticiasRecientes"></div>
        </div>
    </div>

    <script>
        let multimediaBase64 = "";
        let redactorFotoBase64 = "";
        const STORAGE_KEY = 'borrador_noticia';

        // Auto-guardado
        function autoGuardar() {
            const borrador = {
                seccion: document.getElementById('seccion').value,
                titulo: document.getElementById('titulo').value,
                contenido: document.getElementById('contenido').value,
                ubicacion: document.getElementById('ubicacion').value,
                redactor: document.getElementById('redactor').value,
                redactorFoto: redactorFotoBase64,
                multimedia: multimediaBase64,
                timestamp: Date.now()
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(borrador));
            document.getElementById('autosaveIndicator').style.display = 'block';
            setTimeout(() => document.getElementById('autosaveIndicator').style.display = 'none', 2000);
        }

        function cargarBorrador() {
            const guardado = localStorage.getItem(STORAGE_KEY);
            if (!guardado) return mostrarAlerta('❌ No hay borrador', 'error');
            try {
                const b = JSON.parse(guardado);
                document.getElementById('seccion').value = b.seccion || 'Nacionales';
                document.getElementById('titulo').value = b.titulo || '';
                document.getElementById('contenido').value = b.contenido || '';
                document.getElementById('ubicacion').value = b.ubicacion || '';
                document.getElementById('redactor').value = b.redactor || 'mxl';
                if (b.redactorFoto) {
                    redactorFotoBase64 = b.redactorFoto;
                    document.getElementById('redactorFotoPreview').src = redactorFotoBase64;
                    document.getElementById('redactorFotoPreview').style.display = 'block';
                    document.getElementById('redactorFotoPlaceholder').style.display = 'none';
                    document.getElementById('redactorFotoInfo').textContent = '✅ Foto lista';
                }
                if (b.multimedia) {
                    multimediaBase64 = b.multimedia;
                    if (b.multimedia.startsWith('data:video')) {
                        document.getElementById('previewVideo').src = b.multimedia;
                        document.getElementById('previewVideo').style.display = 'block';
                    } else {
                        document.getElementById('preview').src = b.multimedia;
                        document.getElementById('preview').style.display = 'block';
                    }
                    const size = (b.multimedia.length / (1024*1024)).toFixed(2);
                    document.getElementById('fileInfo').textContent = `✅ Multimedia | ${size}MB`;
                }
                mostrarAlerta('✅ Borrador cargado', 'success');
            } catch (e) {
                mostrarAlerta('❌ Error al cargar', 'error');
            }
        }

        // Eventos auto-guardado
        ['titulo','contenido','ubicacion','redactor','seccion'].forEach(id => 
            document.getElementById(id).addEventListener('input', autoGuardar)
        );

        // Contadores
        document.getElementById('titulo').addEventListener('input', e => document.getElementById('tituloCount').textContent = e.target.value.length);
        document.getElementById('contenido').addEventListener('input', e => document.getElementById('contenidoCount').textContent = e.target.value.length);

        // Foto periodista
        document.getElementById('redactorFotoInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            document.getElementById('redactorFotoInfo').textContent = '⏳ Comprimiendo...';
            redactorFotoBase64 = await comprimirImagen(file, 200);
            document.getElementById('redactorFotoPreview').src = redactorFotoBase64;
            document.getElementById('redactorFotoPreview').style.display = 'block';
            document.getElementById('redactorFotoPlaceholder').style.display = 'none';
            document.getElementById('redactorFotoInfo').textContent = '✅ Foto lista';
            autoGuardar();
        });

        // Multimedia
        document.getElementById('fileArea').addEventListener('click', () => document.getElementById('multimedia').click());
        document.getElementById('multimedia').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            document.getElementById('fileInfo').textContent = '⏳ Comprimiendo...';
            if (file.type.startsWith('video/')) {
                multimediaBase64 = await comprimirVideo(file);
                document.getElementById('preview').style.display = 'none';
                document.getElementById('previewVideo').src = multimediaBase64;
                document.getElementById('previewVideo').style.display = 'block';
            } else {
                multimediaBase64 = await comprimirImagen(file, 720);
                document.getElementById('previewVideo').style.display = 'none';
                document.getElementById('preview').src = multimediaBase64;
                document.getElementById('preview').style.display = 'block';
            }
            const size = (multimediaBase64.length / (1024*1024)).toFixed(2);
            document.getElementById('fileInfo').textContent = `✅ Listo | ${size}MB`;
            autoGuardar();
        });

        // Compresión de imagen
        function comprimirImagen(file, maxWidth = 720) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width, height = img.height;
                        if (width > maxWidth) { height = (height * maxWidth) / width; width = maxWidth; }
                        canvas.width = width; canvas.height = height;
                        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                        canvas.toBlob(blob => {
                            const r = new FileReader();
                            r.onload = () => resolve(r.result);
                            r.readAsDataURL(blob);
                        }, 'image/webp', 0.8);
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        function comprimirVideo(file) {
            return new Promise(resolve => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.readAsDataURL(file);
            });
        }

        // Publicar
        async function publicarNoticia() {
            const titulo = document.getElementById('titulo').value.trim();
            const seccion = document.getElementById('seccion').value;
            const contenido = document.getElementById('contenido').value.trim();
            const ubicacion = document.getElementById('ubicacion').value.trim();
            const redactor = document.getElementById('redactor').value.trim();
            const pin = document.getElementById('pin').value;

            if (!titulo || !seccion || !contenido) return mostrarAlerta('❌ Campos obligatorios', 'error');
            if (pin !== '311') return mostrarAlerta('❌ PIN incorrecto', 'error');

            document.getElementById('btnPublicar').disabled = true;
            document.getElementById('btnPublicar').textContent = '⏳ PUBLICANDO...';

            try {
                const res = await fetch('/api/publicar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ titulo, seccion, contenido, ubicacion, redactor, redactorFoto: redactorFotoBase64, imagen: multimediaBase64, pin })
                });
                const data = await res.json();
                if (data.success) {
                    mostrarAlerta('✅ PUBLICADO!', 'success');
                    localStorage.removeItem(STORAGE_KEY);
                    setTimeout(() => window.location.href = '/', 2000);
                } else {
                    mostrarAlerta('❌ ' + data.error, 'error');
                }
            } catch (error) {
                mostrarAlerta('❌ Error de red', 'error');
            } finally {
                document.getElementById('btnPublicar').disabled = false;
                document.getElementById('btnPublicar').textContent = '🚀 PUBLICAR AHORA';
            }
        }

        // Cargar noticias recientes
        async function cargarNoticiasRecientes() {
            try {
                const res = await fetch('/api/noticias?limit=5');
                const data = await res.json();
                if (data.success) {
                    const container = document.getElementById('noticiasRecientes');
                    container.innerHTML = '';
                    data.noticias.forEach(n => {
                        const card = document.createElement('div');
                        card.style.cssText = 'background:#1a1a1a; border-radius:30px; padding:18px; margin-bottom:12px; border-left:5px solid #FF8C00;';
                        const fecha = new Date(n.fecha).toLocaleDateString();
                        card.innerHTML = `
                            <div style="font-size:1.2em; font-weight:bold; margin-bottom:8px;">${n.titulo.substring(0,50)}...</div>
                            <div style="color:#888; margin-bottom:12px;">${n.seccion} | ${fecha} | 👁️ ${n.vistas || 0}</div>
                            <button class="btn-secundario" style="padding:12px;" onclick="editarNoticia('${n._id}')">✏️ Editar</button>
                        `;
                        container.appendChild(card);
                    });
                }
            } catch (error) { console.error(error); }
        }

        function editarNoticia(id) { window.location.href = '/redaccion?edit=' + id; }

        function limpiarFormulario() {
            document.getElementById('titulo').value = '';
            document.getElementById('contenido').value = '';
            document.getElementById('ubicacion').value = '';
            document.getElementById('multimedia').value = '';
            document.getElementById('preview').style.display = 'none';
            document.getElementById('previewVideo').style.display = 'none';
            document.getElementById('fileInfo').textContent = '';
            multimediaBase64 = '';
            document.getElementById('redactorFotoInput').value = '';
            document.getElementById('redactorFotoPreview').style.display = 'none';
            document.getElementById('redactorFotoPlaceholder').style.display = 'flex';
            document.getElementById('redactorFotoInfo').textContent = 'Toca para añadir foto';
            redactorFotoBase64 = '';
            document.getElementById('tituloCount').textContent = '0';
            document.getElementById('contenidoCount').textContent = '0';
            mostrarAlerta('🧹 Formulario limpio', 'success');
        }

        function mostrarAlerta(msg, tipo) {
            const box = document.getElementById('alert');
            box.textContent = msg;
            box.className = `alert ${tipo}`;
            box.style.display = 'block';
            setTimeout(() => box.style.display = 'none', 3000);
        }

        function cargarParametroURL() {
            const params = new URLSearchParams(window.location.search);
            const editId = params.get('edit');
            if (editId) cargarNoticiaParaEditar(editId);
        }

        async function cargarNoticiaParaEditar(id) {
            try {
                const res = await fetch(`/api/noticias/${id}`);
                const data = await res.json();
                if (data.success) {
                    const n = data.noticia;
                    document.getElementById('titulo').value = n.titulo;
                    document.getElementById('seccion').value = n.seccion;
                    document.getElementById('contenido').value = n.contenido;
                    document.getElementById('ubicacion').value = n.ubicacion || '';
                    document.getElementById('redactor').value = n.redactor || 'mxl';
                    if (n.redactorFoto) {
                        redactorFotoBase64 = n.redactorFoto;
                        document.getElementById('redactorFotoPreview').src = n.redactorFoto;
                        document.getElementById('redactorFotoPreview').style.display = 'block';
                        document.getElementById('redactorFotoPlaceholder').style.display = 'none';
                        document.getElementById('redactorFotoInfo').textContent = '✅ Foto lista';
                    }
                    if (n.imagen) {
                        multimediaBase64 = n.imagen;
                        if (n.imagen.includes('video')) {
                            document.getElementById('previewVideo').src = n.imagen;
                            document.getElementById('previewVideo').style.display = 'block';
                        } else {
                            document.getElementById('preview').src = n.imagen;
                            document.getElementById('preview').style.display = 'block';
                        }
                    }
                    document.getElementById('btnPublicar').textContent = '✏️ ACTUALIZAR NOTICIA';
                    document.getElementById('btnPublicar').onclick = actualizarNoticia;
                    mostrarAlerta('✅ Noticia cargada', 'success');
                }
            } catch (error) { mostrarAlerta('❌ Error cargando', 'error'); }
        }

        async function actualizarNoticia() {
            const id = new URLSearchParams(window.location.search).get('edit');
            const titulo = document.getElementById('titulo').value.trim();
            const seccion = document.getElementById('seccion').value;
            const contenido = document.getElementById('contenido').value.trim();
            const ubicacion = document.getElementById('ubicacion').value.trim();
            const redactor = document.getElementById('redactor').value.trim();
            const pin = document.getElementById('pin').value;

            if (!titulo || !seccion || !contenido) return mostrarAlerta('❌ Campos obligatorios', 'error');
            if (pin !== '311') return mostrarAlerta('❌ PIN incorrecto', 'error');

            document.getElementById('btnPublicar').disabled = true;
            document.getElementById('btnPublicar').textContent = '⏳ ACTUALIZANDO...';

            try {
                const res = await fetch(`/api/noticias/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ titulo, seccion, contenido, ubicacion, redactor, redactorFoto: redactorFotoBase64, imagen: multimediaBase64, pin })
                });
                const data = await res.json();
                if (data.success) {
                    mostrarAlerta('✅ ACTUALIZADO!', 'success');
                    setTimeout(() => window.location.href = '/', 2000);
                } else {
                    mostrarAlerta('❌ ' + data.error, 'error');
                }
            } catch (error) {
                mostrarAlerta('❌ Error de red', 'error');
            } finally {
                document.getElementById('btnPublicar').disabled = false;
                document.getElementById('btnPublicar').textContent = '✏️ ACTUALIZAR NOTICIA';
            }
        }

        window.addEventListener('load', () => {
            cargarParametroURL();
            cargarNoticiasRecientes();
            cargarBorrador();
        });
    </script>
</body>
</html>
