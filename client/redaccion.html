<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redacción 🏮 El Farol al Día</title>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: sans-serif; padding: 20px; text-align: center; }
        .card { background: #1a1a1a; padding: 30px; border-radius: 15px; border: 1px solid #ff5500; max-width: 400px; margin: auto; box-shadow: 0 0 20px rgba(255,85,0,0.2); }
        h1 { color: #ff5500; font-size: 24px; }
        select, button { width: 100%; padding: 12px; margin-top: 15px; border-radius: 8px; border: none; font-size: 16px; font-weight: bold; }
        select { background: #333; color: white; }
        button { background: #ff5500; color: white; cursor: pointer; transition: 0.3s; }
        button:hover { background: #cc4400; transform: scale(1.02); }
        button:disabled { background: #555; cursor: not-allowed; }
        #status { margin-top: 20px; font-size: 14px; color: #aaa; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #ff5500; border-radius: 50%; width: 30px; height: 30px; animation: spin 2s linear infinite; margin: 15px auto; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="card">
        <h1>🏮 Panel de Redacción</h1>
        <p>Elige una categoría para el Toro:</p>
        
        <select id="categoria">
            <option value="Nacionales">Nacionales (SDE / RD)</option>
            <option value="Deportes">Deportes (LIDOM / MLB)</option>
            <option value="Economía">Economía</option>
            <option value="Internacionales">Internacionales</option>
            <option value="Tecnología">Tecnología</option>
        </select>

        <button id="btnGenerar" onclick="generarNoticia()">⚡ GENERAR NOTICIA</button>
        
        <div id="loader" class="loader"></div>
        <div id="status">Esperando órdenes, socio...</div>
    </div>

    <script>
        async function generarNoticia() {
            const btn = document.getElementById('btnGenerar');
            const status = document.getElementById('status');
            const loader = document.getElementById('loader');
            const cat = document.getElementById('categoria').value;

            // Bloquear botón y mostrar carga
            btn.disabled = true;
            loader.style.display = 'block';
            status.innerText = `Generando noticia de ${cat}...`;

            try {
                const res = await fetch('/api/generar-noticia', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ categoria: cat })
                });

                const data = await res.json();

                if (data.success) {
                    status.innerHTML = `<b style="color:#00ff00;">✅ ¡LISTO!</b><br>${data.titulo}`;
                } else {
                    status.innerHTML = `<b style="color:#ff3333;">❌ ERROR:</b><br>${data.error}`;
                }
            } catch (err) {
                status.innerHTML = `<b style="color:#ff3333;">❌ FALLO DE CONEXIÓN</b>`;
            } finally {
                btn.disabled = false;
                loader.style.display = 'none';
            }
        }
    </script>

</body>
</html>
