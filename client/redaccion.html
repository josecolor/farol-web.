<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redacción | El Farol al Día</title>
    <style>
        /* (tus estilos originales, intactos) */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0b0b0b; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: #1a1a1a; border-radius: 16px; padding: 30px; border-left: 4px solid #FF8C00; box-shadow: 0 10px 30px rgba(255, 140, 0, 0.2); }
        h1 { color: #FF8C00; margin-bottom: 20px; font-size: 2.2em; text-align: center; }
        h2 { color: #FF8C00; font-size: 1.5em; margin-bottom: 15px; margin-top: 30px; }
        label { display: block; margin: 20px 0 8px; color: #FF8C00; font-weight: bold; font-size: 1.1em; }
        input, select, textarea { width: 100%; padding: 14px 16px; border-radius: 12px; border: 2px solid #333; background: #222; color: white; font-size: 1em; transition: all 0.3s; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #FF8C00; background: #2a2a2a; }
        textarea { min-height: 150px; resize: vertical; }
        .file-area { border: 2px dashed #FF8C00; border-radius: 12px; padding: 30px; text-align: center; background: #222; margin: 15px 0; cursor: pointer; transition: background 0.3s; }
        .file-area:hover { background: #2a2a2a; }
        .file-area span { display: block; font-size: 1.2em; color: #FF8C00; margin-bottom: 10px; }
        .file-area small { color: #888; }
        #preview { width: 100%; max-height: 300px; object-fit: cover; border-radius: 12px; margin-top: 15px; display: none; border: 2px solid #FF8C00; }
        .foto-redactor-preview { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; border: 3px solid #FF8C00; display: none; }
        .foto-redactor-placeholder { width: 70px; height: 70px; border-radius: 50%; background: #222; border: 3px dashed #FF8C00; display: flex; align-items: center; justify-content: center; color: #FF8C00; cursor: pointer; font-size: 2em; }
        .pin-input { background: #222; border: 2px solid #FF8C00; color: white; font-size: 1.5em; letter-spacing: 4px; text-align: center; }
        button { width: 100%; padding: 18px; background: linear-gradient(145deg, #FF8C00, #ffaa33); color: black; border: none; border-radius: 40px; font-size: 1.3em; font-weight: bold; margin: 10px 0; cursor: pointer; transition: 0.2s; text-transform: uppercase; letter-spacing: 1px; }
        button:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(255, 140, 0, 0.6); }
        button:disabled { opacity: 0.6; }
        button.btn-ia { background: linear-gradient(145deg, #4CAF50, #66BB6A); color: white; }
        button.btn-ia:hover:not(:disabled) { box-shadow: 0 8px 20px rgba(76, 175, 80, 0.6); }
        .alert { padding: 15px; border-radius: 40px; margin: 20px 0; text-align: center; font-weight: bold; display: none; }
        .alert.success { background: rgba(76, 175, 80, 0.2); border: 2px solid #4CAF50; color: #4CAF50; }
        .alert.error { background: rgba(244, 67, 54, 0.2); border: 2px solid #f44336; color: #ff6b6b; }
        .alert.info { background: rgba(33, 150, 243, 0.2); border: 2px solid #2196F3; color: #2196F3; }
        .info { color: #888; font-size: 0.9em; margin-top: 5px; }
        hr { border: 1px solid #333; margin: 30px 0; }
        .stats { background: #222; padding: 15px; border-radius: 12px; margin-bottom: 20px; }
        .programacion { background: #222; border-radius: 12px; padding: 20px; margin: 20px 0; border: 1px solid #FF8C00; }
        .radio-group { display: flex; gap: 20px; margin: 10px 0; }
        .radio-group label { display: flex; align-items: center; gap: 5px; color: white; font-weight: normal; }
        .fecha-input { background: #333; border: 2px solid #FF8C00; color: white; padding: 10px; border-radius: 8px; width: 100%; }
        .foto-section { display: flex; align-items: center; gap: 20px; }
        @media (max-width: 600px) { .container { padding: 20px; } h1 { font-size: 1.8em; } }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏮 Redacción del Búnker</h1>
        <div id="alert" class="alert"></div>

        <!-- Formulario manual (opcional, requiere backend adicional) -->
        <form id="formulario">
            <label>📰 Sección</label>
            <select id="seccion" required>
                <option value="">-- Selecciona --</option>
                <option value="Nacionales">🏛️ Nacionales</option>
                <option value="Deportes">⚽ Deportes</option>
                <option value="Internacionales">🌍 Internacionales</option>
                <option value="Economía">💼 Economía</option>
                <option value="Tecnología">💻 Tecnología</option>
                <option value="Espectáculos">🎬 Espectáculos</option>
            </select>

            <label>📝 Título</label>
            <input type="text" id="titulo" placeholder="Título de la noticia" required>

            <label>✍️ Contenido</label>
            <textarea id="contenido" placeholder="Escribe el contenido aquí..." required></textarea>

            <label>📸 Imagen / Video</label>
            <div class="file-area" id="fileArea"><span>📁 Arrastra aquí o haz clic</span><small>JPG, PNG, MP4, WebM - Máx 50MB</small></div>
            <input type="file" id="multimedia" accept="image/*,video/*" style="display: none;">
            <img id="preview">
            <div class="info" id="fileInfo"></div>

            <label>🎓 Redactor</label>
            <input type="text" id="redactor" placeholder="Nombre del redactor (opcional)">

            <label>📸 Foto del Redactor (Carnet)</label>
            <div class="foto-section">
                <div class="foto-redactor-placeholder" id="fotoRedactorPlaceholder">📷</div>
                <img id="fotoRedactorPreview" class="foto-redactor-preview">
                <input type="file" id="fotoRedactorInput" accept="image/*" style="display: none;">
            </div>
            <div class="info" id="fotoRedactorInfo">Toca para añadir foto</div>

            <hr>

            <label>🔍 SEO - Título</label>
            <input type="text" id="seoTitle" placeholder="Título SEO (60 caracteres máximo)">

            <label>🔍 SEO - Descripción</label>
            <textarea id="seoDesc" placeholder="Descripción SEO (160 caracteres máximo)" style="min-height: 80px;"></textarea>

            <label>🔍 SEO - Palabras Clave</label>
            <input type="text" id="seoKeywords" placeholder="palabra1, palabra2, palabra3">

            <hr>

            <label>⏰ Publicación</label>
            <div class="radio-group">
                <label><input type="radio" name="publicacion" value="ahora" checked> Ahora</label>
                <label><input type="radio" name="publicacion" value="programar"> Programar</label>
            </div>
            <div id="campoFecha" style="display: none;">
                <label>📅 Fecha y Hora</label>
                <input type="datetime-local" id="fechaProgramada" class="fecha-input">
            </div>

            <hr>

            <label>🔐 PIN de Autorización</label>
            <input type="password" id="pin" class="pin-input" placeholder="PIN" maxlength="3" required>

            <button type="submit" id="btnPublicar">🚀 PUBLICAR / PROGRAMAR</button>
        </form>

        <hr>

        <!-- Generador IA (funciona con nuestro backend) -->
        <h2>🤖 Generar Noticia con IA</h2>
        <div class="programacion">
            <label>📰 Selecciona Categoría:</label>
            <select id="categoriaIA" required>
                <option value="">-- Elige una categoría --</option>
                <option value="Nacionales">🏛️ Nacionales</option>
                <option value="Deportes">⚽ Deportes</option>
                <option value="Internacionales">🌍 Internacionales</option>
                <option value="Economía">💼 Economía</option>
                <option value="Tecnología">💻 Tecnología</option>
                <option value="Espectáculos">🎬 Espectáculos</option>
            </select>
            <button type="button" id="btnGenerarIA" class="btn-ia">🤖 PROBAR IA - GENERAR NOTICIA AHORA</button>
        </div>
        <div id="alertIA" class="alert" style="margin-top:20px;"></div>

        <hr>

        <h2>📊 Estadísticas</h2>
        <div class="stats" id="stats"><p>Cargando estadísticas...</p></div>

        <h2>🔧 Configuración</h2>
        <div class="programacion">
            <label>Google Analytics ID</label>
            <input type="text" id="analyticsId" placeholder="G-XXXXXXXXXX">
            <button type="button" id="btnGuardarAnalytics" style="margin-top:15px;">💾 GUARDAR ANALYTICS</button>
        </div>
    </div>

    <script>
        // ===== Script de redacción (tus funciones, intactas) =====
        const form = document.getElementById('formulario');
        const btn = document.getElementById('btnPublicar');
        const alertDiv = document.getElementById('alert');
        const fileArea = document.getElementById('fileArea');
        const fileInput = document.getElementById('multimedia');
        const preview = document.getElementById('preview');
        const fileInfo = document.getElementById('fileInfo');
        const fotoInput = document.getElementById('fotoRedactorInput');
        const fotoPreview = document.getElementById('fotoRedactorPreview');
        const fotoPlaceholder = document.getElementById('fotoRedactorPlaceholder');
        const fotoInfo = document.getElementById('fotoRedactorInfo');
        const radioAhora = document.querySelector('input[value="ahora"]');
        const radioProgramar = document.querySelector('input[value="programar"]');
        const campoFecha = document.getElementById('campoFecha');
        const fechaInput = document.getElementById('fechaProgramada');

        radioProgramar.addEventListener('change', () => campoFecha.style.display = 'block');
        radioAhora.addEventListener('change', () => campoFecha.style.display = 'none');

        let imagenBase64 = "";
        let fotoRedactorBase64 = "";

        fileArea.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            fileInfo.textContent = '⏳ Comprimiendo...';
            if (file.type.startsWith('video/')) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    imagenBase64 = e.target.result;
                    preview.src = imagenBase64;
                    preview.style.display = 'block';
                    fileInfo.textContent = `✅ Video listo (${(imagenBase64.length / (1024 * 1024)).toFixed(2)} MB)`;
                };
                reader.readAsDataURL(file);
            } else {
                try {
                    imagenBase64 = await comprimirImagen(file, 720);
                    preview.src = imagenBase64;
                    preview.style.display = 'block';
                    fileInfo.textContent = `✅ Imagen lista (${(imagenBase64.length / (1024 * 1024)).toFixed(2)} MB)`;
                } catch (err) {
                    fileInfo.textContent = '❌ Error al comprimir la imagen';
                }
            }
        });

        fotoInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            fotoInfo.textContent = '⏳ Comprimiendo foto...';
            try {
                fotoRedactorBase64 = await comprimirImagen(file, 150);
                fotoPreview.src = fotoRedactorBase64;
                fotoPreview.style.display = 'block';
                fotoPlaceholder.style.display = 'none';
                fotoInfo.textContent = '✅ Foto lista (carnet profesional)';
            } catch (err) {
                fotoInfo.textContent = '❌ Error al comprimir la foto';
            }
        });

        fotoPlaceholder.addEventListener('click', () => fotoInput.click());

        function comprimirImagen(file, maxWidth) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        if (width > maxWidth) {
                            height = (height * maxWidth) / width;
                            width = maxWidth;
                        }
                        canvas.width = width;
                        canvas.height = height;
                        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                        canvas.toBlob((blob) => {
                            const reader2 = new FileReader();
                            reader2.onload = () => resolve(reader2.result);
                            reader2.readAsDataURL(blob);
                        }, 'image/webp', 0.8);
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const titulo = document.getElementById('titulo').value.trim();
            const seccion = document.getElementById('seccion').value;
            const contenido = document.getElementById('contenido').value.trim();
            const redactor = document.getElementById('redactor').value.trim() || 'mxl';
            const pin = document.getElementById('pin').value.trim();

            if (!titulo || !seccion || !contenido) { mostrarAlerta('❌ Faltan campos obligatorios', 'error'); return; }
            if (pin !== '311') { mostrarAlerta('❌ PIN incorrecto', 'error'); return; }

            let fechaProgramada = null;
            if (radioProgramar.checked) {
                fechaProgramada = fechaInput.value;
                if (!fechaProgramada) { mostrarAlerta('❌ Debes seleccionar una fecha para programar', 'error'); return; }
            }

            btn.disabled = true;
            btn.textContent = '⏳ PROCESANDO...';

            const noticia = {
                pin, titulo, seccion, contenido, ubicacion: '', redactor,
                redactorFoto: fotoRedactorBase64 || null,
                imagen: imagenBase64 || null,
                seoTitle: document.getElementById('seoTitle').value.trim() || undefined,
                seoDesc: document.getElementById('seoDesc').value.trim() || undefined,
                seoKeywords: document.getElementById('seoKeywords').value.trim() || undefined,
                fechaProgramada: fechaProgramada || undefined
            };

            try {
                const res = await fetch('/api/publicar', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(noticia) });
                const data = await res.json();
                if (data.success) {
                    mostrarAlerta(data.message, 'success');
                    form.reset();
                    preview.style.display = 'none';
                    fotoPreview.style.display = 'none';
                    fotoPlaceholder.style.display = 'flex';
                    imagenBase64 = ''; fotoRedactorBase64 = '';
                    fileInfo.textContent = ''; fotoInfo.textContent = 'Toca para añadir foto';
                    campoFecha.style.display = 'none';
                    radioAhora.checked = true;
                    if (data.message.includes('programada')) { setTimeout(() => window.location.reload(), 2000); }
                    else { setTimeout(() => window.location.href = '/', 2000); }
                } else { mostrarAlerta('❌ Error: ' + data.error, 'error'); }
            } catch (error) { mostrarAlerta('❌ Error de conexión', 'error'); }
            finally { btn.disabled = false; btn.textContent = '🚀 PUBLICAR / PROGRAMAR'; }
        });

        function mostrarAlerta(mensaje, tipo) {
            alertDiv.textContent = mensaje;
            alertDiv.className = `alert ${tipo}`;
            alertDiv.style.display = 'block';
            setTimeout(() => alertDiv.style.display = 'none', 4000);
        }

        // ===== Generador IA (funciona) =====
        const btnIA = document.getElementById('btnGenerarIA');
        const alertIA = document.getElementById('alertIA');
        const categoriaIA = document.getElementById('categoriaIA');

        btnIA.addEventListener('click', async () => {
            const categoria = categoriaIA.value;
            if (!categoria) { mostrarAlertaIA('⚠️ Por favor selecciona una categoría', 'error'); return; }
            btnIA.disabled = true;
            btnIA.textContent = '⏳ GENERANDO...';
            mostrarAlertaIA(`ℹ️ Generando noticia de ${categoria}...`, 'info');

            try {
                const res = await fetch('/api/generar-noticia', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ categoria })
                });
                const data = await res.json();
                if (data.success) {
                    mostrarAlertaIA(`✅ Noticia generada. <a href="/noticia/${data.slug}" target="_blank" style="color: inherit; text-decoration: underline;">Ver noticia</a>`, 'success');
                    categoriaIA.value = '';
                } else { mostrarAlertaIA(`❌ Error: ${data.error || 'No se pudo generar'}`, 'error'); }
            } catch (error) { mostrarAlertaIA(`❌ Error: ${error.message}`, 'error'); }
            finally { btnIA.disabled = false; btnIA.textContent = '🤖 PROBAR IA - GENERAR NOTICIA AHORA'; }
        });

        function mostrarAlertaIA(mensaje, tipo) {
            alertIA.innerHTML = mensaje;
            alertIA.className = `alert ${tipo}`;
            alertIA.style.display = 'block';
            setTimeout(() => alertIA.style.display = 'none', 5000);
        }

        // ===== Analytics y estadísticas (opcional) =====
        (async function () {
            try {
                const res = await fetch('/api/configuracion');
                const data = await res.json();
                if (data.success && data.config.googleAnalytics) document.getElementById('analyticsId').value = data.config.googleAnalytics;
            } catch (e) {}
        })();

        document.getElementById('btnGuardarAnalytics').addEventListener('click', async () => {
            const pin = document.getElementById('pin').value.trim();
            if (pin !== '311') { mostrarAlerta('❌ PIN incorrecto', 'error'); return; }
            const googleAnalytics = document.getElementById('analyticsId').value;
            const res = await fetch('/api/configuracion', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ pin, googleAnalytics })
            });
            const data = await res.json();
            if (data.success) mostrarAlerta('✅ Analytics guardado', 'success');
            else mostrarAlerta('❌ Error: ' + data.error, 'error');
        });

        (async function () {
            try {
                const res = await fetch('/api/estadisticas');
                const data = await res.json();
                if (data.success) {
                    document.getElementById('stats').innerHTML = `<p>📰 Noticias publicadas: <strong>${data.totalNoticias}</strong></p><p>👁️ Vistas totales: <strong>${data.totalVistas}</strong></p>`;
                } else { document.getElementById('stats').innerHTML = '<p>Error al cargar estadísticas</p>'; }
            } catch (e) { document.getElementById('stats').innerHTML = '<p>Error al cargar estadísticas</p>'; }
        })();
    </script>
</body>
</html>
