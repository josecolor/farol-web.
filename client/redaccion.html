<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redacción | El Farol al Día</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Lora:ital,wght@0,400;0,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* 🎨 ESTILOS ORIGINALES DE EL FAROL */
:root {
  --fuego:  #FF5500;
  --fuego2: #FF7A00;
  --negro:  #080808;
  --tinta:  #0E0E12;
  --papel:  #141418;
  --borde:  #1E1E26;
  --crema:  #EDE8DF;
  --crema2: #A89F94;
  --muted:  #4E4E58;
  --verde:  #22C55E;
  --rojo:   #EF4444;
  --azul:   #3B82F6;
  --glow:   rgba(255,85,0,.35);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Lora',Georgia,serif;background:var(--negro);color:var(--crema);min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 50% at 100% 0%,rgba(255,85,0,.06) 0%,transparent 55%),radial-gradient(ellipse 40% 30% at 0% 100%,rgba(255,85,0,.03) 0%,transparent 50%);pointer-events:none;z-index:0}

/* HEADER & TICKER */
header{background:rgba(8,8,8,.98);border-bottom:2px solid var(--fuego);position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);box-shadow:0 4px 30px rgba(255,85,0,.15)}
.header-inner{max-width:1280px;margin:0 auto;padding:0 28px;height:62px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:12px;text-decoration:none}
.logo-flame{width:40px;height:40px;background:linear-gradient(135deg,var(--fuego),var(--fuego2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 0 20px var(--glow)}
.logo-text h1{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:4px;color:var(--fuego);line-height:1}
.logo-text span{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--muted);display:block}
.ticker{background:var(--fuego);height:30px;display:flex;align-items:center;overflow:hidden}
.ticker-tag{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:2px;background:rgba(0,0,0,.3);color:#fff;padding:0 16px;height:100%;display:flex;align-items:center;flex-shrink:0}
.ticker-inner{display:inline-flex;gap:48px;white-space:nowrap;animation:scroll 25s linear infinite;font-family:'JetBrains Mono',monospace;font-size:11px;color:rgba(255,255,255,.9)}
@keyframes scroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

/* LAYOUT & CARDS */
.container{max-width:1280px;margin:0 auto;padding:32px 28px 60px;position:relative;z-index:1}
.layout{display:grid;grid-template-columns:1fr 340px;gap:24px;align-items:start}
.card{background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.06);border-radius:12px;overflow:hidden;margin-bottom:20px;backdrop-filter:blur(16px);box-shadow:0 4px 24px rgba(0,0,0,.4)}
.card-header{padding:16px 22px;border-bottom:1px solid rgba(255,255,255,.05);background:rgba(255,255,255,.015)}
.card-header h2{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:3px;color:var(--fuego)}
.card-body{padding:22px}

/* FORM ELEMENTS */
.fgroup{margin-bottom:18px}
.fgroup label{display:block;margin-bottom:7px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--muted)}
textarea, select, input{width:100%;padding:11px 14px;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.07);color:var(--crema);border-radius:8px;font-family:inherit}
.btn-orange{width:100%;padding:12px;background:linear-gradient(135deg,var(--fuego),var(--fuego2));color:#fff;border:none;border-radius:8px;font-family:'Bebas Neue',sans-serif;letter-spacing:2px;cursor:pointer}
.msg{padding:10px;border-radius:6px;margin-top:10px;font-size:12px;display:none}
.msg.ok{background:rgba(34,197,94,.1);color:var(--verde);display:block}
.msg.err{background:rgba(239,68,68,.1);color:var(--rojo);display:block}

/* IA SWITCH */
.ia-row{display:flex;align-items:center;justify-content:space-between;background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:16px;margin-bottom:20px}
.switch{position:relative;display:inline-block;width:56px;height:30px}
.switch input{opacity:0;width:0;height:0}
.slider{position:absolute;cursor:pointer;inset:0;background:#222;border-radius:30px;transition:.3s;border:1px solid rgba(255,255,255,.08)}
.slider:before{content:'';position:absolute;height:22px;width:22px;left:3px;bottom:3px;background:var(--muted);border-radius:50%;transition:.3s}
input:checked+.slider:before{transform:translateX(26px);background:var(--verde)}

/* LISTAS */
.noticias-list, .memoria-list{display:flex;flex-direction:column;gap:8px;max-height:400px;overflow-y:auto}
.mem-row{display:flex;align-items:center;gap:10px;background:rgba(0,0,0,.3);padding:10px;border-radius:8px}
.mem-tipo{font-size:10px;padding:2px 6px;background:var(--azul);border-radius:4px}
.mem-valor{font-family:'JetBrains Mono',monospace;font-size:11px;flex:1}

@media(max-width:900px){.layout{grid-template-columns:1fr}}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="/" class="logo">
      <div class="logo-flame">🏮</div>
      <div class="logo-text"><h1>EL FAROL AL DÍA</h1><span>SALA DE REDACCIÓN</span></div>
    </a>
    <span id="reloj" style="font-family:'JetBrains Mono',monospace;color:var(--muted)">00:00:00</span>
  </div>
</header>

<div class="ticker">
  <div class="ticker-tag">🏮 VIVO</div>
  <div class="ticker-inner">
    <span>CONECTADO A SUPABASE ✅</span><span>//</span><span>GEMINI 2.5 FLASH ACTIVO ✨</span><span>//</span><span>FOCO: SANTO DOMINGO ESTE 🇩🇴</span>
  </div>
</div>

<div class="container">
  <div class="layout">
    
    <div>
      <div class="card">
        <div class="card-header"><h2>⚙️ CONTROL DE IA</h2></div>
        <div class="card-body">
          <div class="ia-row" id="iaRow">
            <span style="font-size:24px">🏮</span>
            <div style="flex:1;margin-left:15px">
              <div style="font-family:'Bebas Neue';letter-spacing:1px">ESTADO DEL CEREBRO</div>
              <div id="iaStatus" style="font-size:11px;color:var(--rojo)">● DESCONECTADO</div>
            </div>
            <label class="switch">
              <input type="checkbox" id="iaToggle" onchange="actualizarIA()">
              <span class="slider"></span>
            </label>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
