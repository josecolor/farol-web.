<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Redacción Móvil 🏮</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0b0b0b;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 12px;
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        /* BOTONES GIGANTES PARA PULGAR */
        .btn-gigante {
            width: 100%;
            padding: 22px;
            font-size: 1.4em;
            font-weight: bold;
            border: none;
            border-radius: 60px;
            background: linear-gradient(145deg, #FF8C00, #ff6b35);
            color: white;
            margin: 15px 0;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(255, 140, 0, 0.4);
            transition: transform 0.1s ease;
            letter-spacing: 1px;
        }

        .btn-gigante:active {
            transform: scale(0.97);
        }

        .btn-gigante:disabled {
            opacity: 0.6;
            transform: none;
        }

        .btn-secundario {
            width: 100%;
            padding: 18px;
            font-size: 1.2em;
            border: 2px solid #FF8C00;
            border-radius: 50px;
            background: transparent;
            color: #FF8C00;
            margin: 8px 0;
            cursor: pointer;
            font-weight: bold;
        }

        /* CAMPOS GIGANTES */
        input, textarea, select {
            width: 100%;
            padding: 18px 20px;
            font-size: 1.2em;
            border-radius: 30px;
            border: 2px solid #333;
            background: #1a1a1a;
            color: white;
            margin: 8px 0;
            -webkit-appearance: none;
        }

        textarea {
            min-height: 200px;
            border-radius: 25px;
            font-size: 1.2em;
            line-height: 1.5;
        }

        label {
            display: block;
            font-size: 1.1em;
            color: #FF8C00;
            font-weight: bold;
            margin-top: 20px;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
        }

        /* SUBIDA DE ARCHIVOS - ÁREA GIGANTE */
        .file-area {
            border: 3px dashed #FF8C00;
            border-radius: 40px;
            padding: 30px 20px;
            text-align: center;
            background: #1a1a1a;
            margin: 15px 0;
            cursor: pointer;
        }

        .file-area span {
            display: block;
            font-size: 1.3em;
            color: #FF8C00;
            margin-bottom: 10px;
        }

        .file-area small {
            color: #888;
            font-size: 0.9em;
        }

        #preview, #previewVideo {
            width: 100%;
            max-height: 300px;
            border-radius: 25px;
            margin: 15px 0;
            display: none;
            background: #000;
        }

        /* CONTADOR DE CARACTERES */
        .char-count {
            text-align: right;
            color: #888;
            font-size: 0.9em;
            margin-top: 5px;
            margin-bottom: 10px;
        }

        /* ALERTAS */
        .alert {
            padding: 20px;
            border-radius: 30px;
            margin: 15px 0;
            font-size: 1.2em;
            font-weight: bold;
            text-align: center;
            display: none;
        }

        .alert.success {
            background: rgba(76, 175, 80, 0.2);
            border: 2px solid #4CAF50;
            color: #4CAF50;
        }

        .alert.error {
            background: rgba(244, 67, 54, 0.2);
            border: 2px solid #f44336;
            color: #ff6b6b;
        }

        /* AUTO-GUARDADO INDICADOR */
        .autosave {
            text-align: center;
            color: #4CAF50;
            font-size: 0.9em;
            margin: 10px 0;
            display: none;
        }

        /* HEADER */
        h1 {
            text-align: center;
            color: #FF8C00;
            font-size: 2.2em;
            margin: 20px 0;
            text-shadow: 0 0 15px rgba(255, 140, 0, 0.5);
        }

        .subtitle {
            text-align: center;
            color: #aaa;
            margin-bottom: 25px;
        }

        /* GRID PARA BOTONES PEQUEÑOS */
        .button-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 20px 0;
        }

        .button-grid button {
            padding: 15px;
            font-size: 1.1em;
            border-radius: 40px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏮 REDACCIÓN</h1>
        <p class="subtitle">Toca cualquier campo - Todo es gigante</p>

        <!-- AUTO-GUARDADO INDICADOR -->
        <div id="autosaveIndicator" class="autosave">✅ Borrador guardado</div>

        <!-- ALERTAS -->
        <div id="alert" class="alert"></div>

        <!-- FORMULARIO PRINCIPAL -->
        <form id="formulario" onsubmit="event.preventDefault(); publicarNoticia();">
            <label>📰 SECCIÓN</label>
            <select id="seccion" required>
                <option value="Nacionales">🇩🇴 Nacionales</option>
                <option value="Deportes">⚽ Deportes</option>
                <option value="Internacionales">🌍 Internacionales</option>
                <option value="Espectáculos">🎬 Espectáculos</option>
                <option value="Economía">💼 Economía</option>
            </select>

            <label>📝 TÍTULO</label>
            <input type="text" id="titulo" placeholder="Título de la noticia" maxlength="200">
            <div class="char-count"><span id="tituloCount">0</span>/200</div>

            <label>✍️ CONTENIDO</label>
            <textarea id="contenido" placeholder="Escribe la noticia aquí..." maxlength="10000"></textarea>
            <div class="char-count"><span id="contenidoCount">0</span>/10000</div>

            <label>📍 UBICACIÓN (opcional)</label>
            <input type="text" id="ubicacion" placeholder="Ej: Santo Domingo Este">

            <label>👤 REDACTOR</label>
            <input type="text" id="redactor" value="mxl">

            <!-- ÁREA DE SUBIDA GIGANTE -->
            <label>🎬 MULTIMEDIA</label>
            <div class="file-area" id="fileArea">
                <span>📸 + 🎥</span>
                <small>Toca para elegir foto o video<br>Se comprime automáticamente</small>
            </div>
            <input type="file" id="multimedia" accept="image/*,video/mp4" style="display: none;">
            
            <!-- PREVIEWS -->
            <img id="preview">
            <video id="previewVideo" controls></video>
            <div id="fileInfo" style="color: #888; text-align: center; margin: 10px;"></div>

            <label>🔐 PIN</label>
            <input type="password" id="pin" placeholder="311" maxlength="6" value="311">

            <!-- BOTÓN GIGANTE DE PUBLICAR -->
            <button id="btnPublicar" class="btn-gigante" type="submit">🚀 PUBLICAR AHORA</button>

            <!-- BOTONES SECUNDARIOS -->
            <div class="button-grid">
                <button class="btn-secundario" type="button" onclick="cargarBorrador()">📂 Cargar</button>
                <button class="btn-secundario" type="button" onclick="limpiarFormulario()">🗑️ Limpiar</button>
            </div>
        </form>

        <!-- LISTA DE NOTICIAS RECIENTES PARA EDITAR -->
        <div style="margin-top: 40px;">
            <h2 style="color: #FF8C00; margin-bottom: 20px;">✏️ EDITAR RÁPIDO</h2>
            <div id="noticiasRecientes"></div>
        </div>
    </div>

    <script>
        // ==================== VARIABLES ====================
        let multimediaBase64 = "";
        const STORAGE_KEY = 'borrador_noticia';

        // ==================== AUTO-GUARDADO ====================
        function autoGuardar() {
            const borrador = {
                seccion: document.getElementById('seccion').value,
                titulo: document.getElementById('titulo').value,
                contenido: document.getElementById('contenido').value,
                ubicacion: document.getElementById('ubicacion').value,
                redactor: document.getElementById('redactor').value,
                timestamp: new Date().getTime()
            };
            
            localStorage.setItem(STORAGE_KEY, JSON.stringify(borrador));
            
            // Mostrar indicador
            document.getElementById('autosaveIndicator').style.display = 'block';
            setTimeout(() => {
                document.getElementById('autosaveIndicator').style.display = 'none';
            }, 2000);
        }

        // Cargar borrador automático
        function cargarBorrador() {
            const guardado = localStorage.getItem(STORAGE_KEY);
            if (guardado) {
                try {
                    const borrador = JSON.parse(guardado);
                    document.getElementById('seccion').value = borrador.seccion || '';
                    document.getElementById('titulo').value = borrador.titulo || '';
                    document.getElementById('contenido').value = borrador.contenido || '';
                    document.getElementById('ubicacion').value = borrador.ubicacion || '';
                    document.getElementById('redactor').value = borrador.redactor || 'mxl';
                    
                    mostrarAlerta('✅ Borrador cargado', 'success');
                } catch (e) {
                    console.error('Error cargando borrador');
                }
            } else {
                mostrarAlerta('❌ No hay borrador guardado', 'error');
            }
        }

        // Event listeners para auto-guardado
        ['titulo', 'contenido', 'ubicacion', 'redactor', 'seccion'].forEach(id => {
            document.getElementById(id).addEventListener('input', autoGuardar);
        });

        // ==================== CONTADORES ====================
        document.getElementById('titulo').addEventListener('input', (e) => {
            document.getElementById('tituloCount').textContent = e.target.value.length;
            autoGuardar();
        });

        document.getElementById('contenido').addEventListener('input', (e) => {
            document.getElementById('contenidoCount').textContent = e.target.value.length;
            autoGuardar();
        });

        // ==================== SUBIDA MULTIMEDIA ====================
        document.getElementById('fileArea').addEventListener('click', () => {
            document.getElementById('multimedia').click();
        });

        document.getElementById('multimedia').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            try {
                document.getElementById('fileInfo').textContent = '⏳ Comprimiendo...';
                
                // Comprimir según tipo
                if (file.type.startsWith('video/')) {
                    multimediaBase64 = await comprimirVideo(file);
                    document.getElementById('preview').style.display = 'none';
                    document.getElementById('previewVideo').src = multimediaBase64;
                    document.getElementById('previewVideo').style.display = 'block';
                } else {
                    multimediaBase64 = await comprimirImagen(file);
                    document.getElementById('previewVideo').style.display = 'none';
                    document.getElementById('preview').src = multimediaBase64;
                    document.getElementById('preview').style.display = 'block';
                }
                
                const sizeMB = (multimediaBase64.length / (1024 * 1024)).toFixed(2);
                document.getElementById('fileInfo').textContent = `✅ Listo | ${sizeMB}MB`;
            } catch (error) {
                mostrarAlerta('❌ Error: ' + error.message, 'error');
                document.getElementById('fileInfo').textContent = '';
            }
        });

        // ==================== COMPRESIÓN ====================
        function comprimirImagen(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        
                        // Reducir a máximo 720p
                        if (width > 720) {
                            height = (height * 720) / width;
                            width = 720;
                        }
                        
                        canvas.width = width;
                        canvas.height = height;
                        
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        // Convertir a WebP con calidad 0.8
                        canvas.toBlob((blob) => {
                            const reader2 = new FileReader();
                            reader2.onload = () => resolve(reader2.result);
                            reader2.readAsDataURL(blob);
                        }, 'image/webp', 0.8);
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        function comprimirVideo(file) {
            return new Promise((resolve) => {
                // Por ahora solo leer el video directamente
                // En producción usarías FFmpeg.js o similar
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.readAsDataURL(file);
            });
        }

        // ==================== PUBLICAR ====================
        async function publicarNoticia() {
            const titulo = document.getElementById('titulo').value.trim();
            const seccion = document.getElementById('seccion').value;
            const contenido = document.getElementById('contenido').value.trim();
            const ubicacion = document.getElementById('ubicacion').value.trim();
            const redactor = document.getElementById('redactor').value.trim();
            const pin = document.getElementById('pin').value;

            if (!titulo || !seccion || !contenido) {
                mostrarAlerta('❌ Faltan campos obligatorios', 'error');
                return;
            }

            if (pin !== '311') {
                mostrarAlerta('❌ PIN incorrecto', 'error');
                return;
            }

            document.getElementById('btnPublicar').disabled = true;
            document.getElementById('btnPublicar').textContent = '⏳ PUBLICANDO...';

            try {
                const res = await fetch('/publicar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        titulo, seccion, contenido, ubicacion, redactor,
                        imagen: multimediaBase64, pin
                    })
                });

                const data = await res.json();

                if (data.success) {
                    mostrarAlerta('✅ ¡PUBLICADO! 🏮', 'success');
                    // Limpiar auto-guardado
                    localStorage.removeItem(STORAGE_KEY);
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 2000);
                } else {
                    mostrarAlerta('❌ Error: ' + data.error, 'error');
                }
            } catch (error) {
                mostrarAlerta('❌ Error de red', 'error');
            } finally {
                document.getElementById('btnPublicar').disabled = false;
                document.getElementById('btnPublicar').textContent = '🚀 PUBLICAR AHORA';
            }
        }

        // ==================== CARGAR NOTICIAS RECIENTES ====================
        async function cargarNoticiasRecientes() {
            try {
                const res = await fetch('/noticias?limit=5');
                const data = await res.json();
                
                if (data.success) {
                    const container = document.getElementById('noticiasRecientes');
                    container.innerHTML = '';
                    
                    data.noticias.forEach(noticia => {
                        const card = document.createElement('div');
                        card.style.cssText = `
                            background: #1a1a1a;
                            border-radius: 30px;
                            padding: 18px;
                            margin-bottom: 12px;
                            border-left: 5px solid #FF8C00;
                        `;
                        
                        const fecha = new Date(noticia.fecha).toLocaleDateString();
                        
                        card.innerHTML = `
                            <div style="font-size: 1.2em; font-weight: bold; margin-bottom: 8px;">
                                ${noticia.titulo.substring(0, 50)}${noticia.titulo.length > 50 ? '...' : ''}
                            </div>
                            <div style="color: #888; margin-bottom: 12px;">
                                ${noticia.seccion} | ${fecha} | 👁️ ${noticia.vistas || 0}
                            </div>
                            <button class="btn-secundario" style="padding: 12px;" 
                                    onclick="editarNoticia('${noticia._id}')">
                                ✏️ Editar
                            </button>
                        `;
                        
                        container.appendChild(card);
                    });
                }
            } catch (error) {
                console.error('Error cargando noticias');
            }
        }

        function editarNoticia(id) {
            window.location.href = '/redaccion?edit=' + id;
        }

        // ==================== LIMPIAR ====================
        function limpiarFormulario() {
            document.getElementById('titulo').value = '';
            document.getElementById('contenido').value = '';
            document.getElementById('ubicacion').value = '';
            document.getElementById('multimedia').value = '';
            document.getElementById('preview').style.display = 'none';
            document.getElementById('previewVideo').style.display = 'none';
            document.getElementById('fileInfo').textContent = '';
            multimediaBase64 = '';
            document.getElementById('tituloCount').textContent = '0';
            document.getElementById('contenidoCount').textContent = '0';
            
            mostrarAlerta('🧹 Formulario limpio', 'success');
        }

        // ==================== ALERTAS ====================
        function mostrarAlerta(mensaje, tipo) {
            const alertBox = document.getElementById('alert');
            alertBox.textContent = mensaje;
            alertBox.className = `alert ${tipo}`;
            alertBox.style.display = 'block';
            
            setTimeout(() => {
                alertBox.style.display = 'none';
            }, 3000);
        }

        // ==================== CARGAR PARÁMETRO EDIT ====================
        function cargarParametroURL() {
            const params = new URLSearchParams(window.location.search);
            const editId = params.get('edit');
            
            if (editId) {
                cargarNoticiaParaEditar(editId);
            }
        }

        async function cargarNoticiaParaEditar(id) {
            try {
                const res = await fetch(`/noticia/${id}`);
                const data = await res.json();
                
                if (data.success) {
                    const n = data.noticia;
                    document.getElementById
