<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- META_TAGS -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0b0b0b;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            background: #1a1a1a;
            border-bottom: 4px solid #FF8C00;
            padding: 1rem 0;
            box-shadow: 0 2px 10px rgba(255, 140, 0, 0.2);
        }
        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .logo a {
            color: #FF8C00;
            text-decoration: none;
            font-size: 2rem;
            font-weight: bold;
        }
        nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-weight: 500;
            transition: color 0.3s;
        }
        nav a:hover {
            color: #FF8C00;
        }
        main {
            padding: 40px 0;
        }
        .noticia-completa {
            background: #1a1a1a;
            border-radius: 16px;
            padding: 30px;
            border-left: 4px solid #FF8C00;
            box-shadow: 0 10px 30px rgba(255, 140, 0, 0.2);
        }
        .noticia-header {
            margin-bottom: 30px;
        }
        .seccion {
            display: inline-block;
            background: #FF8C00;
            color: black;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            margin-bottom: 15px;
        }
        h1 {
            font-size: 2.5rem;
            color: #FF8C00;
            margin-bottom: 15px;
            line-height: 1.2;
        }
        .meta {
            display: flex;
            gap: 20px;
            color: #aaa;
            font-size: 0.95rem;
            flex-wrap: wrap;
        }
        .meta span {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .noticia-imagen {
            margin: 30px 0;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid #FF8C00;
        }
        .noticia-imagen img {
            width: 100%;
            max-height: 500px;
            object-fit: cover;
            display: block;
        }
        .noticia-contenido {
            font-size: 1.1rem;
            line-height: 1.8;
            color: #e0e0e0;
        }
        .noticia-contenido p {
            margin-bottom: 20px;
        }
        .noticia-footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #333;
        }
        .compartir {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .compartir h3 {
            color: #FF8C00;
            font-size: 1.1rem;
        }
        .compartir a {
            display: inline-block;
            padding: 8px 20px;
            background: #222;
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-size: 0.9rem;
            transition: all 0.3s;
            border: 1px solid #FF8C00;
        }
        .compartir a:hover {
            background: #FF8C00;
            color: black;
            transform: translateY(-2px);
        }
        
        /* ===== ESTILOS PARA NOTICIAS RELACIONADAS ===== */
        .noticias-relacionadas {
            margin-top: 50px;
            background: #1a1a1a;
            border-radius: 16px;
            padding: 30px;
            border-left: 4px solid #FF8C00;
            box-shadow: 0 10px 30px rgba(255, 140, 0, 0.2);
        }
        .noticias-relacionadas h3 {
            color: #FF8C00;
            margin-bottom: 25px;
            font-size: 1.8rem;
        }
        .relacionadas {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }
        .relacionada-item {
            background: #222;
            border-radius: 12px;
            padding: 15px;
            transition: all 0.3s;
            border-left: 3px solid #FF8C00;
        }
        .relacionada-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(255, 140, 0, 0.3);
        }
        .relacionada-item a {
            text-decoration: none;
            color: inherit;
        }
        .relacionada-item img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 10px;
            border: 1px solid #333;
        }
        .relacionada-item h4 {
            color: #FF8C00;
            margin-bottom: 5px;
            font-size: 1rem;
        }
        .relacionada-item span {
            color: #aaa;
            font-size: 0.85rem;
        }
        
        footer {
            background: #1a1a1a;
            color: #aaa;
            text-align: center;
            padding: 20px 0;
            margin-top: 40px;
            border-top: 1px solid #333;
        }
        @media (max-width: 768px) {
            header .container {
                flex-direction: column;
                gap: 15px;
            }
            nav a {
                margin: 0 10px;
            }
            h1 {
                font-size: 1.8rem;
            }
            .meta {
                flex-direction: column;
                gap: 10px;
            }
            .compartir {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1 class="logo"><a href="/">🏮 El Farol al Día</a></h1>
            <nav>
                <a href="/">Inicio</a>
                <a href="/redaccion">Redacción</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <article class="noticia-completa">
            <div class="noticia-header">
                <span class="seccion">{{SECCION}}</span>
                <h1>{{TITULO}}</h1>
                <div class="meta">
                    <span class="fecha">📅 {{FECHA}}</span>
                    <span class="redactor">✍️ {{REDACTOR}}</span>
                    <span class="vistas">👁️ {{VISTAS}} vistas</span>
                </div>
            </div>

            <div class="noticia-imagen">
                <img src="{{IMAGEN}}" alt="{{ALT}}" loading="lazy" onerror="this.src='https://images.pexels.com/photos/3052454/pexels-photo-3052454.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=2'">
            </div>

            <div class="noticia-contenido">
                {{CONTENIDO}}
            </div>

            <div class="noticia-footer">
                <div class="compartir">
                    <h3>Compartir esta noticia:</h3>
                    <a href="https://www.facebook.com/sharer/sharer.php?u={{URL}}" target="_blank" rel="noopener">Facebook</a>
                    <a href="https://twitter.com/intent/tweet?text={{TITULO}}&url={{URL}}" target="_blank" rel="noopener">Twitter</a>
                    <a href="https://wa.me/?text={{TITULO}}%20{{URL}}" target="_blank" rel="noopener">WhatsApp</a>
                </div>
            </div>
        </article>

        <!-- NOTICIAS RELACIONADAS -->
        <aside class="noticias-relacionadas">
            <!-- RELACIONADAS -->
        </aside>
    </main>

    <footer>
        <div class="container">
            <p>© 2026 El Farol al Día - Noticias con IA</p>
        </div>
    </footer>

    <script>
        // Actualizar enlaces de compartir con la URL actual
        const urlActual = window.location.href;
        const tituloActual = document.querySelector('h1')?.textContent || 'Noticia';
        
        document.querySelectorAll('.compartir a').forEach(link => {
            let href = link.getAttribute('href');
            href = href.replace('{{URL}}', encodeURIComponent(urlActual));
            href = href.replace('{{TITULO}}', encodeURIComponent(tituloActual));
            link.setAttribute('href', href);
        });
    </script>
</body>
</html>
