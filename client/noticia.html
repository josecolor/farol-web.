<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    
    <!-- ==================== META TAGS (GENERADOS POR SERVIDOR) ==================== -->
    <title>{{TITULO}} - El Farol al Día</title>
    
    <!-- Open Graph / Facebook / WhatsApp -->
    <meta property="og:title" content="{{TITULO}}">
    <meta property="og:description" content="{{DESCRIPCION}}">
    <meta property="og:image" content="{{IMAGEN}}">
    <meta property="og:url" content="{{URL}}">
    <meta property="og:type" content="article">
    <meta property="og:site_name" content="El Farol al Día">
    
    <!-- Twitter Cards -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{TITULO}}">
    <meta name="twitter:description" content="{{DESCRIPCION}}">
    <meta name="twitter:image" content="{{IMAGEN}}">
    
    <!-- SEO -->
    <meta name="description" content="{{DESCRIPCION}}">
    
    <!-- Schema.org para Google -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "NewsArticle",
        "headline": "{{TITULO}}",
        "image": "{{IMAGEN}}",
        "datePublished": "{{FECHA_ISO}}",
        "description": "{{DESCRIPCION}}",
        "author": {
            "@type": "Person",
            "name": "{{REDACTOR}}"
        },
        "publisher": {
            "@type": "Organization",
            "name": "El Farol al Día",
            "logo": {
                "@type": "ImageObject",
                "url": "https://elfarolaldia.com/logo.png"
            }
        }
    }
    </script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0b0b0b;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 15px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
        }
        
        .noticia-completa {
            background: #1a1a1a;
            border-radius: 30px;
            padding: 25px;
            border-left: 5px solid #FF8C00;
            position: relative;
        }
        
        .share-icon-large {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            background: #FF8C00;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8em;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255,140,0,0.6);
            border: 3px solid white;
            z-index: 10;
        }
        
        .share-icon-large:active {
            transform: scale(0.9);
        }
        
        .share-menu {
            display: none;
            position: absolute;
            top: 90px;
            right: 20px;
            background: #222;
            border-radius: 25px;
            padding: 15px;
            z-index: 20;
            border: 2px solid #FF8C00;
            box-shadow: 0 5px 20px rgba(0,0,0,0.7);
            min-width: 250px;
        }
        
        .share-menu.active {
            display: block;
        }
        
        .share-menu-item {
            padding: 18px 20px;
            border-radius: 15px;
            margin: 8px 0;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 1.2em;
        }
        
        .share-menu-item:active {
            background: #333;
        }
        
        .share-wa { color: #25D366; }
        .share-fb { color: #1877F2; }
        .share-tw { color: #1DA1F2; }
        .share-tg { color: #0088cc; }
        .share-link { color: #aaa; }
        
        .noticia-fecha {
            color: #888;
            font-size: 0.9em;
            margin-bottom: 10px;
            padding-right: 70px;
        }
        
        .noticia-titulo {
            font-size: 2em;
            font-weight: bold;
            color: #FF8C00;
            margin-bottom: 15px;
            padding-right: 70px;
            line-height: 1.3;
        }
        
        .noticia-meta {
            display: flex;
            gap: 20px;
            color: #888;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #333;
            flex-wrap: wrap;
        }
        
        .noticia-imagen {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
            border-radius: 20px;
            margin-bottom: 20px;
        }
        
        .noticia-contenido {
            font-size: 1.2em;
            line-height: 1.7;
            color: #eee;
            margin-bottom: 30px;
            white-space: pre-wrap;
        }
        
        .volver-btn {
            display: block;
            text-align: center;
            padding: 18px;
            background: transparent;
            border: 2px solid #FF8C00;
            border-radius: 50px;
            color: #FF8C00;
            text-decoration: none;
            font-weight: bold;
            margin-top: 20px;
        }
        
        .volver-btn:active {
            background: rgba(255,140,0,0.1);
        }
        
        .menu-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 15;
        }
        
        .menu-overlay.active {
            display: block;
        }
        
        .admin-link {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            background: #FF8C00;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: black;
            text-decoration: none;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 100;
            font-size: 1.5em;
        }
        
        .admin-link.visible {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="noticia-completa">
            
            <!-- ICONO DE COMPARTIR -->
            <div class="share-icon-large" id="shareIcon">📤</div>
            
            <!-- MENÚ DE COMPARTIR -->
            <div class="share-menu" id="shareMenu">
                <div class="share-menu-item share-wa" id="shareWa">📱 WhatsApp</div>
                <div class="share-menu-item share-fb" id="shareFb">📘 Facebook</div>
                <div class="share-menu-item share-tw" id="shareTw">𝕏 Twitter</div>
                <div class="share-menu-item share-tg" id="shareTg">✈️ Telegram</div>
                <div class="share-menu-item share-link" id="shareLink">🔗 Copiar enlace</div>
            </div>
            
            <!-- FECHA -->
            <div class="noticia-fecha">{{FECHA_FORMATEADA}}</div>
            
            <!-- TÍTULO -->
            <h1 class="noticia-titulo">{{TITULO}}</h1>
            
            <!-- META INFO -->
            <div class="noticia-meta">
                <span>📰 {{SECCION}}</span>
                <span>📍 {{UBICACION}}</span>
                <span>👤 {{REDACTOR}}</span>
                <span>👁️ {{VISTAS}}</span>
            </div>
            
            <!-- MULTIMEDIA -->
            {{MULTIMEDIA}}
            
            <!-- CONTENIDO -->
            <div class="noticia-contenido">{{{CONTENIDO}}}</div>
            
            <!-- BOTÓN VOLVER -->
            <a href="/" class="volver-btn">← VOLVER A PORTADA</a>
        </div>
        
        <!-- Overlay para cerrar menú -->
        <div class="menu-overlay" id="menuOverlay" onclick="cerrarMenu()"></div>
        
        <!-- Botón admin invisible -->
        <a href="/redaccion" class="admin-link" id="adminBtn">🏮</a>
    </div>

    <script>
        // ==================== FUNCIONES PARA COMPARTIR ====================
        function cerrarMenu() {
            document.getElementById('shareMenu').classList.remove('active');
            document.getElementById('menuOverlay').classList.remove('active');
        }
        
        function abrirMenu() {
            document.getElementById('shareMenu').classList.add('active');
            document.getElementById('menuOverlay').classList.add('active');
        }
        
        function compartirWhatsApp() {
            window.open(`https://wa.me/?text=${encodeURIComponent(window.location.href)}`, '_blank');
            cerrarMenu();
        }
        
        function compartirFacebook() {
            window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(window.location.href)}`, '_blank');
            cerrarMenu();
        }
        
        function compartirTwitter() {
            const texto = encodeURIComponent(document.querySelector('h1').textContent);
            window.open(`https://twitter.com/intent/tweet?text=${texto}&url=${encodeURIComponent(window.location.href)}`, '_blank');
            cerrarMenu();
        }
        
        function compartirTelegram() {
            window.open(`https://t.me/share/url?url=${encodeURIComponent(window.location.href)}`, '_blank');
            cerrarMenu();
        }
        
        function copiarLink() {
            navigator.clipboard.writeText(window.location.href).then(() => {
                alert('✅ Link copiado');
            }).catch(() => {
                prompt('📋 Copia este link:', window.location.href);
            });
            cerrarMenu();
        }
        
        // ==================== ADMIN CON DOBLE TAP ====================
        let lastTap = 0;
        document.addEventListener('touchend', function(e) {
            const currentTime = new Date().getTime();
            const tapLength = currentTime - lastTap;
            if (tapLength < 500 && tapLength > 0) {
                const pin = prompt('🔐 PIN:');
                if (pin === '311') {
                    document.getElementById('adminBtn').classList.add('visible');
                    alert('✅ Acceso concedido');
                } else if (pin !== null) {
                    alert('❌ PIN incorrecto');
                }
            }
            lastTap = currentTime;
        });
        
        // ==================== ASIGNAR EVENTOS ====================
        document.getElementById('shareIcon').addEventListener('click', abrirMenu);
        document.getElementById('shareWa').addEventListener('click', compartirWhatsApp);
        document.getElementById('shareFb').addEventListener('click', compartirFacebook);
        document.getElementById('shareTw').addEventListener('click', compartirTwitter);
        document.getElementById('shareTg').addEventListener('click', compartirTelegram);
        document.getElementById('shareLink').addEventListener('click', copiarLink);
    </script>
</body>
</html>
