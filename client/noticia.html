<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noticia | El Farol al Día</title>
    <!-- Marcador para Google Search Console -->
    <!-- META_GOOGLE_VERIFICATION -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #1a1a1a;
            border-radius: 16px;
            padding: 30px;
            border-left: 4px solid #6200ea;
            box-shadow: 0 10px 30px rgba(98, 0, 234, 0.2);
        }
        h1 {
            color: #bb86fc;
            font-size: 2.2em;
            margin-bottom: 15px;
        }
        .fecha {
            color: #888;
            font-size: 0.9em;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #333;
        }
        .imagen {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
            border-radius: 12px;
            margin: 20px 0;
            border: 2px solid #6200ea;
        }
        .contenido {
            font-size: 1.2em;
            line-height: 1.8;
            color: #eee;
            white-space: pre-wrap;
        }
        .volver {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 24px;
            background: linear-gradient(145deg, #6200ea, #bb86fc);
            color: white;
            text-decoration: none;
            border-radius: 40px;
            font-weight: bold;
            transition: transform 0.2s;
        }
        .volver:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(98, 0, 234, 0.6);
        }
        .loading, .error {
            text-align: center;
            padding: 50px;
            color: #aaa;
        }
        @media (max-width: 600px) {
            .container { padding: 20px; }
            h1 { font-size: 1.8em; }
        }
    </style>
</head>
<body>
    <div class="container" id="noticia-container">
        <div class="loading">Cargando noticia...</div>
    </div>

    <script>
        const container = document.getElementById('noticia-container');
        const id = window.location.pathname.split('/').pop();

        async function cargarNoticia() {
            try {
                const res = await fetch(`/api/noticias/${id}`);
                const data = await res.json();
                
                if (!data.success || !data.noticia) {
                    container.innerHTML = '<div class="error">❌ Noticia no encontrada</div>';
                    return;
                }

                const n = data.noticia;
                const fecha = new Date(n.fecha).toLocaleDateString('es-DO', {
                    weekday: 'long',
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric'
                });

                let imagenHtml = '';
                if (n.imagen) {
                    if (n.imagen.startsWith('data:video')) {
                        imagenHtml = `<video class="imagen" src="${n.imagen}" controls></video>`;
                    } else {
                        imagenHtml = `<img class="imagen" src="${n.imagen}" alt="${n.titulo}">`;
                    }
                }

                container.innerHTML = `
                    <h1>${n.titulo}</h1>
                    <div class="fecha">${fecha} · ${n.seccion || 'General'}</div>
                    ${imagenHtml}
                    <div class="contenido">${n.contenido.replace(/\n/g, '<br>')}</div>
                    <a href="/" class="volver">← Volver a portada</a>
                `;
            } catch (error) {
                container.innerHTML = '<div class="error">❌ Error al cargar la noticia</div>';
            }
        }

        cargarNoticia();
    </script>
</body>
</html>
