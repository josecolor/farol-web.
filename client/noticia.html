<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noticia | El Farol al Día</title>
    <!-- META_GOOGLE_VERIFICATION -->
    <!-- SEO_TITLE -->
    <!-- SEO_DESCRIPTION -->
    <!-- SEO_KEYWORDS -->
    <!-- OG_TITLE -->
    <!-- OG_DESCRIPTION -->

    <!-- OG_URL -->
    <!-- GOOGLE_ANALYTICS -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0b0b0b;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #1a1a1a;
            border-radius: 16px;
            padding: 30px;
            border-left: 4px solid #FF8C00;
            box-shadow: 0 10px 30px rgba(255, 140, 0, 0.2);
        }
        h1 {
            color: #FF8C00;
            font-size: 2.2em;
            margin-bottom: 15px;
        }
        .fecha {
            color: #888;
            font-size: 0.9em;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #333;
            display: flex;
            flex-wrap: wrap;
            gap: 10px 20px;
            align-items: center;
        }
        .imagen {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
            border-radius: 12px;
            margin: 20px 0;
            border: 2px solid #FF8C00;
        }
        .contenido {
            font-size: 1.2em;
            line-height: 1.8;
            color: #eee;
            white-space: pre-wrap;
        }
        .volver {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 24px;
            background: #FF8C00;
            color: black;
            text-decoration: none;
            border-radius: 40px;
            font-weight: bold;
            transition: 0.2s;
        }
        .volver:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 140, 0, 0.6);
        }
        .loading, .error {
            text-align: center;
            padding: 50px;
            color: #aaa;
        }
        .autor-contenedor {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #222;
            padding: 15px;
            border-radius: 12px;
            margin: 20px 0;
            border: 1px solid #FF8C00;
        }
        .autor-foto {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #FF8C00;
            flex-shrink: 0;
        }
        .autor-info h4 {
            margin: 0;
            color: #FF8C00;
            font-size: 1.2em;
        }
        .autor-info p {
            margin: 5px 0 0;
            color: #aaa;
            font-size: 0.9em;
        }
        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
            h1 {
                font-size: 1.8em;
            }
            .autor-foto {
                width: 50px;
                height: 50px;
            }
        }
    </style>
</head>
<body>
    <div class="container" id="noticia-container">
        <div class="loading">Cargando noticia...</div>
    </div>
    <script>
        const container = document.getElementById('noticia-container');
        const id = window.location.pathname.split('/').pop();

        async function cargarNoticia() {
            try {
                const res = await fetch(`/api/noticias/${id}`);
                const data = await res.json();
                if (!data.success || !data.noticia) {
                    container.innerHTML = '<div class="error">❌ Noticia no encontrada</div>';
                    return;
                }
                const n = data.noticia;
                const fecha = new Date(n.fecha).toLocaleDateString('es-DO', {
                    weekday: 'long',
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric'
                });
                let mediaHtml = '';
                if (n.imagen) {
                    if (n.imagen.startsWith('data:video')) {
                        mediaHtml = `<video class="imagen" src="${n.imagen}" controls></video>`;
                    } else {
                        mediaHtml = `<img class="imagen" src="${n.imagen}" alt="${n.titulo}">`;
                    }
                }
                const autorHtml = n.redactorFoto ? `
                    <div class="autor-contenedor">
                        <img src="${n.redactorFoto}" class="autor-foto" alt="Foto del redactor">
                        <div class="autor-info">
                            <h4>${n.redactor || 'Redacción'}</h4>
                            <p>Periodista de El Farol al Día</p>
                        </div>
                    </div>
                ` : `
                    <div class="autor-contenedor">
                        <div class="autor-info">
                            <h4>${n.redactor || 'Redacción'}</h4>
                            <p>Redacción de El Farol al Día</p>
                        </div>
                    </div>
                `;

                container.innerHTML = `
                    <h1>${n.titulo}</h1>
                    <div class="fecha">
                        <span>📅 ${fecha}</span>
                        <span>📰 ${n.seccion || 'General'}</span>
                        <span>📍 ${n.ubicacion || 'Santo Domingo'}</span>
                        <span>👁️ ${n.vistas || 0}</span>
                    </div>
                    ${mediaHtml}
                    ${autorHtml}
                    <div class="contenido">${n.contenido.replace(/\n/g, '<br>')}</div>
                    <a href="/" class="volver">← Volver a portada</a>
                `;
            } catch (error) {
                container.innerHTML = '<div class="error">❌ Error al cargar la noticia</div>';
            }
        }
        cargarNoticia();
    </script>
</body>
</html>
