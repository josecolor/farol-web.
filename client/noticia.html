<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    
    <title id="page-title">El Farol al Día 🏮</title>
    <meta property="og:title" id="og-title" content="">
    <meta property="og:description" id="og-description" content="">
    <meta property="og:image" id="og-image" content="">
    <meta property="og:url" id="og-url" content="">
    <meta name="twitter:card" content="summary_large_image">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0b0b0b;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 15px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
        }
        
        .noticia-completa {
            background: #1a1a1a;
            border-radius: 30px;
            padding: 25px;
            border-left: 5px solid #FF8C00;
            position: relative;
        }
        
        /* ICONO DE COMPARTIR GRANDE */
        .share-icon-large {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            background: #FF8C00;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8em;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255,140,0,0.6);
            border: 3px solid white;
            z-index: 10;
        }
        
        .share-icon-large:active {
            transform: scale(0.9);
        }
        
        /* MENÚ DE COMPARTIR */
        .share-menu {
            display: none;
            position: absolute;
            top: 90px;
            right: 20px;
            background: #222;
            border-radius: 25px;
            padding: 15px;
            z-index: 20;
            border: 2px solid #FF8C00;
            box-shadow: 0 5px 20px rgba(0,0,0,0.7);
            min-width: 250px;
        }
        
        .share-menu.active {
            display: block;
        }
        
        .share-menu-item {
            padding: 18px 20px;
            border-radius: 15px;
            margin: 8px 0;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 1.2em;
        }
        
        .share-menu-item:active {
            background: #333;
        }
        
        .share-wa { color: #25D366; }
        .share-fb { color: #1877F2; }
        .share-tw { color: #1DA1F2; }
        .share-tg { color: #0088cc; }
        .share-link { color: #aaa; }
        
        .noticia-fecha {
            color: #888;
            font-size: 0.9em;
            margin-bottom: 10px;
            padding-right: 70px;
        }
        
        .noticia-titulo {
            font-size: 2em;
            font-weight: bold;
            color: #FF8C00;
            margin-bottom: 15px;
            padding-right: 70px;
        }
        
        .noticia-meta {
            display: flex;
            gap: 20px;
            color: #888;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #333;
        }
        
        .noticia-imagen {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
            border-radius: 20px;
            margin-bottom: 20px;
        }
        
        .noticia-contenido {
            font-size: 1.2em;
            line-height: 1.7;
            color: #eee;
            margin-bottom: 30px;
            white-space: pre-wrap;
        }
        
        .volver-btn {
            display: block;
            text-align: center;
            padding: 18px;
            background: transparent;
            border: 2px solid #FF8C00;
            border-radius: 50px;
            color: #FF8C00;
            text-decoration: none;
            font-weight: bold;
            margin-top: 20px;
        }
        
        .menu-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 15;
        }
        
        .menu-overlay.active {
            display: block;
        }
        
        .admin-link {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            background: #FF8C00;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: black;
            text-decoration: none;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 100;
        }
        
        .admin-link.visible {
            opacity: 1;
        }
        
        .loader {
            text-align: center;
            padding: 50px;
            color: #FF8C00;
            font-size: 1.2em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="loader" class="loader">⏳ Cargando noticia...</div>
        
        <div id="noticia-container" style="display: none;">
            <div class="noticia-completa">
                
                <!-- ICONO DE COMPARTIR (CADA NOTICIA INDIVIDUAL TAMBIÉN) -->
                <div class="share-icon-large" id="shareIcon">📤</div>
                
                <!-- MENÚ DE COMPARTIR -->
                <div class="share-menu" id="shareMenu">
                    <div class="share-menu-item share-wa" id="shareWa">
                        📱 WhatsApp
                    </div>
                    <div class="share-menu-item share-fb" id="shareFb">
                        📘 Facebook
                    </div>
                    <div class="share-menu-item share-tw" id="shareTw">
                        𝕏 Twitter
                    </div>
                    <div class="share-menu-item share-tg" id="shareTg">
                        ✈️ Telegram
                    </div>
                    <div class="share-menu-item share-link" id="shareLink">
                        🔗 Copiar enlace
                    </div>
                </div>
                
                <div class="noticia-fecha" id="noticia-fecha"></div>
                <h1 class="noticia-titulo" id="noticia-titulo"></h1>
                
                <div class="noticia-meta">
                    <span id="noticia-seccion"></span>
                    <span id="noticia-ubicacion"></span>
                    <span id="noticia-redactor"></span>
                    <span id="noticia-vistas"></span>
                </div>
                
                <div id="noticia-multimedia"></div>
                
                <div class="noticia-contenido" id="noticia-contenido"></div>
                
                <a href="/" class="volver-btn">← VOLVER A PORTADA</a>
            </div>
        </div>
        
        <!-- Overlay para cerrar menú -->
        <div class="menu-overlay" id="menuOverlay" onclick="cerrarMenu()"></div>
        
        <a href="/redaccion" class="admin-link" id="adminBtn">🏮</a>
    </div>

    <script>
        let noticiaActual = null;
        let configuracion = {};
        
        // ==================== OBTENER ID ====================
        function getNoticiaId() {
            const path = window.location.pathname;
            return path.split('/').pop();
        }
        
        // ==================== CERRAR MENÚ ====================
        function cerrarMenu() {
            document.getElementById('shareMenu').classList.remove('active');
            document.getElementById('menuOverlay').classList.remove('active');
        }
        
        // ==================== ABRIR MENÚ ====================
        function abrirMenu() {
            document.getElementById('shareMenu').classList.add('active');
            document.getElementById('menuOverlay').classList.add('active');
        }
        
        // ==================== COMPARTIR ====================
        function compartirWhatsApp() {
            const url = window.location.href;
            window.open(`https://wa.me/?text=${encodeURIComponent(url)}`, '_blank');
            cerrarMenu();
        }
        
        function compartirFacebook() {
            const url = window.location.href;
            window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}`, '_blank');
            cerrarMenu();
        }
        
        function compartirTwitter() {
            const url = window.location.href;
            window.open(`https://twitter.com/intent/tweet?url=${encodeURIComponent(url)}`, '_blank');
            cerrarMenu();
        }
        
        function compartirTelegram() {
            const url = window.location.href;
            window.open(`https://t.me/share/url?url=${encodeURIComponent(url)}`, '_blank');
            cerrarMenu();
        }
        
        function copiarLink() {
            navigator.clipboard.writeText(window.location.href).then(() => {
                alert('✅ Link copiado');
            }).catch(() => {
                prompt('📋 Copia este link:', window.location.href);
            });
            cerrarMenu();
        }
        
        // ==================== CARGAR NOTICIA ====================
        async function cargarNoticia() {
            const id = getNoticiaId();
            
            try {
                const res = await fetch(`/noticia/${id}`);
                const data = await res.json();
                
                if (data.success) {
                    noticiaActual = data.noticia;
                    mostrarNoticia(noticiaActual);
                    actualizarMetaTags(noticiaActual);
                } else {
                    document.getElementById('loader').innerHTML = '❌ Noticia no encontrada<br><a href="/" style="color:#FF8C00;">Volver</a>';
                }
            } catch (error) {
                document.getElementById('loader').innerHTML = '❌ Error al cargar';
            }
        }
        
        function mostrarNoticia(noticia) {
            const fecha = new Date(noticia.fecha).toLocaleDateString('es-DO', {
                weekday: 'long', day: '2-digit', month: 'long', year: 'numeric',
                hour: '2-digit', minute: '2-digit'
            });
            
            document.getElementById('noticia-fecha').textContent = fecha;
            document.getElementById('noticia-titulo').textContent = noticia.titulo;
            document.getElementById('noticia-seccion').innerHTML = `📰 ${noticia.seccion}`;
            document.getElementById('noticia-ubicacion').innerHTML = `📍 ${noticia.ubicacion || 'S/D'}`;
            document.getElementById('noticia-redactor').innerHTML = `👤 ${noticia.redactor || 'mxl'}`;
            document.getElementById('noticia-vistas').innerHTML = `👁️ ${noticia.vistas || 0}`;
            document.getElementById('noticia-contenido').innerHTML = noticia.contenido.replace(/\n/g, '<br>');
            
            const multimediaDiv = document.getElementById('noticia-multimedia');
            if (noticia.imagen) {
                if (noticia.imagen.includes('video')) {
                    multimediaDiv.innerHTML = `<video class="noticia-imagen" src="${noticia.imagen}" controls></video>`;
                } else {
                    multimediaDiv.innerHTML = `<img class="noticia-imagen" src="${noticia.imagen}" alt="${noticia.titulo}">`;
                }
            }
            
            document.getElementById('loader').style.display = 'none';
            document.getElementById('noticia-container').style.display = 'block';
        }
        
        function actualizarMetaTags(noticia) {
            const url = window.location.href;
            const desc = noticia.contenido.substring(0, 160);
            
            document.getElementById('page-title').textContent = `${noticia.titulo} - El Farol al Día`;
            document.getElementById('og-title').content = noticia.titulo;
            document.getElementById('og-description').content = desc;
            document.getElementById('og-image').content = noticia.imagen || '';
            document.getElementById('og-url').content = url;
        }
        
        // ==================== ADMIN ====================
        let lastTap = 0;
        document.addEventListener('touchend', function(e) {
            const currentTime = new Date().getTime();
            const tapLength = currentTime - lastTap;
            if (tapLength < 500 && tapLength > 0) {
                const pin = prompt('🔐 PIN:');
                if (pin === '311') {
                    document.getElementById('adminBtn').classList.add('visible');
                    alert('✅ Acceso concedido');
                } else if (pin !== null) {
                    alert('❌ PIN incorrecto');
                }
            }
            lastTap = currentTime;
        });
        
        // ==================== ASIGNAR EVENTOS ====================
        window.addEventListener('load', async () => {
            await cargarNoticia();
            
            document.getElementById('shareIcon').addEventListener('click', abrirMenu);
            document.getElementById('shareWa').addEventListener('click', compartirWhatsApp);
            document.getElementById('shareFb').addEventListener('click', compartirFacebook);
            document.getElementById('shareTw').addEventListener('click', compartirTwitter);
            document.getElementById('shareTg').addEventListener('click', compartirTelegram);
            document.getElementById('shareLink').addEventListener('click', copiarLink);
        });
    </script>
</body>
  </html>
