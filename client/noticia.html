<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- META_TAGS -->
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <header>
        <div class="container">
            <h1 class="logo"><a href="/">🏮 El Farol al Día</a></h1>
            <nav>
                <a href="/">Inicio</a>
                <a href="/#nacionales">Nacionales</a>
                <a href="/#deportes">Deportes</a>
                <a href="/#internacionales">Internacionales</a>
                <a href="/#economia">Economía</a>
                <a href="/#tecnologia">Tecnología</a>
            </nav>
        </div>
    </header>

    <main class="container noticia-completa">
        <article>
            <div class="noticia-header">
                <span class="seccion">{{SECCION}}</span>
                <h1>{{TITULO}}</h1>
                <div class="meta">
                    <span class="fecha">📅 {{FECHA}}</span>
                    <span class="redactor">✍️ {{REDACTOR}}</span>
                    <span class="vistas">👁️ {{VISTAS}} vistas</span>
                </div>
            </div>

            <div class="noticia-imagen">
                <img src="{{IMAGEN}}" alt="{{ALT}}" loading="lazy">
            </div>

            <div class="noticia-contenido">
                {{CONTENIDO}}
            </div>

            <div class="noticia-footer">
                <div class="compartir">
                    <h3>Compartir esta noticia:</h3>
                    <a href="https://www.facebook.com/sharer/sharer.php?u={{URL}}" target="_blank">Facebook</a>
                    <a href="https://twitter.com/intent/tweet?text={{TITULO}}&url={{URL}}" target="_blank">Twitter</a>
                    <a href="https://wa.me/?text={{TITULO}}%20{{URL}}" target="_blank">WhatsApp</a>
                </div>
            </div>
        </article>

        <aside class="noticias-relacionadas">
            <h2>Noticias relacionadas</h2>
            <div id="relacionadas-container">
                <p>Cargando...</p>
            </div>
        </aside>
    </main>

    <footer>
        <div class="container">
            <p>© 2026 El Farol al Día - Noticias con IA</p>
        </div>
    </footer>

    <script>
        // Cargar noticias relacionadas
        async function cargarRelacionadas() {
            try {
                const response = await fetch('/api/noticias');
                const data = await response.json();
                if (data.success && data.noticias.length > 0) {
                    const container = document.getElementById('relacionadas-container');
                    container.innerHTML = data.noticias.slice(0, 3).map(noticia => `
                        <div class="relacionada-item">
                            <a href="/noticia/${noticia.slug}">
                                <h3>${noticia.titulo}</h3>
                                <span class="fecha">${new Date(noticia.fecha).toLocaleDateString('es-DO')}</span>
                            </a>
                        </div>
                    `).join('');
                }
            } catch (error) {
                console.error('Error cargando relacionadas:', error);
            }
        }
        cargarRelacionadas();
    </script>
</body>
</html>
