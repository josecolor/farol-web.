<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- META_TAGS -->
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0b0b0b;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            line-height: 1.6;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            background: #1a1a1a;
            border-bottom: 4px solid #FF8C00;
            padding: 1rem 0;
        }
        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo a {
            color: #FF8C00;
            text-decoration: none;
            font-size: 2rem;
            font-weight: bold;
        }
        nav a {
            color: white;
            margin-left: 20px;
            text-decoration: none;
        }
        nav a:hover {
            color: #FF8C00;
        }
        .noticia {
            background: #1a1a1a;
            border-radius: 16px;
            padding: 30px;
            border-left: 4px solid #FF8C00;
            margin: 30px 0;
        }
        .seccion {
            display: inline-block;
            background: #FF8C00;
            color: black;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            margin-bottom: 15px;
        }
        h1 {
            color: #FF8C00;
            font-size: 2.5rem;
            margin-bottom: 15px;
        }
        .meta {
            color: #aaa;
            margin-bottom: 20px;
        }
        .imagen {
            margin: 30px 0;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid #FF8C00;
        }
        .imagen img {
            width: 100%;
            max-height: 500px;
            object-fit: cover;
        }
        .contenido {
            font-size: 1.1rem;
            line-height: 1.8;
        }
        .contenido p {
            margin-bottom: 20px;
        }
        .compartir {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #333;
        }
        .compartir a {
            display: inline-block;
            background: #222;
            color: white;
            padding: 8px 20px;
            border-radius: 30px;
            text-decoration: none;
            margin-right: 10px;
            border: 1px solid #FF8C00;
        }
        .compartir a:hover {
            background: #FF8C00;
            color: black;
        }
        .relacionadas {
            background: #1a1a1a;
            border-radius: 16px;
            padding: 30px;
            border-left: 4px solid #FF8C00;
            margin-top: 30px;
        }
        .relacionadas h3 {
            color: #FF8C00;
            margin-bottom: 20px;
        }
        .relacionadas-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }
        .relacionada-item {
            background: #222;
            padding: 15px;
            border-radius: 8px;
            border-left: 3px solid #FF8C00;
        }
        .relacionada-item a {
            text-decoration: none;
            color: inherit;
        }
        .relacionada-item h4 {
            color: #FF8C00;
            margin: 10px 0;
        }
        footer {
            background: #1a1a1a;
            text-align: center;
            padding: 20px;
            margin-top: 40px;
            border-top: 1px solid #333;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1 class="logo"><a href="/">🏮 El Farol al Día</a></h1>
            <nav>
                <a href="/">Inicio</a>
                <a href="/redaccion">Redacción</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <article class="noticia">
            <span class="seccion">{{SECCION}}</span>
            <h1>{{TITULO}}</h1>
            <div class="meta">
                <span>📅 {{FECHA}}</span> | <span>✍️ {{REDACTOR}}</span> | <span>👁️ {{VISTAS}} vistas</span>
            </div>
            <div class="imagen">
                <img src="{{IMAGEN}}" alt="{{ALT}}" onerror="this.src='https://images.pexels.com/photos/3052454/pexels-photo-3052454.jpeg'">
            </div>
            <div class="contenido">
                {{CONTENIDO}}
            </div>
            <div class="compartir">
                <h3>Compartir:</h3>
                <a href="https://www.facebook.com/sharer/sharer.php?u={{URL}}" target="_blank">Facebook</a>
                <a href="https://twitter.com/intent/tweet?text={{TITULO}}&url={{URL}}" target="_blank">Twitter</a>
                <a href="https://wa.me/?text={{TITULO}}%20{{URL}}" target="_blank">WhatsApp</a>
            </div>
        </article>

        <aside class="relacionadas">
            <!-- RELACIONADAS -->
        </aside>
    </main>

    <footer>
        <p>© 2026 El Farol al Día - Noticias con IA</p>
    </footer>
</body>
</html>
