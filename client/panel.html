<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🏮 Panel — El Farol al Día</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#06060e;--bg2:#0d0d1a;--bg3:#121220;--bg4:#181830;
  --borde:#1e1e35;--acc:#FF5500;--acc2:#ff7733;
  --green:#22c55e;--yellow:#f59e0b;--red:#ef4444;--blue:#3b82f6;--purple:#a855f7;
  --text:#EDE8DF;--muted:#666;--dim:#444;
  --mono:'JetBrains Mono','Fira Code','Courier New',monospace;
  --sans:'Segoe UI',system-ui,sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* HEADER */
header{background:var(--bg2);border-bottom:2px solid var(--acc);padding:8px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.hl{display:flex;align-items:center;gap:10px}
.hlogo{width:34px;height:34px;background:linear-gradient(135deg,var(--acc),#cc3300);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 0 12px #FF550044}
.htitle{font-size:13px;font-weight:700;color:var(--acc);letter-spacing:.5px}
.hsub{font-size:10px;color:var(--muted);font-family:var(--mono)}
.hstatus{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--muted);font-family:var(--mono)}
.hdot{width:7px;height:7px;background:var(--green);border-radius:50%;animation:pulse 2s infinite;box-shadow:0 0 6px var(--green)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* TABS */
.tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--borde);flex-shrink:0}
.tab{flex:1;padding:9px 4px;text-align:center;font-size:11px;cursor:pointer;border:none;background:transparent;color:var(--muted);transition:.15s;border-bottom:2px solid transparent;font-family:var(--mono)}
.tab:hover{color:var(--text)}
.tab.on{color:var(--acc);border-bottom-color:var(--acc);background:rgba(255,85,0,.05)}

/* PANELS */
.panel{flex:1;overflow-y:auto;padding:12px;display:none}
.panel.on{display:block}
.panel::-webkit-scrollbar{width:3px}
.panel::-webkit-scrollbar-thumb{background:var(--borde)}

/* ═══ ESTADO ═══ */
#semaforo{display:flex;align-items:center;gap:12px;background:var(--bg2);border:1px solid var(--borde);border-left:3px solid var(--green);border-radius:8px;padding:12px 14px;margin-bottom:10px;transition:.3s}
#semaforo.warn{border-left-color:var(--yellow)}
#semaforo.err{border-left-color:var(--red)}
#sluz{width:14px;height:14px;border-radius:50%;flex-shrink:0}
.verde{background:var(--green);box-shadow:0 0 10px #22c55e66;animation:pulse 2s infinite}
.rojo{background:var(--red);box-shadow:0 0 10px #ef444466}
.amarillo{background:var(--yellow);box-shadow:0 0 10px #f59e0b66;animation:pulse 1s infinite}
#stitle{font-size:13px;font-weight:600}
#ssub{font-size:10px;color:var(--muted);font-family:var(--mono);margin-top:2px}
#sver{font-size:10px;color:var(--acc);margin-left:auto;font-family:var(--mono)}

.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px}
.met{background:var(--bg2);border:1px solid var(--borde);border-radius:8px;padding:10px 8px;text-align:center;transition:.2s}
.met:hover{border-color:var(--acc)}
.ml{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;font-family:var(--mono)}
.mv{font-size:20px;font-weight:700;color:var(--acc);line-height:1;font-family:var(--mono)}
.ms{font-size:9px;color:var(--dim);margin-top:2px}
.mv-ok{color:var(--green)!important}.mv-w{color:var(--yellow)!important}.mv-e{color:var(--red)!important}

.sec{background:var(--bg2);border:1px solid var(--borde);border-radius:8px;padding:12px;margin-bottom:8px}
.stit{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;font-family:var(--mono);display:flex;justify-content:space-between;align-items:center}
.stit span{background:var(--bg3);color:var(--acc);padding:1px 6px;border-radius:4px;font-size:9px}
.chk{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--bg3);font-size:11px}
.chk:last-child{border-bottom:none}
.cdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.dv{background:var(--green)}.da{background:var(--yellow)}.dr{background:var(--red)}
.clabel{flex:1;color:#aaa}
.cv-ok{color:var(--green);font-family:var(--mono);font-size:10px}
.cv-w{color:var(--yellow);font-family:var(--mono);font-size:10px}
.cv-e{color:var(--red);font-family:var(--mono);font-size:10px}

/* ═══ ACCIONES ═══ */
.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:8px}
.btn{background:var(--bg3);border:1px solid var(--borde);color:#ccc;padding:11px 8px;border-radius:8px;font-size:11px;cursor:pointer;text-align:center;transition:.2s;display:flex;flex-direction:column;align-items:center;gap:4px;width:100%;font-family:var(--sans)}
.btn:hover{background:var(--bg4);border-color:var(--acc);color:#fff;transform:translateY(-1px)}
.btn:active{transform:scale(.97)}
.bico{font-size:18px}
.btn.danger:hover{border-color:var(--red);background:rgba(239,68,68,.1)}

/* ═══ NOTICIAS ═══ */
.nitem{padding:9px 0;border-bottom:1px solid var(--bg3)}
.nitem:last-child{border-bottom:none}
.ntit{font-size:12px;color:var(--text);margin-bottom:3px;line-height:1.4}
.nmeta{font-size:10px;color:var(--muted);display:flex;gap:8px;font-family:var(--mono)}
.ntag{background:var(--bg3);color:var(--acc);padding:1px 5px;border-radius:3px;font-size:9px}

/* ═══ CHAT ELITE ═══ */
#chat-wrap{display:none;flex-direction:column;flex:1;overflow:hidden}
#chat-wrap.on{display:flex}
#chat-msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px}
#chat-msgs::-webkit-scrollbar{width:3px}
#chat-msgs::-webkit-scrollbar-thumb{background:var(--borde)}

.msg{display:flex;gap:8px;max-width:96%;animation:fi .2s ease}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.msg.u{align-self:flex-end;flex-direction:row-reverse}
.msg.b{align-self:flex-start}
.av{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px}
.msg.b .av{background:linear-gradient(135deg,var(--acc),#cc3300);box-shadow:0 0 8px #FF550044}
.msg.u .av{background:var(--bg3);border:1px solid var(--borde)}

.bub{background:var(--bg2);border:1px solid var(--borde);border-radius:10px;padding:9px 12px;font-size:12px;line-height:1.7;max-width:100%;word-break:break-word}
.msg.u .bub{background:var(--bg3);border-color:rgba(255,85,0,.3);border-radius:10px 10px 2px 10px}
.msg.b .bub{border-radius:2px 10px 10px 10px;font-family:var(--mono)}

/* CODE BLOCKS */
.bub pre{background:#0a0a18;border:1px solid var(--borde);border-left:3px solid var(--acc);border-radius:6px;padding:10px;overflow-x:auto;font-size:11px;margin:8px 0;white-space:pre-wrap;word-break:break-all}
.bub .ok{color:var(--green)}.bub .warn{color:var(--yellow)}.bub .err{color:var(--red)}
.bub .info{color:var(--blue)}.bub .acc{color:var(--acc)}.bub .dim{color:var(--muted)}
.bub .kw{color:#c792ea}.bub .fn{color:#82aaff}.bub .str{color:#c3e88d}.bub .num{color:#f78c6c}
.bub table{width:100%;border-collapse:collapse;margin:8px 0;font-size:11px}
.bub td,.bub th{padding:4px 8px;border:1px solid var(--borde)}
.bub th{background:var(--bg3);color:var(--acc)}
.bub a{color:var(--acc)}
.bub .badge{display:inline-block;padding:1px 6px;border-radius:3px;font-size:10px;font-weight:600}
.badge-ok{background:rgba(34,197,94,.2);color:var(--green)}
.badge-warn{background:rgba(245,158,11,.2);color:var(--yellow)}
.badge-err{background:rgba(239,68,68,.2);color:var(--red)}
.badge-info{background:rgba(59,130,246,.2);color:var(--blue)}

/* SUGERENCIAS */
#sugs{display:none;gap:5px;overflow-x:auto;padding:6px 12px;border-top:1px solid var(--borde);flex-shrink:0}
#sugs.on{display:flex}
#sugs::-webkit-scrollbar{display:none}
.sg{background:var(--bg3);border:1px solid var(--borde);color:var(--muted);padding:5px 10px;border-radius:12px;font-size:10px;font-family:var(--mono);cursor:pointer;white-space:nowrap;transition:.15s;flex-shrink:0}
.sg:hover{border-color:var(--acc);color:var(--acc)}

/* INPUT */
.chat-ia{background:var(--bg2);border-top:1px solid var(--borde);padding:10px 12px;display:none;gap:8px;align-items:flex-end;flex-shrink:0}
.chat-ia.on{display:flex}
#inp{flex:1;background:var(--bg3);border:1px solid var(--borde);color:var(--text);padding:9px 12px;border-radius:18px;font-family:var(--mono);font-size:12px;resize:none;max-height:80px;outline:none;line-height:1.5}
#inp:focus{border-color:var(--acc);box-shadow:0 0 0 2px rgba(255,85,0,.1)}
#inp::placeholder{color:var(--dim)}
#send{background:var(--acc);border:none;color:#fff;width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:14px;flex-shrink:0;transition:.2s;box-shadow:0 0 10px rgba(255,85,0,.3)}
#send:hover{background:#cc4400;transform:scale(1.05)}

.typing{display:flex;gap:3px;padding:4px 0}
.typing span{width:5px;height:5px;background:var(--acc);border-radius:50%;animation:bop .8s infinite;opacity:.4}
.typing span:nth-child(2){animation-delay:.15s}
.typing span:nth-child(3){animation-delay:.3s}
@keyframes bop{0%,100%{transform:translateY(0);opacity:.4}50%{transform:translateY(-5px);opacity:1}}

#toast{position:fixed;bottom:75px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--acc);color:var(--text);padding:8px 16px;border-radius:8px;font-size:11px;display:none;z-index:99;font-family:var(--mono);box-shadow:0 4px 20px rgba(0,0,0,.5)}
</style>
</head>
<body>

<header>
  <div class="hl">
    <div class="hlogo">🏮</div>
    <div>
      <div class="htitle">EL FAROL AL DÍA</div>
      <div class="hsub">engineering · v34.54</div>
    </div>
  </div>
  <div class="hstatus">
    <div class="hdot"></div>
    <span id="upd">—</span>
  </div>
</header>

<div class="tabs">
  <button class="tab on"  onclick="tab('estado')">📊 Estado</button>
  <button class="tab"     onclick="tab('noticias')">📰 Noticias</button>
  <button class="tab"     onclick="tab('acciones')">⚙️ Acciones</button>
  <button class="tab"     onclick="tab('bot')">🤖 Ingeniero</button>
</div>

<!-- ESTADO -->
<div class="panel on" id="t-estado">
  <div id="semaforo">
    <div id="sluz" class="amarillo"></div>
    <div style="flex:1"><div id="stitle">Verificando...</div><div id="ssub">—</div></div>
    <div id="sver">—</div>
  </div>
  <div class="g4">
    <div class="met"><div class="ml">Noticias</div><div class="mv" id="m-n">—</div><div class="ms">publicadas</div></div>
    <div class="met"><div class="ml">Vistas</div><div class="mv" id="m-v">—</div><div class="ms">acumuladas</div></div>
    <div class="met"><div class="ml">Sin pub.</div><div class="mv" id="m-t">—</div><div class="ms">minutos</div></div>
    <div class="met"><div class="ml">Keys IA</div><div class="mv" id="m-k">—</div><div class="ms">Gemini</div></div>
  </div>
  <div class="sec">
    <div class="stit">Salud del sistema <span id="salud-badge">verificando...</span></div>
    <div id="checks"></div>
  </div>
</div>

<!-- NOTICIAS -->
<div class="panel" id="t-noticias">
  <div class="sec">
    <div class="stit">Últimas publicadas</div>
    <div id="lista-n"><div style="color:var(--muted);font-size:11px;font-family:var(--mono)">cargando...</div></div>
  </div>
</div>

<!-- ACCIONES -->
<div class="panel" id="t-acciones">
  <div class="sec">
    <div class="stit">Acciones del sistema</div>
    <div class="g2">
      <button class="btn" onclick="accion('rss')"><span class="bico">📡</span>Procesar RSS</button>
      <button class="btn" onclick="accion('fotos')"><span class="bico">🖼️</span>Regenerar Fotos</button>
      <button class="btn" onclick="accion('nacionales')"><span class="bico">🏠</span>Noticia Nacional</button>
      <button class="btn" onclick="accion('deportes')"><span class="bico">⚽</span>Noticia Deportes</button>
      <button class="btn" onclick="accion('economia')"><span class="bico">💰</span>Noticia Economía</button>
      <button class="btn" onclick="accion('internacional')"><span class="bico">🌎</span>Noticia Mundial</button>
    </div>
    <div class="g2" style="margin-top:4px">
      <button class="btn" onclick="window.location.href='/redaccion'"><span class="bico">✏️</span>Panel Redacción</button>
      <button class="btn danger" onclick="confirmarReset()"><span class="bico">🗑️</span>Resetear BD</button>
    </div>
  </div>
</div>

<!-- CHAT INGENIERO ELITE -->
<div id="chat-wrap">
  <div id="chat-msgs"></div>
</div>
<div id="sugs">
  <button class="sg" onclick="env('¿Cómo está el sistema?')">estado</button>
  <button class="sg" onclick="env('Analiza el rendimiento')">rendimiento</button>
  <button class="sg" onclick="env('¿Qué errores hay en el servidor?')">errores</button>
  <button class="sg" onclick="env('Optimiza el sistema ahora')">optimizar</button>
  <button class="sg" onclick="env('¿Qué aprendió el sistema esta semana?')">aprendizaje</button>
  <button class="sg" onclick="env('Analiza las fotos y repáralas')">fotos</button>
  <button class="sg" onclick="env('¿Cuál es el mejor horario para publicar?')">horarios</button>
  <button class="sg" onclick="env('Genera un reporte completo')">reporte</button>
  <button class="sg" onclick="env('¿Cómo está el SEO?')">seo</button>
  <button class="sg" onclick="env('El sitio carga lento, arréglalo')">velocidad</button>
  <button class="sg" onclick="env('El servidor crasheó, qué pasó?')">crasheo</button>
  <button class="sg" onclick="env('Muéstrame los logs')">logs</button>
  <button class="sg" onclick="env('¿Cómo está el AdSense?')">adsense</button>
  <button class="sg" onclick="env('Hay fotos de boda repetidas')">fotos repetidas</button>
  <button class="sg" onclick="env('Gemini da error 429')">gemini 429</button>
  <button class="sg" onclick="env('Qué está trending en RD ahora')">trending RD</button>
  <button class="sg" onclick="env('Cómo está el clima y el dólar')">clima y dólar</button>
</div>
<div class="chat-ia" id="chat-ia">
  <textarea id="inp" placeholder="Habla con el ingeniero..." rows="1"
    onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();si()}"></textarea>
  <button id="send" onclick="si()">▶</button>
</div>

<div id="toast"></div>

<script>
const PIN='311', AUTH='Basic '+btoa('director:311');
let busy=false, chatOk=false;

// ── API ─────────────────────────────────────────────────────────────────────
async function api(u,m='GET',b=null){
  try{const o={method:m,headers:{'Content-Type':'application/json',Authorization:AUTH}};
  if(b)o.body=JSON.stringify(b);return await(await fetch(u,o)).json();}
  catch(e){return{error:e.message}}}

// ── UTILS ────────────────────────────────────────────────────────────────────
const ta=f=>{const m=Math.round((Date.now()-new Date(f))/60000);return m<1?'ahora':m<60?`${m}m`:`${Math.round(m/60)}h`};
const fmt=n=>n>999?(n/1000).toFixed(1)+'k':String(n);
const toast=(msg,ms=3000)=>{const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';setTimeout(()=>t.style.display='none',ms)};

// ── TABS ─────────────────────────────────────────────────────────────────────
function tab(id){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  const ids=['estado','noticias','acciones','bot'];
  document.querySelectorAll('.tab')[ids.indexOf(id)].classList.add('on');
  if(id==='bot'){
    document.getElementById('chat-wrap').classList.add('on');
    document.getElementById('sugs').classList.add('on');
    document.getElementById('chat-ia').classList.add('on');
    if(!chatOk){chatOk=true;bienvenida();}
  } else {
    document.getElementById('chat-wrap').classList.remove('on');
    document.getElementById('sugs').classList.remove('on');
    document.getElementById('chat-ia').classList.remove('on');
    document.getElementById('t-'+id).classList.add('on');
    if(id==='noticias')cargarNoticias();
  }
}

// ── ESTADO ────────────────────────────────────────────────────────────────────
async function cargarEstado(){
  const[d,e]=await Promise.all([api('/status'),api('/api/estadisticas')]);
  const now=new Date().toLocaleTimeString('es-DO',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  document.getElementById('upd').textContent=now;
  if(d.error||!d.version){
    document.getElementById('sluz').className='rojo';
    document.getElementById('stitle').textContent='❌ Sin respuesta';
    document.getElementById('semaforo').className='err';
    return;
  }
  const s=d.salud||{};
  const hay=s.errores_gemini>=3||s.min_sin_publicar>90||s.ciclos_rss_vacios>=5;
  document.getElementById('sluz').className=hay?'amarillo':'verde';
  document.getElementById('semaforo').className=hay?'warn':'';
  document.getElementById('stitle').textContent=hay?'⚠️ Alertas detectadas':'✅ Operando perfectamente';
  document.getElementById('ssub').textContent=`${d.noticias} noticias · modelo: ${d.modelo_gemini} · uptime ok`;
  document.getElementById('sver').textContent=`V${d.version}`;
  document.getElementById('m-n').textContent=d.noticias;
  document.getElementById('m-k').textContent=d.gemini_keys||'—';
  const tm=s.min_sin_publicar||0;
  document.getElementById('m-t').textContent=tm;
  document.getElementById('m-t').className='mv '+(tm>90?'mv-e':tm>30?'mv-w':'mv-ok');
  if(e.totalVistas!==undefined){document.getElementById('m-v').textContent=fmt(e.totalVistas);}

  const checks=[
    {l:'Gemini IA',v:s.errores_gemini>=3?`${s.errores_gemini} errores`:'OK',c:s.errores_gemini>=3?'e':'ok'},
    {l:'Publicación',v:tm>90?`${tm}min parado`:'Activa',c:tm>90?'e':tm>20?'w':'ok'},
    {l:'RSS Sources',v:s.ciclos_rss_vacios>=5?`${s.ciclos_rss_vacios} vacíos`:'OK',c:s.ciclos_rss_vacios>=5?'w':'ok'},
    {l:'Imágenes',v:s.errores_imagen>=5?`${s.errores_imagen} fallos`:'OK',c:s.errores_imagen>=5?'w':'ok'},
    {l:'Watermark',v:d.marca_de_agua?.includes('Activa')?'Activa':'FALTA',c:d.marca_de_agua?.includes('Activa')?'ok':'e'},
    {l:'Google CSE',v:d.google_cse==='Activo'?'Activo':'Sin configurar',c:d.google_cse==='Activo'?'ok':'w'},
    {l:'AdSense',v:d.adsense?'Configurado':'Falta',c:d.adsense?'ok':'w'},
    {l:'Modo',v:d.modo_espejo?'ESPEJO':'Principal',c:d.modo_espejo?'w':'ok'},
  ];
  const allOk=checks.every(x=>x.c==='ok');
  document.getElementById('salud-badge').textContent=allOk?'✅ todo OK':`⚠️ ${checks.filter(x=>x.c!=='ok').length} alertas`;
  document.getElementById('checks').innerHTML=checks.map(x=>`
    <div class="chk">
      <div class="cdot d${x.c==='ok'?'v':x.c==='w'?'a':'r'}"></div>
      <span class="clabel">${x.l}</span>
      <span class="cv-${x.c==='ok'?'ok':x.c==='w'?'w':'e'}">${x.v}</span>
    </div>`).join('');
}

async function cargarNoticias(){
  const r=await api('/api/noticias');
  if(!r.noticias?.length){document.getElementById('lista-n').innerHTML='<p style="color:var(--muted);font-size:11px">Sin noticias</p>';return;}
  document.getElementById('lista-n').innerHTML=r.noticias.slice(0,12).map(n=>`
    <div class="nitem">
      <div class="ntit">${n.titulo}</div>
      <div class="nmeta"><span class="ntag">${n.seccion}</span><span>${ta(n.fecha)}</span><span>👁 ${n.vistas}</span></div>
    </div>`).join('');
}

// ── ACCIONES ─────────────────────────────────────────────────────────────────
async function accion(tipo){
  const map={
    rss:['/api/procesar-rss','POST',{pin:PIN}],
    fotos:['/api/regenerar-fotos','POST',{pin:PIN}],
    nacionales:['/api/generar-noticia','POST',{pin:PIN,categoria:'Nacionales'}],
    deportes:['/api/generar-noticia','POST',{pin:PIN,categoria:'Deportes'}],
    economia:['/api/generar-noticia','POST',{pin:PIN,categoria:'Economia'}],
    internacional:['/api/generar-noticia','POST',{pin:PIN,categoria:'Internacionales'}],
  };
  toast('⏳ Ejecutando...');
  const[u,m,b]=map[tipo];
  const r=await api(u,m,b);

// ── CEREBRO DEL BOT — lee TODO el servidor en tiempo real ────────────────────
// No trabaja con datos estáticos — siempre consulta el estado real
let CEREBRO = null;
let CEREBRO_FECHA = 0;
const CEREBRO_TTL = 60000; // refrescar cada 60s

async function getCerebro(forzar=false) {
  const ahora = Date.now();
  if (!forzar && CEREBRO && (ahora - CEREBRO_FECHA) < CEREBRO_TTL) return CEREBRO;
  try {
    // Cargar cerebro y mundo en paralelo
    const [r, m] = await Promise.all([
      api('/api/cerebro'),
      api('/api/mundo'),
    ]);
    if (!r.error) {
      CEREBRO = { ...r, mundo: m };
      CEREBRO_FECHA = ahora;
    }
  } catch(_) {}
  return CEREBRO;
}

// Cargar cerebro al inicio
getCerebro(true);
setInterval(() => getCerebro(true), 60000);

      html+=`     <span class="dim">${x.seccion} · ${ta(x.fecha)} · ${x.vistas}v</span>\n`;
    });
    return html;
  }

  // ── PROCESAR RSS ──────────────────────────────────────────────────────────
  if(/rss|procesa|busca noticia|traer noticia/.test(q)){
    const r=await api('/api/procesar-rss','POST',{pin:PIN});
    return r.success
      ?`<span class="ok">// RSS iniciado ✓</span>\n<span class="dim">// Noticias nuevas en ~2-3 minutos.</span>`
      :`<span class="err">// Error: ${r.error}</span>`;
  }

  // ── FOTOS ─────────────────────────────────────────────────────────────────
  if(/foto|imagen|regenera|pixelad|fea|watermark/.test(q)){
    const r=await api('/api/regenerar-fotos','POST',{pin:PIN});
    return r.success
      ?`<span class="ok">// Regeneración iniciada ✓</span>\n<span class="dim">// 3 fotos / 8 segundos — proceso gradual.</span>`
      :`<span class="warn">// ${r.mensaje||r.error}</span>`;
  }

  // ── GENERAR NOTICIA ───────────────────────────────────────────────────────
  if(/genera|escribe|publica una|crear noticia/.test(q)){
    const cats=['Nacionales','Deportes','Internacionales','Economia','Tecnologia','Espectaculos'];
    let cat='Nacionales';
    for(const c of cats){if(q.includes(c.toLowerCase())){cat=c;break}}
    addMsg(`<span class="info">// Invocando Gemini para ${cat}...</span>`,'b');
    const r=await api('/api/generar-noticia','POST',{categoria:cat});
    return r.success
      ?`<span class="ok">// Noticia publicada ✓</span>\n<span class="str">"${r.titulo}"</span>\n\n<a href="/noticia/${r.slug}" target="_blank">→ /noticia/${r.slug}</a>`
      :`<span class="err">// Error: ${r.error}</span>`;
  }

  // ── AYUDA ─────────────────────────────────────────────────────────────────
  if(/ayuda|help|qué puedes|que puedes|hola|buenas|comandos/.test(q)){
    return`<span class="acc">// INGENIERO ELITE — CAPACIDADES</span>

<span class="kw">Diagnóstico:</span>
  <span class="dim">"¿Qué errores hay?"  "Diagnostica el sistema"</span>

<span class="kw">Monitoreo:</span>
  <span class="dim">"¿Cómo está el servidor?"  "Reporte completo"</span>

<span class="kw">Optimización:</span>
  <span class="dim">"Optimiza el sistema"  "¿Cómo mejorar el SEO?"</span>

<span class="kw">Contenido:</span>
  <span class="dim">"Genera una noticia de Economía"  "Procesa el RSS"</span>

<span class="kw">Imágenes:</span>
  <span class="dim">"Regenera las fotos feas"  "¿Cómo están las imágenes?"</span>

<span class="kw">Conocimiento:</span>
  <span class="dim">"¿Cómo funciona el sistema?"  "Explica la arquitectura"</span>
  <span class="dim">"¿Qué aprendió el sistema?"  "Mejores horarios"</span>

Habla en español natural. Entiendo contexto. 🏮`;
  }

  // ── CARGA LENTA ──────────────────────────────────────────────────────────
  if(/lento|carga|lenta|demora|tarda|slow|velocidad|rápido|rapido|performance/.test(q)){
    const d=await api('/status');
    let html=`<span class="acc">// DIAGNÓSTICO DE VELOCIDAD</span>

`;
    html+=`<span class="kw">Causas comunes de carga lenta:</span>

`;
    html+=`<span class="badge badge-info">1</span> <span class="fn">Imágenes sin optimizar</span>
`;
    html+=`<span class="dim">   Sharp procesa cada foto — puede tardar en imágenes grandes</span>
`;
    html+=`<span class="str">   FIX → Fotos ya pasan por Sharp con quality:92 + mozjpeg</span>

`;
    html+=`<span class="badge badge-info">2</span> <span class="fn">Sin compresión gzip</span>
`;
    html+=`<span class="dim">   HTML/JSON sin comprimir pesan 5-10x más</span>
`;
    html+=`<span class="str">   FIX → V34.55 activa gzip/brotli automático ✓</span>

`;
    html+=`<span class="badge badge-info">3</span> <span class="fn">Railway Free tier</span>
`;
    html+=`<span class="dim">   Servidor en US-East — latencia desde RD ~80-120ms</span>
`;
    html+=`<span class="str">   FIX → Normal, no se puede reducir sin cambiar región</span>

`;
    html+=`<span class="badge badge-info">4</span> <span class="fn">Muchas noticias sin cache</span>
`;
    html+=`<span class="dim">   Primera carga hace query a PostgreSQL</span>
`;
    html+=`<span class="str">   FIX → Cache activa 5 min — segunda visita instantánea ✓</span>

`;
    html+=`<span class="badge badge-info">5</span> <span class="fn">Imágenes externas</span>
`;
    html+=`<span class="dim">   Fotos de periódicos que bloquean hotlinking</span>
`;
    html+=`<span class="str">   FIX → Regenerar fotos convierte todo a /img/efd-* propio</span>

`;
    html+=`<span class="ok">Acción recomendada:</span> Ejecuta "Regenerar Fotos" para que todas las imágenes sean propias y se sirvan desde el mismo servidor.`;
    return html;
  }

  // ── CRASHEO / SERVIDOR CAÍDO ────────────────────────────────────────────
  if(/crash|caído|caido|502|no responde|no carga|no funciona|down|reinici|cayó|cayo/.test(q)){
    const d=await api('/status');
    if(d.error){
      return`<span class="err">⚡ SERVIDOR CAÍDO CONFIRMADO</span>

<span class="kw">Pasos en Railway:</span>
  <span class="num">1.</span> railway.app → ideal-reverence → farol-web → Deploy Logs
  <span class="num">2.</span> Busca líneas rojas — causas frecuentes:

  <span class="err">FATAL DATABASE_URL</span>
     → Variable vacía. Ir a Variables → DATABASE_URL → pegar URL del Postgres

  <span class="err">FATAL GEMINI_API_KEY</span>
     → Falta una key. Agregar GEMINI_API_KEY en Variables

  <span class="err">ETIMEDOUT postgres.railway.internal</span>
     → BD sin conectar. Crear PostgreSQL nuevo en el proyecto

  <span class="err">npm error SIGTERM</span>
     → Redespliegue en proceso. Esperar 2-3 minutos

  <span class="num">3.</span> Si persiste: Settings → Redeploy`;
    }
    return`<span class="ok">✅ Servidor respondiendo (V${d.version})</span>
<span class="dim">// El crash fue temporal — Railway reinició automáticamente.</span>`;
  }

  // ── LOGS / HISTORIAL ─────────────────────────────────────────────────────
  if(/log|logs|registro|historial|que pasó|que paso|qué pasó|qué ocurrió/.test(q)){
    const r=await api('/api/memoria?pin=311');
    if(!r.registros)return'<span class="warn">// Sin registros en memoria</span>';
    let h=`<span class="acc">// HISTORIAL DEL SISTEMA</span>

`;
    const errs=r.registros.filter(x=>x.tipo==='error'||x.tipo==='autodiagnostico').slice(0,8);
    if(errs.length){
      errs.forEach(e=>{
        const t=new Date(e.ultima_vez||e.fecha).toLocaleString('es-DO',{month:'short',day:'2-digit',hour:'2-digit',minute:'2-digit'});
        h+=`<span class="err">×</span> [${t}] ${(e.valor||'').substring(0,55)}
`;
        h+=`  <span class="dim">fallos:${e.fallos||0} · ${e.categoria||'sistema'}</span>

`;
      });
    } else {
      h+='<span class="ok">// Sin errores recientes registrados</span>
';
    }
    h+=`<span class="dim">// Logs en tiempo real → Railway → farol-web → Deploy Logs</span>`;
    return h;
  }

  // ── FOTO BODA / MISMA FOTO / REPETIDA ───────────────────────────────────
  if(/boda|misma foto|repeti|stock|genéric|generic|pexels|pixabay|foto fea/.test(q)){
    const r=await api('/api/regenerar-fotos','POST',{pin:PIN});
    return`<span class="acc">// FOTOS REPETIDAS O GENÉRICAS</span>

<span class="kw">Causa:</span> Foto del banco local (pexels) cuando el periódico
  no tiene imagen accesible o es pixelada.

<span class="kw">Fix aplicado:</span> ${r.success?'<span class="ok">✅ Regenerador iniciado</span>':'<span class="warn">Ya en proceso</span>'}

<span class="kw">Prevención permanente:</span>
  <span class="str">→</span> Google CSE activo = fotos HD por título
  <span class="str">→</span> Ingeniero detecta fotos feas cada 15min
  <span class="str">→</span> verificarCalidadImagen() rechaza pixeladas y logos ajenos`;
  }

  // ── VARIABLE / RAILWAY CONFIG ────────────────────────────────────────────
  if(/variable|env|railway var|gemini key|api key|database_url|configurar|configuracion/.test(q)){
    return`<span class="acc">// VARIABLES DE ENTORNO</span>

<span class="err">OBLIGATORIAS:</span>
  DATABASE_URL      → PostgreSQL URL
  GEMINI_API_KEY    → Al menos una

<span class="warn">RECOMENDADAS:</span>
  BASE_URL          → https://elfarolaldia.com
  GEMINI_API_KEY2   → Key 2 (gratis aistudio.google.com)
  GEMINI_API_KEY3   → Key 3
  GEMINI_API_KEY4   → Key 4
  GOOGLE_CSE_KEY    → Fotos HD
  GOOGLE_CSE_ID     → ID del motor CSE

<span class="dim">MODO_ESPEJO=true → solo para Render (espejo)</span>`;
  }

  // ── WATERMARK / MARCA DE AGUA ────────────────────────────────────────────
  if(/watermark|marca.?de.?agua|logo|marca ajena|wm|sello/.test(q)){
    const d=await api('/status');
    const ok=d.marca_de_agua?.includes('Activa');
    return`<span class="acc">// SISTEMA WATERMARK</span>

Estado: <span class="${ok?'ok':'err'}">${d.marca_de_agua||'No encontrada'}</span>

<span class="kw">Tamaño adaptativo:</span>
  ≥1000px → marca 20% del ancho
  600-999px → 25% del ancho
  <600px  → 30% del ancho

${!ok?`<span class="err">⚠ FALTA LA WATERMARK</span>
  Verifica que WATERMARK(1).png está en /static/`:'<span class="ok">✓ Aplicándose en todas las fotos nuevas</span>'}`;
  }

  // ── ADSENSE / MONETIZACIÓN ───────────────────────────────────────────────
  if(/adsense|monetiz|dinero|ingreso|pub-|anuncio|publicidad|aprobacion/.test(q)){
    return`<span class="acc">// ADSENSE — MONETIZACIÓN</span>

<span class="kw">Publisher ID:</span> <span class="str">pub-5280872495839888</span>
<span class="kw">Estado:</span> <span class="warn">En revisión (enviado Mar 20, 2026)</span>
<span class="kw">Tiempo estimado:</span> 3–14 días

<span class="kw">Checklist para aprobación:</span>
  <span class="ok">✓</span> ads.txt configurado
  <span class="ok">✓</span> Política de privacidad
  <span class="ok">✓</span> Términos de uso
  <span class="ok">✓</span> Contacto visible
  <span class="ok">✓</span> Contenido original (Gemini élite)
  <span class="ok">✓</span> Imágenes propias con watermark
  <span class="ok">✓</span> Schema NewsArticle

<span class="dim">Verificar en: adsense.google.com</span>`;
  }

  // ── GEMINI 429 / LÍMITE ──────────────────────────────────────────────────
  if(/429|límite|limite|quota|cuota|gemini error|key agotada/.test(q)){
    const d=await api('/status');
    return`<span class="acc">// GEMINI 429 — RATE LIMIT</span>

<span class="kw">Keys activas:</span> <span class="${d.gemini_keys>=3?'ok':'err'}">${d.gemini_keys}</span>

<span class="kw">Cómo funciona la rotación:</span>
  Key 1 publica → descansa 60s → Key 2 → descansa → Key 3...
  Si una da 429 → cooldown automático → pasa a la siguiente

<span class="kw">El ingeniero auto-corrige:</span>
  3+ errores seguidos → resetea cooldowns de todas las keys

<span class="kw">Si persiste:</span>
  <span class="str">→</span> Agregar GEMINI_API_KEY5 en Railway
  <span class="str">→</span> Obtener gratis en aistudio.google.com (otra cuenta Google)`;
  }

  // ── RENDER / ESPEJO ──────────────────────────────────────────────────────
  if(/render|espejo|mirror|backup|segundo servidor/.test(q)){
    const d=await api('/status');
    return`<span class="acc">// MODO ESPEJO (RENDER)</span>

<span class="kw">Estado actual:</span> <span class="${d.modo_espejo?'warn':'ok'}">${d.modo_espejo?'ESPEJO ACTIVO':'Servidor Principal'}</span>

<span class="kw">Diferencia:</span>
  Principal (Railway) → publica, procesa RSS, aprende
  Espejo (Render)     → solo sirve el sitio, no escribe

<span class="kw">Variables para Render:</span>
  DATABASE_URL   → URL pública del Postgres de Railway
  BASE_URL       → https://elfarolaldia.com
  GEMINI_API_KEY → cualquier key
  MODO_ESPEJO    → true

<span class="dim">URL pública: postgres → Variables → DATABASE_PUBLIC_URL</span>`;
  }

  // ── RESPUESTA POR DEFECTO ─────────────────────────────────────────────────
  return`<span class="warn">// No reconocí ese comando específico.</span>

<span class="dim">// Intenta con:</span>
  reporte | diagnostico | optimizar | seo
  noticias | rss | fotos | generar
  arquitectura | horarios | aprendizaje
  crash | logs | variable | watermark
  adsense | gemini | render | velocidad

<span class="dim">// O pregunta en lenguaje natural.</span>`;
}

// ── ENVIAR ────────────────────────────────────────────────────────────────────
async function env(txt){
  if(busy||!txt.trim())return;busy=true;
  if(document.querySelector('.tab:nth-child(4)').classList.contains('on')===false){tab('bot');}
  addMsg(txt,'u');
  const i=document.getElementById('inp');i.value='';i.style.height='auto';
  showT();await new Promise(r=>setTimeout(r,600));hideT();
  try{addMsg(await proc(txt),'b');}
  catch(e){addMsg(`<span class="err">// Runtime error: ${e.message}</span>`,'b');}
  busy=false;
}
function si(){const v=document.getElementById('inp').value.trim();if(v)env(v);}
document.getElementById('inp').addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,80)+'px';});

// ── INIT ──────────────────────────────────────────────────────────────────────
cargarEstado();
setInterval(cargarEstado,60000);
</script>
