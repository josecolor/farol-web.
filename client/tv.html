<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏮 EL FAROL TV — EN VIVO SDE</title>
    <style>
        :root { --naranja: #FF5500; --negro: #070707; --blanco: #EDE8DF; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: #000; 
            color: var(--blanco); 
            font-family: 'Arial Black', Gadget, sans-serif; 
            overflow: hidden; 
            height: 100vh;
        }

        /* ── ESCENARIO DE FONDO ── */
        .tv-screen {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #000;
        }

        #news-bg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.4;
            filter: blur(3px);
            z-index: 1;
            transition: opacity 1s ease;
        }

        /* ── EL LOCUTOR MXL ── */
        .anchor-man {
            position: absolute;
            bottom: 90px;
            right: 40px;
            width: 320px;
            z-index: 10;
            border-bottom: 8px solid var(--naranja);
            filter: drop-shadow(0 0 20px rgba(255,85,0,0.4));
        }

        #anchor-img {
            width: 100%;
            display: block;
            transition: transform 0.1s ease;
        }

        /* ── MARCO DE NOTICIAS (EL CINTILLO) ── */
        .overlay-ui {
            position: absolute;
            inset: 0;
            z-index: 15;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            pointer-events: none;
        }

        .top-bar {
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-tv { font-size: 24px; color: var(--naranja); letter-spacing: 2px; }
        .live-tag { 
            background: #ff0000; 
            color: #fff; 
            padding: 5px 15px; 
            font-size: 14px; 
            border-radius: 4px; 
            animation: blink 1s infinite; 
        }

        .bottom-ui {
            background: rgba(0,0,0,0.85);
            border-top: 4px solid var(--naranja);
        }

        .headline-container {
            padding: 20px 40px;
            border-left: 10px solid var(--naranja);
        }

        #current-title {
            font-size: 32px;
            text-transform: uppercase;
            line-height: 1.2;
            color: #fff;
        }

        /* ── TICKER (EL QUE CORRE) ── */
        .ticker-wrap {
            background: var(--naranja);
            height: 50px;
            display: flex;
            align-items: center;
            overflow: hidden;
        }

        .ticker-label {
            background: #000;
            color: var(--naranja);
            padding: 0 20px;
            height: 100%;
            display: flex;
            align-items: center;
            font-size: 18px;
            z-index: 20;
        }

        .ticker-text {
            white-space: nowrap;
            font-size: 24px;
            color: #000;
            padding-left: 100%;
            animation: scroll-ticker 25s linear infinite;
        }

        @keyframes scroll-ticker {
            0% { transform: translateX(0); }
            100% { transform: translateX(-150%); }
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
        
        /* Efecto de hablar del locutor */
        .talking { transform: scale(1.02); }

    </style>
</head>
<body>

    <div class="tv-screen">
        <!-- Imagen de la noticia -->
        <img id="news-bg" src="/static/placeholder_sde.jpg">

        <!-- Interfaz -->
        <div class="overlay-ui">
            <div class="top-bar">
                <div class="logo-tv">🏮 EL FAROL <strong>TV</strong></div>
                <div class="live-tag">● EN VIVO</div>
            </div>

            <div class="bottom-ui">
                <div class="headline-container">
                    <div id="current-title">CONECTANDO CON SANTO DOMINGO ESTE...</div>
                </div>
                <div class="ticker-wrap">
                    <div class="ticker-label">ÚLTIMO MINUTO</div>
                    <div id="ticker-content" class="ticker-text">CARGANDO LAS NOTICIAS MÁS IMPACTANTES DE LA ZONA ORIENTAL...</div>
                </div>
            </div>
        </div>

        <!-- Locutor -->
        <div class="anchor-man">
            <img id="anchor-img" src="/static/locutor_mxl.png">
        </div>
    </div>

    <!-- Audio Invisible -->
    <audio id="news-audio" autoplay></audio>

    <script>
        const audio = document.getElementById('news-audio');
        const anchor = document.getElementById('anchor-img');
        const bg = document.getElementById('news-bg');
        const title = document.getElementById('current-title');
        const ticker = document.getElementById('ticker-content');

        async function cargarNoticiaTV() {
            try {
                const res = await fetch('/api/noticias');
                const data = await res.json();
                
                if (data.success && data.noticias.length > 0) {
                    const noticia = data.noticias[0]; // La más nueva
                    
                    // Actualizar UI
                    title.innerText = noticia.titulo;
                    ticker.innerText = noticia.titulo + " — " + noticia.seo_description + " — EL FAROL AL DÍA — ";
                    bg.src = noticia.imagen;

                    // Si hay audio, lo ponemos
                    if (noticia.audio_nombre) {
                        audio.src = `/audio/${noticia.audio_nombre}`;
                        audio.play().catch(e => console.log("Click para activar audio"));
                    }
                }
            } catch (err) {
                console.error("Error cargando TV:", err);
            }
        }

        // Efecto visual de "hablar"
        audio.onplay = () => {
            const talkingInterval = setInterval(() => {
                if (audio.paused || audio.ended) {
                    clearInterval(talkingInterval);
                    anchor.classList.remove('talking');
                    return;
                }
                anchor.classList.toggle('talking');
            }, 150);
        };

        // Al terminar el audio, esperar 5 segundos y recargar para buscar noticia nueva
        audio.onended = () => {
            setTimeout(() => {
                location.reload();
            }, 5000);
        };

        // Fallback: si no hay audio, recargar cada 30 segundos
        setTimeout(() => {
            if (audio.paused) location.reload();
        }, 30000);

        window.onload = cargarNoticiaTV;
    </script>
</body>
</html>
