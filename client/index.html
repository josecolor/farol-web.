<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redacción | El Farol al Día</title>
    <style>
        /* Estilos de tu panel de redacción (los que ya tienes) */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0b0b0b;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        header {
            background: #1a1a1a;
            border-bottom: 4px solid #FF8C00;
            padding: 1rem;
            border-radius: 16px 16px 0 0;
            margin-bottom: 20px;
        }
        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            color: #FF8C00;
            font-size: 2rem;
            font-weight: bold;
            text-decoration: none;
        }
        nav a {
            color: white;
            margin-left: 20px;
            text-decoration: none;
        }
        nav a:hover {
            color: #FF8C00;
        }
        .panel {
            background: #1a1a1a;
            border-radius: 16px;
            padding: 30px;
            border-left: 4px solid #FF8C00;
            margin: 20px 0;
        }
        h1 {
            color: #FF8C00;
            text-align: center;
            margin-bottom: 30px;
        }
        select, button {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            font-size: 1.1em;
        }
        select {
            background: #222;
            border: 2px solid #FF8C00;
            color: white;
        }
        button {
            background: #FF8C00;
            color: black;
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255,140,0,0.3);
        }
        .resultado {
            background: #222;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
            display: none;
            border-left: 3px solid #FF8C00;
        }
        .noticia-card {
            background: #222;
            padding: 15px;
            margin: 10px 0;
            border-left: 3px solid #FF8C00;
            border-radius: 8px;
        }
        .btn-ver {
            background: #2e7d32;
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            text-decoration: none;
            display: inline-block;
            margin-top: 10px;
        }
        .stats {
            background: #222;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
            border: 1px solid #FF8C00;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <a href="/" class="logo">🏮 El Farol al Día</a>
            <nav>
                <a href="/">Inicio</a>
                <a href="/redaccion">Redacción</a>
                <a href="/status">Estado</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="panel">
            <h1>🏮 Sala de Redacción</h1>
            <select id="categoria">
                <option value="Nacionales">🇩🇴 Nacionales</option>
                <option value="Deportes">⚽ Deportes</option>
                <option value="Internacionales">🌍 Internacionales</option>
                <option value="Espectáculos">🎬 Espectáculos</option>
                <option value="Economía">💼 Economía</option>
                <option value="Tecnología">💻 Tecnología</option>
            </select>
            <button onclick="generarNoticia()">🤖 GENERAR NOTICIA CON IA</button>
            <div id="resultado" class="resultado"></div>
        </div>

        <div class="stats" id="stats">
            <h2 style="color:#FF8C00;">📊 Estadísticas</h2>
            <p>Cargando...</p>
        </div>

        <h2 style="color:#FF8C00;">📰 Últimas noticias</h2>
        <div id="noticias"></div>
    </main>

    <script>
        async function generarNoticia() {
            const cat = document.getElementById('categoria').value;
            const resultado = document.getElementById('resultado');
            resultado.style.display = 'block';
            resultado.innerHTML = '⏳ Generando...';
            
            try {
                const res = await fetch('/api/generar-noticia', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({categoria: cat})
                });
                const data = await res.json();
                if (data.success) {
                    resultado.innerHTML = `
                        <p style="color:#4CAF50;">✅ ¡Noticia generada!</p>
                        <p><strong>${data.titulo}</strong></p>
                        <p>Redactor: ${data.redactor}</p>
                        <a href="${data.url}" target="_blank" style="color:#FF8C00;">🔗 Ver noticia</a>
                    `;
                    cargarNoticias();
                    cargarStats();
                } else {
                    resultado.innerHTML = `<p style="color:#f44336;">❌ Error: ${data.error}</p>`;
                }
            } catch (e) {
                resultado.innerHTML = `<p style="color:#f44336;">❌ Error de conexión</p>`;
            }
        }

        async function cargarNoticias() {
            try {
                const res = await fetch('/api/noticias');
                const data = await res.json();
                if (data.success) {
                    const container = document.getElementById('noticias');
                    if (data.noticias.length === 0) {
                        container.innerHTML = '<p>No hay noticias aún.</p>';
                        return;
                    }
                    container.innerHTML = data.noticias.map(n => `
                        <div class="noticia-card">
                            <strong style="color:#FF8C00;">${n.titulo}</strong><br>
                            <small>${n.seccion} | ${new Date(n.fecha).toLocaleDateString()} | ✍️ ${n.redactor}</small><br>
                            <a href="/noticia/${n.slug}" target="_blank" class="btn-ver">Ver noticia</a>
                        </div>
                    `).join('');
                }
            } catch (e) {
                console.error(e);
            }
        }

        async function cargarStats() {
            try {
                const res = await fetch('/api/noticias');
                const data = await res.json();
                if (data.success) {
                    const total = data.noticias.length;
                    const vistas = data.noticias.reduce((a, n) => a + (n.vistas || 0), 0);
                    document.getElementById('stats').innerHTML = `
                        <h2 style="color:#FF8C00;">📊 Estadísticas</h2>
                        <p>📰 Total noticias: ${total}</p>
                        <p>👁️ Vistas totales: ${vistas}</p>
                        <p>⏰ Automatización: Cada 2 horas + 8 AM</p>
                        <p>🧹 Limpieza: Noticias > 8 días (3 AM)</p>
                    `;
                }
            } catch (e) {
                document.getElementById('stats').innerHTML = '<p>Error cargando estadísticas</p>';
            }
        }

        cargarNoticias();
        cargarStats();
    </script>
</body>
</html>
