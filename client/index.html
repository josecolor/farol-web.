<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Farol al Día 🏮 Último Minuto RD | Santo Domingo Este</title>
    <!-- [Tus metas y scripts de OneSignal/AdSense se mantienen igual aquí] -->
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(async function(OneSignal) {
        await OneSignal.init({ appId: "14cdf752-ad4f-4d48-8eea-1bbb5dfc8e72", notifyButton: { enable: true } });
      });
    </script>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5280872495839888" crossorigin="anonymous"></script>

    <style>
        :root {
            --naranja: #FF5500; --naranja-claro: #FF7733; --fondo: #070707;
            --tarjeta: #141418; --texto: #EDE8DF; --texto-sec: #A89F94; --borde: #222228;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--fondo); color: var(--texto); font-family: 'Georgia',serif; min-height: 100vh; }

        /* HEADER & NAV - Tu estilo original */
        header { background: #000; border-bottom: 3px solid var(--naranja); position: sticky; top: 0; z-index: 100; }
        .header-top { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; max-width: 1200px; margin: 0 auto; }
        .logo-wrap h1 { font-size: 28px; color: var(--naranja); font-weight: 900; text-transform: uppercase; }
        
        /* 📺 SECCIÓN FAROL TV (NUEVA) */
        .tv-section { background: #000; padding: 20px 0; border-bottom: 1px solid var(--borde); }
        .tv-container { max-width: 1000px; margin: 0 auto; background: #111; border: 2px solid var(--naranja); border-radius: 12px; overflow: hidden; position: relative; box-shadow: 0 0 30px rgba(255,85,0,0.2); }
        .tv-header-label { background: var(--naranja); color: #fff; font-size: 12px; font-weight: 900; padding: 5px 15px; display: flex; align-items: center; gap: 8px; font-family: Arial; }
        .live-dot { width: 8px; height: 8px; background: #fff; border-radius: 50%; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        .tv-iframe { width: 100%; height: 500px; border: none; }

        /* 🔊 BOTÓN DE AUDIO EN CARDS */
        .audio-btn { 
            background: #1a1a1a; border: 1px solid var(--naranja); color: var(--naranja); 
            padding: 8px 12px; border-radius: 6px; font-size: 12px; font-weight: bold; 
            cursor: pointer; display: flex; align-items: center; gap: 8px; margin-top: 10px;
            transition: all 0.2s; font-family: Arial;
        }
        .audio-btn:hover { background: var(--naranja); color: #fff; }
        .playing { background: #00ff00 !important; color: #000 !important; border-color: #00ff00 !important; }

        /* TICKER, GRID Y ESTILOS ORIGINALES (Mantener tus estilos anteriores) */
        .nav-cats { background: #0d0d0d; border-bottom: 1px solid var(--borde); overflow-x: auto; }
        .nav-cats ul { display: flex; list-style: none; max-width: 1200px; margin: 0 auto; }
        .nav-cats ul li a { display: block; padding: 15px; font-size: 12px; color: #888; text-decoration: none; font-weight: bold; text-transform: uppercase; }
        .nav-cats ul li a.activo { color: var(--naranja); border-bottom: 2px solid var(--naranja); }

        .ticker-wrap { background: var(--naranja); padding: 8px 0; }
        .container { max-width: 1200px; margin: 0 auto; padding: 24px 15px; }
        .grid-noticias { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 24px; }
        .noticia-card { background: var(--tarjeta); border-radius: 10px; border: 1px solid var(--borde); text-decoration: none; color: inherit; display: flex; flex-direction: column; overflow: hidden; }
        .card-img img { width: 100%; height: 210px; object-fit: cover; }
        .card-info { padding: 20px; flex: 1; display: flex; flex-direction: column; }
        
        @media (max-width: 768px) { .tv-iframe { height: 250px; } }
    </style>
</head>
<body>

<header>
    <div class="header-top">
        <div class="logo-wrap">
            <h1>🏮 El Farol al Día</h1>
            <div class="tagline">Santo Domingo Este · República Dominicana · 2026</div>
        </div>
    </div>
    <nav class="nav-cats">
        <ul>
            <li><a href="#" onclick="filtrarCat('');return false;" class="activo" id="btn-todos">Todas</a></li>
            <li><a href="#" onclick="filtrarCat('Nacionales');return false;" id="btn-Nacionales">🏛️ Nacionales</a></li>
            <li><a href="#" onclick="filtrarCat('Deportes');return false;" id="btn-Deportes">⚽ Deportes</a></li>
            <li><a href="#" onclick="filtrarCat('Economía');return false;" id="btn-Economía">💰 Economía</a></li>
        </ul>
    </nav>
</header>

<!-- 📺 SECCIÓN FAROL TV (PUESTA EN EL TOP) -->
<section class="tv-section">
    <div class="tv-container">
        <div class="tv-header-label">
            <div class="live-dot"></div> EN VIVO: EL FAROL TV DIGITAL SDE
        </div>
        <iframe src="/tv" class="tv-iframe" scrolling="no"></iframe>
    </div>
</section>

<div class="ticker-wrap">
    <div class="ticker-text"><span id="ticker-texto">Cargando noticias...</span></div>
</div>

<main class="container">
    <div id="contenedor-noticias"></div>
</main>

<script>
    let todasLasNoticias = [];

    // 🔊 Lógica para tocar el audio de cada noticia
    function reproducirAudio(slug, btn) {
        // Detener cualquier audio anterior
        const anterior = document.querySelector('audio');
        if (anterior) anterior.remove();
        document.querySelectorAll('.audio-btn').forEach(b => {
            b.classList.remove('playing');
            b.innerHTML = '🔊 Escuchar Noticia';
        });

        const audio = new Audio(`/audio/audio-${slug}.mp3`);
        audio.play();
        btn.classList.add('playing');
        btn.innerHTML = '⏳ Escuchando...';
        
        audio.onended = () => {
            btn.classList.remove('playing');
            btn.innerHTML = '🔊 Escuchar Noticia';
        };
    }

    async function cargarNoticias() {
        const res = await fetch('/api/noticias');
        const data = await res.json();
        if (data.success) {
            todasLasNoticias = data.noticias;
            renderNoticias(todasLasNoticias);
        }
    }

    function renderNoticias(noticias) {
        const contenedor = document.getElementById('contenedor-noticias');
        let html = '<div class="grid-noticias">';
        noticias.forEach(n => {
            html += `
            <div class="noticia-card">
                <a href="/noticia/${n.slug}" class="card-img">
                    <img src="${n.imagen}" alt="${n.titulo}">
                </a>
                <div class="card-info">
                    <small style="color:var(--naranja)">${n.seccion}</small>
                    <h2 style="margin:10px 0">${n.titulo}</h2>
                    <p style="font-size:13px; color:#888">${n.seo_description}</p>
                    
                    <!-- Botón de Voz MXL -->
                    <button class="audio-btn" onclick="reproducirAudio('${n.slug}', this)">
                        🔊 Escuchar Noticia
                    </button>
                    
                    <a href="/noticia/${n.slug}" style="margin-top:15px; color:var(--naranja); text-decoration:none; font-weight:bold; font-size:12px">LEER MÁS →</a>
                </div>
            </div>`;
        });
        html += '</div>';
        contenedor.innerHTML = html;
    }

    cargarNoticias();
</script>
</body>
</html>
