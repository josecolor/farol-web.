<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Farol al Día | Noticias en Realidad</title>
    <!-- Marcador para que el servidor inyecte la metaetiqueta de Google Search Console -->
    <!-- META_GOOGLE_VERIFICATION -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000;
            color: #fff;
            line-height: 1.6;
        }
        header {
            background: #6200ea;
            padding: 20px;
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 1px;
            box-shadow: 0 2px 10px rgba(98, 0, 234, 0.5);
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        .loading, .error, .empty {
            text-align: center;
            padding: 50px;
            font-size: 1.2em;
            color: #aaa;
        }
        .noticia {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            transition: transform 0.2s, box-shadow 0.2s;
            border-left: 4px solid #6200ea;
        }
        .noticia:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 20px rgba(98, 0, 234, 0.3);
        }
        .noticia img {
            width: 100%;
            max-height: 300px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .noticia h2 {
            color: #bb86fc;
            margin: 10px 0;
            font-size: 1.8em;
            cursor: pointer;
        }
        .noticia h2:hover {
            text-decoration: underline;
        }
        .noticia p {
            color: #ddd;
            margin: 10px 0;
        }
        .noticia .meta {
            display: flex;
            justify-content: space-between;
            color: #888;
            font-size: 0.9em;
            margin-top: 15px;
            border-top: 1px solid #333;
            padding-top: 10px;
        }
        .noticia .seccion {
            background: #6200ea;
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: bold;
        }
        a {
            text-decoration: none;
            color: inherit;
        }
        @media (max-width: 600px) {
            header {
                font-size: 22px;
            }
            .noticia h2 {
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>
    <header>🏮 EL FAROL AL DÍA</header>
    <div class="container" id="noticias-container">
        <div class="loading">Cargando primicias...</div>
    </div>

    <script>
        const container = document.getElementById('noticias-container');

        async function cargarNoticias() {
            try {
                const res = await fetch('/api/noticias');
                if (!res.ok) throw new Error('Error en la respuesta del servidor');
                const data = await res.json();
                
                if (!data.success || !data.noticias || data.noticias.length === 0) {
                    container.innerHTML = '<div class="empty">📭 No hay noticias aún. ¡Vuelve pronto!</div>';
                    return;
                }

                const noticias = data.noticias;
                container.innerHTML = noticias.map(n => `
                    <div class="noticia">
                        <img src="${n.imagen || 'https://via.placeholder.com/800x400?text=El+Farol+al+Día'}" alt="Imagen de la noticia" loading="lazy">
                        <h2 onclick="window.location.href='/noticia/${n._id}'">${n.titulo}</h2>
                        <p>${n.contenido.substring(0, 200)}...</p>
                        <div class="meta">
                            <span class="seccion">${n.seccion || 'General'}</span>
                            <span>📅 ${new Date(n.fecha).toLocaleDateString('es-DO')}</span>
                            <span>👁️ ${n.vistas || 0}</span>
                            <span>👤 ${n.redactor || 'Redacción'}</span>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error(error);
                container.innerHTML = '<div class="error">❌ Error al cargar el búnker. Intenta de nuevo más tarde.</div>';
            }
        }

        cargarNoticias();
    </script>
</body>
</html>
