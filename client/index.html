<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Farol al Día | SDE 2026</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        /* Estilo limpio mxl */
        body { background:#070707; color:#EDE8DF; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; margin:0; padding:15px; }
        header { text-align:center; border-bottom:2px solid #FF5500; padding-bottom:15px; margin-bottom:25px; }
        header h1 { color:#FF5500; margin:0; font-size: 28px; letter-spacing: 1px; }
        header p { margin:5px 0; font-weight:bold; text-transform:uppercase; font-size:12px; color: #A89F94; }
        
        #noticias-grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap:20px; max-width:1200px; margin:0 auto; }
        
        .card { background:#141418; border-radius:12px; overflow:hidden; border:1px solid #333; transition: 0.3s; }
        .card:hover { border-color: #FF5500; transform: translateY(-3px); }
        .card img { width:100%; height:210px; object-fit:cover; border-bottom: 1px solid #333; }
        .card-body { padding:18px; }
        
        .tag { color:#FF5500; font-size:11px; font-weight:bold; text-transform:uppercase; display: block; margin-bottom: 8px; }
        .card h2 { font-size:19px; margin:0 0 12px 0; line-height: 1.3; color: #fff; }
        .card p { font-size:14px; color:#A89F94; line-height:1.5; margin-bottom: 20px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        
        .btn-audio { background:#FF5500; color:#fff; border:none; padding:12px; border-radius:8px; cursor:pointer; font-weight:bold; width:100%; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; }
        .btn-audio:hover { background: #E64D00; }
        .btn-no-audio { background:#222; color:#555; border:none; padding:12px; border-radius:8px; width:100%; cursor: not-allowed; }
        
        .leer-mas { display:block; text-align:center; margin-top:15px; color:#FF5500; text-decoration:none; font-size:13px; font-weight:bold; border: 1px solid #FF5500; padding: 8px; border-radius: 6px; }
        .leer-mas:hover { background: rgba(255, 85, 0, 0.1); }
    </style>
</head>
<body>

    <header>
        <h1>🏮 EL FAROL AL DÍA</h1>
        <p>Santo Domingo Este · Lo que el otro no te cuenta</p>
    </header>

    <main id="noticias-grid">
        <!-- El robot V35.1 inyectará las noticias aquí -->
    </main>

    <script>
        async function cargarNoticias() {
            try {
                // Llamamos a la API de tu V35.1
                const res = await fetch('/api/noticias');
                const data = await res.json();
                const grid = document.getElementById('noticias-grid');
                grid.innerHTML = '';

                if (!data.noticias || data.noticias.length === 0) {
                    grid.innerHTML = '<p style="text-align:center; grid-column: 1/-1;">Esperando noticias frescas del barrio...</p>';
                    return;
                }

                data.noticias.forEach(n => {
                    // 🎙️ Lógica para el botón de audio (Antoni)
                    // Importante: V35.1 debe guardar el campo audio_nombre para que esto funcione
                    const tieneAudio = n.audio_nombre && n.audio_nombre !== 'null' && n.audio_nombre !== '';
                    
                    const botonAudio = tieneAudio 
                        ? `<button class="btn-audio" onclick="playAudio('${n.audio_nombre}')"><span>🔊</span> ESCUCHAR NOTICIA</button>`
                        : `<button class="btn-no-audio" disabled>⏳ Audio en proceso</button>`;

                    grid.innerHTML += `
                        <article class="card">
                            <img src="${n.imagen}" alt="${n.imagen_alt || n.titulo}" onerror="this.src='/static/fallback.jpg'">
                            <div class="card-body">
                                <span class="tag">${n.seccion}</span>
                                <h2>${n.titulo}</h2>
                                <p>${n.seo_description}</p>
                                ${botonAudio}
                                <a href="/noticia/${n.slug}" class="leer-mas">LEER NOTICIA COMPLETA</a>
                            </div>
                        </article>
                    `;
                });
            } catch (err) {
                console.error("Error cargando el feed:", err);
            }
        }

        function playAudio(archivo) {
            const audio = new Audio(`/audio/${archivo}`);
            audio.play().catch(e => {
                alert("Toca en cualquier parte de la pantalla para activar el sonido (permiso del navegador)");
            });
        }

        // Carga inicial
        cargarNoticias();
        
        // Refresco automático cada 3 minutos (180000ms)
        setInterval(cargarNoticias, 180000);
    </script>
</body>
</html>
