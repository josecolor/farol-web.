<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farol Al Día 🏮 | Noticias en Vivo</title>
    <style>
        :root { --naranja: #FF8C00; --negro: #000; }
        body { background: var(--negro); color: white; font-family: sans-serif; margin: 0; padding: 10px; }
        .header { text-align: center; padding: 20px; border-bottom: 2px solid var(--naranja); }
        .canal-btn { 
            display: block; background: #25D366; color: white; text-align: center; 
            padding: 15px; margin: 15px 0; border-radius: 10px; font-weight: bold; 
            text-decoration: none; font-size: 1.1em; border: 2px solid white;
        }
        .noticia { background: #1a1a1a; margin-bottom: 20px; border-radius: 12px; overflow: hidden; border: 1px solid #333; }
        .noticia img { width: 100%; height: auto; display: block; }
        .noticia-body { padding: 15px; }
        .tag { color: var(--naranja); font-weight: bold; font-size: 0.9em; text-transform: uppercase; }
        .titulo { font-size: 1.5em; margin: 10px 0; line-height: 1.2; }
        .meta { color: #888; font-size: 0.85em; margin-bottom: 10px; }
        .contenido { color: #ccc; line-height: 1.5; }
    </style>
</head>
<body>
    <div class="header">
        <h1 style="margin:0;">FAROL AL DÍA 🏮</h1>
        <p style="color: var(--naranja); margin:5px 0;">Iluminando la Verdad</p>
    </div>

    <a href="https://whatsapp.com/channel/0029Vb7TMgWGk1Fw3lINT03G" class="canal-btn">
        🟢 ÚNETE AL CANAL DE WHATSAPP 🔥
    </a>

    <div id="noticias-container">
        <p style="text-align:center; color:#555;">Esperando primicias del búnker...</p>
    </div>

    <script>
        async function cargarNoticias() {
            try {
                const res = await fetch('/noticias');
                const noticias = await res.json();
                const container = document.getElementById('noticias-container');
                container.innerHTML = "";

                noticias.reverse().forEach(n => {
                    container.innerHTML += `
                        <div class="noticia">
                            ${n.imagen ? `<img src="${n.imagen}">` : ''}
                            <div class="noticia-body">
                                <span class="tag">📍 ${n.ubicacion || 'General'}</span>
                                <h2 class="titulo">${n.titulo}</h2>
                                <div class="meta">Por: <b>${n.redactor}</b> | Farol Al Día</div>
                                <p class="contenido">${n.contenido}</p>
                            </div>
                        </div>
                    `;
                });
            } catch (e) {
                console.log("Esperando datos...");
            }
        }
        setInterval(cargarNoticias, 5000);
        cargarNoticias();
    </script>
</body>
</html>
