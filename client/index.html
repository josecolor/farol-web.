<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>El Farol al Día 🏮</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0b0b0b;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 12px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 3px solid #FF8C00;
        }
        
        h1 {
            color: #FF8C00;
            font-size: 2.2em;
        }
        
        .secciones {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 10px 0;
            margin-bottom: 20px;
        }
        
        .seccion-btn {
            padding: 12px 20px;
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            white-space: nowrap;
            cursor: pointer;
        }
        
        .seccion-btn.active {
            background: #FF8C00;
            border-color: #FF8C00;
            color: black;
        }
        
        .noticia-card {
            background: #1a1a1a;
            border-radius: 25px;
            padding: 18px;
            margin-bottom: 20px;
            border-left: 5px solid #FF8C00;
            position: relative;
        }
        
        .share-icon {
            position: absolute;
            top: 18px;
            right: 18px;
            width: 44px;
            height: 44px;
            background: #FF8C00;
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3em;
            cursor: pointer;
            z-index: 10;
            border: 2px solid white;
        }
        
        .noticia-titulo {
            font-size: 1.3em;
            font-weight: bold;
            color: #FF8C00;
            margin-bottom: 8px;
            padding-right: 50px;
            cursor: pointer;
        }
        
        .noticia-contenido {
            color: #ccc;
            margin-bottom: 12px;
            cursor: pointer;
        }
        
        .noticia-meta {
            display: flex;
            gap: 15px;
            color: #888;
            font-size: 0.9em;
        }
        
        .noticia-imagen {
            width: 100%;
            max-height: 200px;
            object-fit: cover;
            border-radius: 15px;
            margin-bottom: 12px;
        }
        
        .admin-link {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            background: #FF8C00;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: black;
            text-decoration: none;
            opacity: 0;
            z-index: 100;
        }
        
        .admin-link.visible {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏮 El Farol al Día</h1>
        </header>
        
        <div class="secciones" id="secciones">
            <button class="seccion-btn active" onclick="cargarTodas()">📰 Todas</button>
            <button class="seccion-btn" onclick="cargarSeccion('Nacionales')">🇩🇴 Nacionales</button>
            <button class="seccion-btn" onclick="cargarSeccion('Deportes')">⚽ Deportes</button>
            <button class="seccion-btn" onclick="cargarSeccion('Internacionales')">🌍 Internacionales</button>
            <button class="seccion-btn" onclick="cargarSeccion('Espectáculos')">🎬 Espectáculos</button>
            <button class="seccion-btn" onclick="cargarSeccion('Economía')">💼 Economía</button>
        </div>
        
        <div id="noticias-container"></div>
        
        <a href="/redaccion" class="admin-link" id="adminBtn">🏮</a>
    </div>

    <script>
        async function cargarTodas() {
            const res = await fetch('/noticias?limit=30');
            const data = await res.json();
            mostrarNoticias(data.noticias);
        }
        
        async function cargarSeccion(seccion) {
            document.querySelectorAll('.seccion-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            const res = await fetch(`/seccion/${seccion}`);
            const data = await res.json();
            mostrarNoticias(data.noticias);
        }
        
        function mostrarNoticias(noticias) {
            const container = document.getElementById('noticias-container');
            container.innerHTML = '';
            
            noticias.forEach(n => {
                const fecha = new Date(n.fecha).toLocaleDateString();
                const card = document.createElement('div');
                card.className = 'noticia-card';
                
                let multimedia = '';
                if (n.imagen) {
                    if (n.imagen.includes('video')) {
                        multimedia = `<video class="noticia-imagen" src="${n.imagen}" controls></video>`;
                    } else {
                        multimedia = `<img class="noticia-imagen" src="${n.imagen}">`;
                    }
                }
                
                card.innerHTML = `
                    <div class="share-icon" onclick="compartir('${n._id}', event)">📤</div>
                    ${multimedia}
                    <div class="noticia-titulo" onclick="abrir('${n._id}')">${n.titulo}</div>
                    <div class="noticia-contenido" onclick="abrir('${n._id}')">${n.contenido.substring(0, 100)}...</div>
                    <div class="noticia-meta">
                        <span>📰 ${n.seccion}</span>
                        <span>👁️ ${n.vistas || 0}</span>
                        <span>${fecha}</span>
                    </div>
                `;
                container.appendChild(card);
            });
        }
        
        function compartir(id, event) {
            event.stopPropagation();
            const url = window.location.origin + '/noticia/' + id;
            if (navigator.share) {
                navigator.share({ url: url });
            } else {
                prompt('📋 Copia este link:', url);
            }
        }
        
        function abrir(id) {
            window.location.href = '/noticia/' + id;
        }
        
        // Admin con doble tap
        let lastTap = 0;
        document.addEventListener('touchend', function(e) {
            const now = new Date().getTime();
            if (now - lastTap < 500) {
                const pin = prompt('PIN:');
                if (pin === '311') {
                    document.getElementById('adminBtn').classList.add('visible');
                }
            }
            lastTap = now;
        });
        
        cargarTodas();
    </script>
</body>
</html>
