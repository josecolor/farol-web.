<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Farol al Día 🏮 Último Minuto RD</title>
    <style>
        :root { --naranja: #FF5500; --fondo: #070707; --tarjeta: #141418; --texto: #EDE8DF; }
        body { background: var(--fondo); color: var(--texto); font-family: 'Arial', sans-serif; margin: 0; }
        
        /* Header Estilo Periódico */
        header { border-bottom: 2px solid var(--naranja); padding: 20px; text-align: center; background: #000; }
        header h1 { font-size: 35px; color: var(--naranja); margin: 0; letter-spacing: 2px; }
        .sub-header { font-size: 12px; color: #888; text-transform: uppercase; margin-top: 5px; }

        /* Contenedor de Noticias */
        .container { max-width: 1200px; margin: 20px auto; padding: 0 15px; }
        .grid-noticias { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 25px; }

        /* Tarjeta de Noticia - REPARADA PARA IMÁGENES */
        .noticia-card { 
            background: var(--tarjeta); 
            border-radius: 12px; 
            overflow: hidden; 
            transition: 0.3s; 
            border: 1px solid #222;
            display: flex;
            flex-direction: column;
        }
        .noticia-card:hover { transform: translateY(-5px); border-color: var(--naranja); }

        .img-container { 
            width: 100%; 
            height: 220px; 
            background: #222; /* Fondo gris si no carga la imagen */
            position: relative;
        }
        .img-container img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            display: block;
        }
        
        /* Badge de Sección */
        .badge { position: absolute; top: 10px; left: 10px; background: var(--naranja); color: #fff; padding: 5px 12px; font-size: 11px; font-weight: bold; border-radius: 4px; }

        .info { padding: 20px; }
        .info h2 { font-size: 20px; margin: 0 0 10px 0; line-height: 1.3; color: #fff; }
        .info p { font-size: 14px; color: #aaa; line-height: 1.5; margin-bottom: 15px; }
        .meta { font-size: 11px; color: #666; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #222; padding-top: 10px; }

        a { text-decoration: none; color: inherit; }
        .leer-mas { color: var(--naranja); font-weight: bold; font-size: 13px; }

        @media (max-width: 600px) {
            .grid-noticias { grid-template-columns: 1fr; }
            header h1 { font-size: 25px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>EL FAROL AL DÍA</h1>
        <div class="sub-header">Noticias de Santo Domingo Este y República Dominicana | 2026</div>
    </header>

    <div class="container">
        <div id="noticias-lista" class="grid-noticias">
            <!-- Aquí el Toro mete las noticias -->
            <p style="text-align: center; width: 100%;">Cargando últimas noticias del periódico...</p>
        </div>
    </div>

    <script>
        async function cargarNoticias() {
            const lista = document.getElementById('noticias-lista');
            try {
                const res = await fetch('/api/noticias');
                const data = await res.json();

                if (data.success && data.noticias.length > 0) {
                    lista.innerHTML = '';
                    data.noticias.forEach(n => {
                        // Si la imagen está vacía, ponemos una por defecto de Santo Domingo
                        const imagenUrl = n.imagen && n.imagen.startsWith('http') 
                            ? n.imagen 
                            : 'https://images.pexels.com/photos/3052454/pexels-photo-3052454.jpeg?auto=compress&cs=tinysrgb&w=800';

                        lista.innerHTML += `
                            <a href="/noticia/${n.slug}" class="noticia-card">
                                <div class="img-container">
                                    <span class="badge">${n.seccion}</span>
                                    <img src="${imagenUrl}" alt="${n.titulo}">
                                </div>
                                <div class="info">
                                    <h2>${n.titulo}</h2>
                                    <p>${n.contenido ? n.contenido.substring(0, 120) + '...' : ''}</p>
                                    <div class="meta">
                                        <span>📍 SDE, RD</span>
                                        <span class="leer-mas">LEER MÁS →</span>
                                    </div>
                                </div>
                            </a>
                        `;
                    });
                } else {
                    lista.innerHTML = '<p>No hay noticias publicadas en este momento.</p>';
                }
            } catch (err) {
                lista.innerHTML = '<p>Error al conectar con el periódico.</p>';
            }
        }

        cargarNoticias();
    </script>
</body>
</html>
