<!DOCTYPE html>
<html lang="es-DO">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5">
    <title>El Farol al Día - Noticias de República Dominicana en Tiempo Real</title>
    
    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5280872495839888" crossorigin="anonymous"></script>

    <!-- Tus fuentes y estilos se mantienen igual (Bebas, Lora, JetBrains) -->
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Lora:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>
        /* Mantenemos tus variables exactas */
        :root {
            --fuego: #FF5500;
            --negro: #070707;
            --papel: #181818;
            --borde: #242424;
            --crema: #EDE8DF;
            --dorado: #FFD700;
            --azul-marino: #0A2647;
        }

        /* [AQUÍ VA TODO TU CSS ACTUAL - SE MANTIENE INTACTO PARA NO DAÑAR EL DISEÑO] */
        /* ... (Inserta aquí el CSS que ya tienes para que el diseño no cambie) ... */
        
        /* AJUSTE EXTRA PARA IMÁGENES ROTAS */
        .card-img img {
            background: #222;
            min-height: 200px;
            display: block;
        }
    </style>
</head>
<body>

<!-- Mantenemos tu Header, Nav y Hero exactamente como los tienes -->
<header>
    <!-- Tu código de Header... -->
</header>

<main>
    <!-- Tu Hero... -->
    <div class="noticias-grid" id="grid">
        <div class="loading-wrap">
            <div class="spinner"></div>
            <p>Sincronizando con el servidor V34.2-FIX...</p>
        </div>
    </div>
</main>

<!-- SECCIÓN NEGOCIOS (Se mantiene igual) -->

<script>
// CONFIGURACIÓN DE SOCIO
const CONFIG = {
    CATS: ['Nacionales','Deportes','Internacionales','Economía','Tecnología','Espectáculos'],
    EMOJIS: { Nacionales:'🏛️', Deportes:'⚽', Internacionales:'🌍', Economía:'💼', Tecnología:'💻', Espectáculos:'🎬' }
};

let todas = [];

async function cargarNoticias(intento = 1) {
    const grid = document.getElementById('grid');
    
    try {
        const res = await fetch('/api/noticias');
        if (!res.ok) throw new Error("Error en servidor");
        const data = await res.json();
        
        if (data.success && data.noticias.length > 0) {
            todas = data.noticias;
            renderizar(todas);
        } else {
            grid.innerHTML = `<div class="loading-wrap"><p>Generando noticias iniciales tras la limpieza... (Esto tarda 1 min)</p></div>`;
        }
    } catch (e) {
        console.error("Falla en carga:", e);
        if (intento < 3) {
            setTimeout(() => cargarNoticias(intento + 1), 3000);
        } else {
            grid.innerHTML = `
                <div class="loading-wrap">
                    <p style="color:var(--fuego)">⚠️ El servidor de Railway está despertando...</p>
                    <button onclick="location.reload()" style="background:var(--fuego); color:white; border:none; padding:10px 20px; border-radius:5px; margin-top:10px; cursor:pointer;">REINTENTAR AHORA</button>
                </div>`;
        }
    }
}

function renderizar(noticias) {
    const grid = document.getElementById('grid');
    grid.innerHTML = noticias.map((n, i) => `
        <a class="card" href="/noticia/${n.slug}">
            <div class="card-img">
                <img src="${n.imagen}" 
                     alt="${n.titulo}" 
                     onerror="this.src='https://images.pexels.com/photos/3052454/pexels-photo-3052454.jpeg?auto=compress&w=800'"
                     loading="${i < 3 ? 'eager' : 'lazy'}">
            </div>
            <div class="card-body">
                <span class="card-seccion">${CONFIG.EMOJIS[n.seccion] || '📰'} ${n.seccion}</span>
                <h3 class="card-titulo">${n.titulo}</h3>
                <div class="card-meta">
                    <span>📅 ${new Date(n.fecha).toLocaleDateString('es-DO')}</span>
                    <span>👁️ ${n.vistas || 0}</span>
                </div>
            </div>
        </a>
    `).join('');
}

// Inicializar
document.addEventListener('DOMContentLoaded', () => {
    cargarNoticias();
    // Tu lógica de fechas y categorías se mantiene...
});
</script>
</body>
</html>
