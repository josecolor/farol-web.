<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Ingeniero — El Farol al Día</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#080810;--bg2:#0f0f1a;--bg3:#161625;--border:#1e1e35;--acc:#FF5500;--green:#22c55e;--yellow:#f59e0b;--red:#ef4444;--blue:#3b82f6;--text:#EDE8DF;--muted:#777}
body{background:var(--bg);color:var(--text);font-family:'Courier New',monospace;height:100vh;display:flex;flex-direction:column;overflow:hidden}
header{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.bi{display:flex;align-items:center;gap:10px}
.ba{width:38px;height:38px;background:var(--acc);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.bn{font-size:14px;font-weight:bold;color:var(--acc)}
.bs{font-size:11px;color:var(--muted)}
.dot{width:8px;height:8px;background:var(--green);border-radius:50%;animation:p 2s infinite}
@keyframes p{0%,100%{opacity:1}50%{opacity:.4}}
#chat{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
#chat::-webkit-scrollbar{width:4px}
#chat::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.msg{display:flex;gap:10px;max-width:92%;animation:fi .2s ease}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg.bot{align-self:flex-start}
.av{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px}
.msg.bot .av{background:var(--acc)}
.msg.user .av{background:var(--bg3);border:1px solid var(--border)}
.bub{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:10px 14px;font-size:13px;line-height:1.7;max-width:100%;white-space:pre-wrap;word-break:break-word}
.msg.user .bub{background:var(--bg3);border-color:var(--acc);border-radius:12px 12px 2px 12px}
.msg.bot .bub{border-radius:2px 12px 12px 12px}
.bub table{width:100%;border-collapse:collapse;margin:8px 0;font-size:12px}
.bub td,.bub th{padding:5px 8px;border:1px solid var(--border)}
.bub th{background:var(--bg3);color:var(--acc)}
.ok{color:var(--green)}.warn{color:var(--yellow)}.err{color:var(--red)}.info{color:var(--blue)}.acc{color:var(--acc)}
#sug{display:flex;gap:6px;padding:8px 16px;overflow-x:auto;flex-shrink:0}
#sug::-webkit-scrollbar{display:none}
.s{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:6px 12px;border-radius:16px;font-size:12px;font-family:'Courier New',monospace;cursor:pointer;white-space:nowrap;transition:.2s;flex-shrink:0}
.s:hover{border-color:var(--acc);color:var(--acc)}
#ia{background:var(--bg2);border-top:1px solid var(--border);padding:12px 16px;display:flex;gap:10px;align-items:flex-end;flex-shrink:0}
#inp{flex:1;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:20px;font-family:'Courier New',monospace;font-size:13px;resize:none;max-height:100px;outline:none}
#inp:focus{border-color:var(--acc)}
#send{background:var(--acc);border:none;color:#fff;width:38px;height:38px;border-radius:50%;cursor:pointer;font-size:16px;flex-shrink:0;transition:.2s}
#send:hover{background:#cc4400}
.typing{display:flex;gap:4px;padding:4px 0}
.typing span{width:6px;height:6px;background:var(--muted);border-radius:50%;animation:b .8s infinite}
.typing span:nth-child(2){animation-delay:.15s}
.typing span:nth-child(3){animation-delay:.3s}
@keyframes b{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
a{color:var(--acc)}
</style>
</head>
<body>
<header>
  <div class="bi">
    <div class="ba">🤖</div>
    <div><div class="bn">INGENIERO FAROL</div><div class="bs">Asistente técnico · El Farol al Día</div></div>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <div class="dot"></div>
    <span style="font-size:11px;color:var(--muted)">En línea</span>
  </div>
</header>

<div id="chat"></div>

<div id="sug">
  <button class="s" onclick="env('¿Cómo está el sistema?')">📊 Estado</button>
  <button class="s" onclick="env('¿Qué problemas hay?')">🩺 Diagnóstico</button>
  <button class="s" onclick="env('Cuántas noticias hay publicadas')">📰 Noticias</button>
  <button class="s" onclick="env('Procesa el RSS ahora mismo')">📡 Procesar RSS</button>
  <button class="s" onclick="env('Regenera las fotos feas')">🖼️ Fotos</button>
  <button class="s" onclick="env('Genera una noticia de Nacionales')">✍️ Generar</button>
  <button class="s" onclick="env('Muéstrame las estadísticas de esta semana')">📈 Estadísticas</button>
  <button class="s" onclick="env('Qué aprendió el sistema')">🧠 Aprendizaje</button>
  <button class="s" onclick="env('Ayuda')">❓ Ayuda</button>
</div>

<div id="ia">
  <textarea id="inp" placeholder="Pregúntame algo del servidor..." rows="1"
    onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();si()}"></textarea>
  <button id="send" onclick="si()">➤</button>
</div>

<script>
const PIN='311', AUTH='Basic '+btoa('director:311');
let busy=false;

async function api(url,method='GET',body=null){
  try{
    const o={method,headers:{'Content-Type':'application/json',Authorization:AUTH}};
    if(body)o.body=JSON.stringify(body);
    return await(await fetch(url,o)).json();
  }catch(e){return{error:e.message}}
}

function ta(f){
  const m=Math.round((Date.now()-new Date(f))/60000);
  if(m<1)return'ahora';if(m<60)return`${m}min`;return`${Math.round(m/60)}h`;
}
function fmt(n){return n>999?(n/1000).toFixed(1)+'k':n}

function addMsg(html,role='bot'){
  const c=document.getElementById('chat');
  const d=document.createElement('div');
  d.className=`msg ${role}`;
  d.innerHTML=`<div class="av">${role==='bot'?'🤖':'👤'}</div><div class="bub">${html}</div>`;
  c.appendChild(d);c.scrollTop=c.scrollHeight;return d;
}
function showT(){
  const c=document.getElementById('chat');
  const d=document.createElement('div');
  d.className='msg bot';d.id='typ';
  d.innerHTML=`<div class="av">🤖</div><div class="bub"><div class="typing"><span></span><span></span><span></span></div></div>`;
  c.appendChild(d);c.scrollTop=c.scrollHeight;
}
function hideT(){document.getElementById('typ')?.remove()}

async function proc(t){
  const q=t.toLowerCase();

  // ESTADO
  if(/estado|cómo está|como esta|status|todo bien|funciona/.test(q)){
    const d=await api('/status');
    if(d.error)return`<span class="err">❌ Servidor no responde: ${d.error}</span>`;
    const s=d.salud||{};
    const ok=s.errores_gemini<3&&s.min_sin_publicar<90;
    return`<span class="${ok?'ok':'warn'}">${ok?'✅ Sistema operando bien':'⚠️ Sistema con alertas'}</span>

<table><tr><th>Indicador</th><th>Estado</th></tr>
<tr><td>Versión</td><td><span class="acc">V${d.version}</span></td></tr>
<tr><td>Noticias</td><td><span class="ok">${d.noticias}</span></td></tr>
<tr><td>Gemini Keys</td><td><span class="ok">${d.gemini_keys} activas</span></td></tr>
<tr><td>Sin publicar</td><td><span class="${s.min_sin_publicar>90?'warn':'ok'}">${s.min_sin_publicar||0} min</span></td></tr>
<tr><td>Watermark</td><td><span class="${d.marca_de_agua?.includes('Activa')?'ok':'err'}">${d.marca_de_agua?.includes('Activa')?'✅ Activa':'❌ Falta'}</span></td></tr>
<tr><td>Google CSE</td><td><span class="${d.google_cse==='Activo'?'ok':'warn'}">${d.google_cse==='Activo'?'✅ Activo':'⏳ Sin configurar'}</span></td></tr>
<tr><td>IA</td><td><span class="${d.ia_activa?'ok':'err'}">${d.ia_activa?'✅ Activa':'❌ Desactivada'}</span></td></tr>
<tr><td>Errores Gemini</td><td><span class="${s.errores_gemini>0?'warn':'ok'}">${s.errores_gemini||0}</span></td></tr>
<tr><td>RSS vacíos</td><td><span class="${s.ciclos_rss_vacios>3?'warn':'ok'}">${s.ciclos_rss_vacios||0} ciclos</span></td></tr>
</table>`;
  }

  // DIAGNÓSTICO
  if(/problema|diagnós|diagnostico|salud|falla|error/.test(q)){
    const d=await api('/status');
    const s=d.salud||{};
    const ps=[];const ok=[];
    if(s.errores_gemini>=3)ps.push(`Gemini con ${s.errores_gemini} errores seguidos`);
    else ok.push('Gemini sin errores');
    if(s.min_sin_publicar>90)ps.push(`Sin publicar hace ${s.min_sin_publicar} minutos`);
    else ok.push('Publicando con normalidad');
    if(s.ciclos_rss_vacios>=5)ps.push(`RSS vacío ${s.ciclos_rss_vacios} ciclos consecutivos`);
    else ok.push('RSS recibiendo noticias');
    if(s.errores_imagen>=5)ps.push(`${s.errores_imagen} fallos descargando imágenes`);
    else ok.push('Imágenes descargando bien');
    let h='';
    if(ps.length){
      h+=`<span class="warn">⚠️ ${ps.length} problema(s) detectado(s):\n</span>`;
      ps.forEach(p=>h+=`<span class="err">→ ${p}\n</span>`);
      h+=`\n<span class="info">El ingeniero interno los está resolviendo automáticamente.</span>`;
    }else{
      h+=`<span class="ok">✅ Todo funcionando perfectamente.\n\n</span>`;
      ok.forEach(o=>h+=`<span class="ok">✓</span> ${o}\n`);
    }
    return h;
  }

  // NOTICIAS
  if(/noticia|publicad|últimas|ultimas|cuántas|cuantas/.test(q)){
    const[e,n]=await Promise.all([api('/api/estadisticas'),api('/api/noticias')]);
    if(!n.noticias)return'<span class="err">❌ No pude obtener las noticias</span>';
    let h=`<span class="ok">📰 ${e.totalNoticias} noticias · ${fmt(e.totalVistas)} vistas</span>\n\n`;
    h+='<span class="acc">Últimas publicadas:</span>\n\n';
    n.noticias.slice(0,6).forEach((x,i)=>{
      h+=`<b>${i+1}.</b> ${x.titulo.substring(0,55)}\n`;
      h+=`   <span style="color:var(--muted);font-size:11px">${x.seccion} · ${ta(x.fecha)} · ${x.vistas} vistas</span>\n\n`;
    });
    return h;
  }

  // RSS
  if(/rss|procesa|busca noticia|publicar ahora/.test(q)){
    const r=await api('/api/procesar-rss','POST',{pin:PIN});
    return r.success
      ?'<span class="ok">✅ RSS procesándose en background.</span>\nNuevas noticias en 2-3 minutos.'
      :`<span class="err">❌ ${r.error}</span>`;
  }

  // FOTOS
  if(/foto|imagen|regenera|pixelad|fea/.test(q)){
    const r=await api('/api/regenerar-fotos','POST',{pin:PIN});
    return r.success
      ?'<span class="ok">✅ Regeneración iniciada.</span>\n3 fotos cada 8 segundos gradualmente.'
      :`<span class="warn">${r.mensaje||r.error}</span>`;
  }

  // GENERAR NOTICIA
  if(/genera|escribe|publica una/.test(q)){
    const cats=['Nacionales','Deportes','Internacionales','Economia','Tecnologia','Espectaculos'];
    let cat='Nacionales';
    for(const c of cats){if(q.includes(c.toLowerCase())){cat=c;break}}
    addMsg(`<span class="info">⏳ Generando noticia de ${cat}...</span>`);
    const r=await api('/api/generar-noticia','POST',{categoria:cat});
    return r.success
      ?`<span class="ok">✅ Publicada: "${r.titulo}"</span>\n\n<a href="/noticia/${r.slug}" target="_blank">→ Ver noticia</a>`
      :`<span class="err">❌ ${r.error}</span>`;
  }

  // ESTADÍSTICAS
  if(/estadística|estadistica|vista|tráfico|trafico|semana|rendimiento/.test(q)){
    const[r,c]=await Promise.all([api('/api/estadisticas'),api('/api/coach?dias=7')]);
    let h=`<span class="ok">📊 Últimos 7 días</span>\n\nNoticias: <span class="acc">${r.totalNoticias}</span>\nVistas:   <span class="acc">${fmt(r.totalVistas)}</span>\n\n`;
    if(c.categorias){
      h+='<b>Por categoría:</b>\n';
      Object.entries(c.categorias).sort((a,b)=>b[1].vistas_totales-a[1].vistas_totales)
        .forEach(([cat,d])=>{if(d.total>0)h+=`  ${cat}: ${d.total} noticias · <span class="ok">${d.vistas_totales} vistas</span>\n`});
    }
    return h;
  }

  // APRENDIZAJE
  if(/aprend|sabe|inteligencia|memoria/.test(q)){
    const r=await api('/api/memoria?pin=311');
    if(!r.registros)return'<span class="warn">Sin datos de aprendizaje aún. Vuelve mañana.</span>';
    const ps=r.registros.filter(x=>x.tipo==='palabra_trending'||x.tipo==='palabra_publicada').slice(0,10);
    const cs=r.registros.filter(x=>x.tipo==='rendimiento_categoria').slice(0,6);
    let h='<span class="acc">🧠 Aprendizaje acumulado:\n\n</span>';
    if(ps.length){h+='<b>Palabras que generan tráfico:</b>\n';ps.forEach(p=>h+=`  <span class="ok">+</span> ${p.valor} (${p.exitos} éxitos)\n`);h+='\n';}
    if(cs.length){h+='<b>Rendimiento por categoría:</b>\n';cs.forEach(c=>h+=`  ${c.categoria}: <span class="ok">${c.exitos} éxitos</span>\n`);}
    if(!ps.length&&!cs.length)h+='<span class="warn">El sistema está recopilando datos. Pronto habrá resultados.</span>';
    return h;
  }

  // AYUDA / HOLA
  if(/ayuda|qué puedes|que puedes|hola|buenas|comando/.test(q)){
    return`<span class="acc">👋 Soy el Ingeniero de El Farol al Día.</span>

Puedo ayudarte con todo esto:

<span class="ok">📊 Monitoreo</span>
  "¿Cómo está el sistema?"
  "¿Qué problemas hay?"
  "Muéstrame las estadísticas"

<span class="ok">📰 Contenido</span>
  "¿Cuántas noticias hay?"
  "Genera una noticia de Economía"
  "Procesa el RSS ahora"

<span class="ok">🖼️ Imágenes</span>
  "Regenera las fotos feas"

<span class="ok">🧠 Inteligencia</span>
  "¿Qué aprendió el sistema?"
  "¿Qué categoría funciona mejor?"

Habla en español natural. 🏮`;
  }

  // RESPUESTA GENÉRICA
  return`<span class="warn">No entendí exactamente eso.</span>

Intenta preguntar sobre:
• Estado del sistema
• Noticias publicadas
• Procesar RSS
• Regenerar fotos
• Estadísticas
• Aprendizaje

¿Qué necesitas?`;
}

async function env(t){
  if(busy||!t.trim())return;busy=true;
  addMsg(t,'user');
  const i=document.getElementById('inp');
  i.value='';i.style.height='auto';
  showT();
  await new Promise(r=>setTimeout(r,500));
  hideT();
  try{addMsg(await proc(t),'bot')}catch(e){addMsg(`<span class="err">❌ ${e.message}</span>`,'bot')}
  busy=false;
}

function si(){const v=document.getElementById('inp').value.trim();if(v)env(v)}

document.getElementById('inp').addEventListener('input',function(){
  this.style.height='auto';this.style.height=Math.min(this.scrollHeight,100)+'px';
});

window.addEventListener('load',()=>{
  setTimeout(()=>addMsg(`<span class="acc">🤖 Ingeniero en línea.</span>

Sistema monitoreado. Soy tu asistente técnico de El Farol al Día.

Habla conmigo en español normal — pregúntame lo que necesites sobre el servidor. 🏮`,'bot'),300);
});
</script>
</body>
</html>
