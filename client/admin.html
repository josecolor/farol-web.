<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redacción Oficial | Farol</title>
    <style>
        :root { --naranja: #FF8C00; --negro: #000; }
        body { background: var(--negro); color: white; font-family: sans-serif; padding: 15px; margin: 0; }
        .container { max-width: 500px; margin: auto; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .file-label { display: block; background: #333; padding: 15px; text-align: center; border-radius: 8px; border: 1px dashed var(--naranja); cursor: pointer; margin: 10px 0; }
        .pin-field { border: 2px solid var(--naranja) !important; text-align: center; font-weight: bold; font-size: 20px; }
        button { width: 100%; padding: 18px; background: var(--naranja); border: none; font-weight: bold; border-radius: 10px; cursor: pointer; font-size: 1.1em; color: black; margin-top: 10px; }
        button:disabled { background: #555; cursor: not-allowed; }
        #preview { width: 100%; border-radius: 8px; display: none; margin-bottom: 10px; border: 1px solid var(--naranja); }
        .loading { display: none; text-align: center; color: var(--naranja); font-weight: bold; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="color: var(--naranja); text-align: center;">🏮 REDACCIÓN</h1>
        
        <label>Título de la Noticia</label>
        <input type="text" id="title" placeholder="¿Qué pasó?">

        <label>Nombre del Periodista</label>
        <input type="text" id="reporter" placeholder="¿Quién escribe?">

        <label>Palabra Clave (Ubicación)</label>
        <input type="text" id="location" placeholder="Ej: Herrera, SDE">
        
        <label>Foto de la Noticia</label>
        <label class="file-label" for="imageInput" id="labelFoto">📸 TOCAR PARA SUBIR FOTO</label>
        <input type="file" id="imageInput" accept="image/*" style="display:none" onchange="processImg(this)">
        <img id="preview">
        
        <label>Cuerpo de la Noticia</label>
        <textarea id="content" rows="6" placeholder="Escriba el reporte detallado..."></textarea>
        
        <label>PIN de Seguridad</label>
        <input type="password" id="pin" class="pin-field" placeholder="****">
        
        <div id="loader" class="loading">PROCESANDO ENVÍO... ESPERE ⏳</div>
        <button id="btnPublicar" onclick="publish()">PUBLICAR AHORA 🔥</button>
    </div>

    <script>
        let base64Image = "";

        // FUNCIÓN CLAVE: Comprime la foto antes de enviarla
        function processImg(input) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = function (event) {
                const img = new Image();
                img.src = event.target.result;
                img.onload = function () {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    
                    // Redimensionamos a un tamaño máximo de 800px para ahorrar memoria
                    const maxWidth = 800;
                    const scale = maxWidth / img.width;
                    canvas.width = maxWidth;
                    canvas.height = img.height * scale;

                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    
                    // Convertimos a JPG con calidad media (0.7) para que pese poquísimo
                    base64Image = canvas.toDataURL('image/jpeg', 0.7);
                    
                    const preview = document.getElementById('preview');
                    preview.src = base64Image;
                    preview.style.display = "block";
                    document.getElementById('labelFoto').innerText = "✅ FOTO LISTA";
                }
            }
        }

        async function publish() {
            const userPin = document.getElementById('pin').value;
            if(userPin !== "311") return alert("PIN INCORRECTO");

            const btn = document.getElementById('btnPublicar');
            const loader = document.getElementById('loader');

            const body = {
                titulo: document.getElementById('title').value,
                redactor: document.getElementById('reporter').value,
                ubicacion: document.getElementById('location').value,
                contenido: document.getElementById('content').value,
                imagen: base64Image,
                pin: userPin
            };

            if(!body.titulo || !body.contenido || !body.redactor || !body.imagen) {
                return alert("Falta información o la foto.");
            }

            // Bloqueamos botón para evitar doble envío
            btn.disabled = true;
            loader.style.display = "block";

            try {
                const res = await fetch('/publicar', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(body)
                });

                if(res.ok) {
                    alert("¡PUBLICADO CON ÉXITO! 🔥");
                    location.reload();
                } else {
                    alert("Error en el servidor. Quizás Railway está saturado.");
                }
            } catch (error) {
                alert("Error de conexión. Revisa tu internet.");
            } finally {
                btn.disabled = false;
                loader.style.display = "none";
            }
        }
    </script>
</body>
</html>
