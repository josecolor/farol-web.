<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Redacción | Farol</title>
    <style>
        :root { --naranja: #FF8C00; --negro: #000; }
        body { background: var(--negro); color: white; font-family: sans-serif; padding: 20px; margin: 0; }
        .container { max-width: 500px; margin: auto; }
        input, textarea { width: 100%; padding: 15px; margin: 10px 0; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .pin-field { border: 2px solid var(--naranja) !important; text-align: center; font-weight: bold; }
        button { width: 100%; padding: 20px; background: var(--naranja); border: none; font-weight: bold; border-radius: 10px; cursor: pointer; font-size: 1.1em; color: black; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="color: var(--naranja); text-align: center;">🏮 REDACCIÓN</h1>
        <label>Título</label>
        <input type="text" id="title" placeholder="Título de la noticia">
        <label>Ubicación</label>
        <input type="text" id="loc" placeholder="Ej: Santo Domingo">
        <label>Reporte</label>
        <textarea id="content" rows="10" placeholder="Escriba aquí la noticia..."></textarea>
        <label>PIN de Seguridad</label>
        <input type="password" id="pin" class="pin-field" placeholder="****">
        <button onclick="publish()">PUBLICAR AHORA 🔥</button>
    </div>
    <script>
        async function publish() {
            const userPin = document.getElementById('pin').value;
            if(userPin !== "311") return alert("PIN INCORRECTO");
            const body = {
                titulo: document.getElementById('title').value,
                ubicacion: document.getElementById('loc').value,
                contenido: document.getElementById('content').value,
                pin: userPin
            };
            if(!body.titulo || !body.contenido) return alert("Falta información");
            const res = await fetch('/publicar', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(body)
            });
            if(res.ok) {
                alert("¡NOTICIA PUBLICADA! 🔥");
                location.reload();
            } else {
                alert("Error en el servidor.");
            }
        }
    </script>
</body>
</html>
