<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Ajustes Móvil 🏮</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0b0b0b;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 12px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: #FF8C00;
            font-size: 2em;
            margin: 20px 0;
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .tab-btn {
            flex: 1;
            min-width: 120px;
            padding: 18px 8px;
            font-size: 1.1em;
            background: #1a1a1a;
            color: white;
            border: 2px solid #333;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
        }

        .tab-btn.active {
            background: #FF8C00;
            border-color: #FF8C00;
            color: black;
        }

        .tab-content {
            display: none;
            margin-top: 20px;
        }

        .tab-content.active {
            display: block;
        }

        .panel {
            background: #1a1a1a;
            padding: 25px 20px;
            border-radius: 40px;
            border: 2px solid #FF8C00;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 1.1em;
            color: #FF8C00;
            font-weight: bold;
            margin: 20px 0 8px;
        }

        input, textarea, select {
            width: 100%;
            padding: 18px 20px;
            font-size: 1.1em;
            border-radius: 40px;
            border: 2px solid #333;
            background: #222;
            color: white;
            -webkit-appearance: none;
        }

        textarea {
            border-radius: 25px;
            min-height: 100px;
        }

        .btn-gigante {
            width: 100%;
            padding: 22px;
            font-size: 1.3em;
            border: none;
            border-radius: 60px;
            background: linear-gradient(145deg, #4CAF50, #45a049);
            color: white;
            margin: 20px 0;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-peligro {
            background: linear-gradient(145deg, #f44336, #d32f2f);
        }

        .alert {
            padding: 18px;
            border-radius: 40px;
            margin: 15px 0;
            text-align: center;
            font-weight: bold;
            display: none;
        }

        .alert.success {
            background: rgba(76, 175, 80, 0.2);
            border: 2px solid #4CAF50;
            color: #4CAF50;
        }

        .alert.error {
            background: rgba(244, 67, 54, 0.2);
            border: 2px solid #f44336;
            color: #ff6b6b;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 20px 0;
        }

        .stat-card {
            background: #222;
            padding: 20px;
            border-radius: 30px;
            text-align: center;
            border-left: 5px solid #FF8C00;
        }

        .stat-value {
            font-size: 2.2em;
            color: #FF8C00;
            font-weight: bold;
        }

        .stat-label {
            color: #aaa;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏮 AJUSTES DEL BÚNKER</h1>

        <!-- TABS MÓVILES -->
        <div class="tabs">
            <button class="tab-btn active" onclick="cambiarTab('sitio')">📱 Sitio</button>
            <button class="tab-btn" onclick="cambiarTab('analitica')">📊 Analítica</button>
            <button class="tab-btn" onclick="cambiarTab('redes')">📱 Redes</button>
            <button class="tab-btn" onclick="cambiarTab('peligro')">⚠️ Peligro</button>
        </div>

        <!-- TAB SITIO -->
        <div id="tab-sitio" class="tab-content active">
            <div class="panel">
                <div id="alertSitio" class="alert"></div>

                <label>🏮 Nombre del Sitio</label>
                <input type="text" id="nombreSitio" placeholder="El Farol al Día">

                <label>📄 Tagline</label>
                <input type="text" id="tagline" placeholder="Diario Digital">

                <label>📧 Email Contacto</label>
                <input type="email" id="emailContacto" placeholder="contacto@ejemplo.com">

                <label>📍 Ubicación</label>
                <input type="text" id="ubicacionSitio" placeholder="República Dominicana">

                <label>📝 Descripción</label>
                <textarea id="descripcionSitio" placeholder="Descripción del sitio..."></textarea>

                <button class="btn-gigante" onclick="guardarConfig('sitio')">💾 GUARDAR SITIO</button>
            </div>
        </div>

        <!-- TAB ANALÍTICA -->
        <div id="tab-analitica" class="tab-content">
            <div class="panel">
                <div id="alertAnalitica" class="alert"></div>

                <!-- ESTADÍSTICAS -->
                <div class="stats">
                    <div class="stat-card">
                        <div class="stat-value" id="totalNoticias">0</div>
                        <div class="stat-label">Noticias</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="totalVistas">0</div>
                        <div class="stat-label">Vistas</div>
                    </div>
                </div>

                <label>🔍 Google Analytics ID</label>
                <input type="text" id="googleAnalytics" placeholder="G-XXXXXXXXXX o UA-XXXXX">
                <p style="color: #888; margin: 10px;">Se inyectará automáticamente en el sitio</p>

                <label>👁️ Mostrar contador de vistas</label>
                <select id="mostrarVistas">
                    <option value="true">Sí, mostrar 👁️ en cada noticia</option>
                    <option value="false">No ocultar</option>
                </select>

                <button class="btn-gigante" onclick="guardarConfig('analitica')">📊 GUARDAR ANALÍTICA</button>
            </div>
        </div>

        <!-- TAB REDES -->
        <div id="tab-redes" class="tab-content">
            <div class="panel">
                <div id="alertRedes" class="alert"></div>

                <label>📘 Facebook</label>
                <input type="text" id="facebook" placeholder="https://facebook.com/...">

                <label>📷 Instagram</label>
                <input type="text" id="instagram" placeholder="https://instagram.com/...">

                <label>𝕏 Twitter</label>
                <input type="text" id="twitter" placeholder="https://twitter.com/...">

                <label>💬 WhatsApp</label>
                <input type="text" id="whatsapp" placeholder="https://wa.me/1809...">

                <button class="btn-gigante" onclick="guardarConfig('redes')">📱 GUARDAR REDES</button>
            </div>
        </div>

        <!-- TAB PELIGRO -->
        <div id="tab-peligro" class="tab-content">
            <div class="panel">
                <div id="alertPeligro" class="alert"></div>

                <label>🔐 PIN Actual</label>
                <input type="password" id="pinActual" placeholder="Ingresa PIN actual" value="311">

                <label>🔐 Nuevo PIN</label>
                <input type="password" id="nuevoPin" placeholder="Nuevo PIN (opcional)">

                <button class="btn-gigante" onclick="cambiarPin()">🔄 CAMBIAR PIN</button>

                <hr style="border: 1px solid #333; margin: 30px 0;">

                <label>⚠️ RESETEAR TODO</label>
                <p style="color: #f44336; margin: 15px 0;">Esto eliminará TODAS las noticias</p>

                <button class="btn-gigante btn-peligro" onclick="resetearTodo()">🗑️ RESETEAR SISTEMA</button>
            </div>
        </div>
    </div>

    <script>
        let configActual = {};

        // ==================== TABS ====================
        function cambiarTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            event.target.classList.add('active');
        }

        // ==================== CARGAR CONFIGURACIÓN ====================
        async function cargarConfiguracion() {
            try {
                const res = await fetch('/api/configuracion');
                const data = await res.json();
                
                if (data.success) {
                    configActual = data.config;
                    
                    // Llenar campos
                    document.getElementById('nombreSitio').value = configActual.nombreSitio || 'El Farol al Día';
                    document.getElementById('tagline').value = configActual.tagline || '';
                    document.getElementById('emailContacto').value = configActual.emailContacto || '';
                    document.getElementById('ubicacionSitio').value = configActual.ubicacionSitio || '';
                    document.getElementById('descripcionSitio').value = configActual.descripcionSitio || '';
                    
                    document.getElementById('googleAnalytics').value = configActual.googleAnalytics || '';
                    document.getElementById('mostrarVistas').value = configActual.mostrarVistas ? 'true' : 'false';
                    
                    document.getElementById('facebook').value = configActual.facebook || '';
                    document.getElementById('instagram').value = configActual.instagram || '';
                    document.getElementById('twitter').value = configActual.twitter || '';
                    document.getElementById('whatsapp').value = configActual.whatsapp || '';
                }
            } catch (error) {
                console.error('Error cargando configuración');
            }
        }

        // ==================== CARGAR ESTADÍSTICAS ====================
        async function cargarEstadisticas() {
            try {
                const res = await fetch('/api/estadisticas');
                const data = await res.json();
                
                if (data.success) {
                    document.getElementById('totalNoticias').textContent = data.totalNoticias || 0;
                    document.getElementById('totalVistas').textContent = data.totalVistas || 0;
                }
            } catch (error) {
                console.error('Error cargando estadísticas');
            }
        }

        // ==================== GUARDAR CONFIGURACIÓN ====================
        async function guardarConfig(seccion) {
            const pin = document.getElementById('pinActual')?.value || '311';
            
            if (pin !== '311') {
                mostrarAlerta('❌ PIN incorrecto', 'error', seccion);
                return;
            }

            let config = {};

            if (seccion === 'sitio') {
                config = {
                    nombreSitio: document.getElementById('nombreSitio').value,
                    tagline: document.getElementById('tagline').value,
                    emailContacto: document.getElementById('emailContacto').value,
                    ubicacionSitio: document.getElementById('ubicacionSitio').value,
                    descripcionSitio: document.getElementById('descripcionSitio').value
                };
            } else if (seccion === 'analitica') {
                config = {
                    googleAnalytics: document.getElementById('googleAnalytics').value,
                    mostrarVistas: document.getElementById('mostrarVistas').value === 'true'
                };
            } else if (seccion === 'redes') {
                config = {
                    facebook: document.getElementById('facebook').value,
                    instagram: document.getElementById('instagram').value,
                    twitter: document.getElementById('twitter').value,
                    whatsapp: document.getElementById('whatsapp').value
                };
            }

            try {
                const res = await fetch('/api/configuracion', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ config, pin })
                });

                const data = await res.json();

                if (data.success) {
                    mostrarAlerta('✅ Guardado correctamente', 'success', seccion);
                } else {
                    mostrarAlerta('❌ Error: ' + data.error, 'error', seccion);
                }
            } catch (error) {
                mostrarAlerta('❌ Error de red', 'error', seccion);
            }
        }

        // ==================== CAMBIAR PIN ====================
        function cambiarPin() {
            mostrarAlerta('✅ Función disponible en versión completa', 'success', 'peligro');
        }

        // ==================== RESETEAR TODO ====================
        function resetearTodo() {
            if (!confirm('⚠️ ¿Estás SEGURO? Esto eliminará TODAS las noticias')) {
                return;
            }
            if (!confirm('🚨 CONFIRMACIÓN FINAL: No se puede deshacer')) {
                return;
            }
            
            mostrarAlerta('⏳ Función desactivada por seguridad', 'error', 'peligro');
        }

        // ==================== ALERTAS ====================
        function mostrarAlerta(mensaje, tipo, tab) {
            const alertBox = document.getElementById('alert' + tab.charAt(0).toUpperCase() + tab.slice(1));
            alertBox.textContent = mensaje;
            alertBox.className = `alert ${tipo}`;
            alertBox.style.display = 'block';
            
            setTimeout(() => {
                alertBox.style.display = 'none';
            }, 3000);
        }

        // ==================== INICIALIZAR ====================
        window.addEventListener('load', () => {
            cargarConfiguracion();
            cargarEstadisticas();
        });
    </script>
</body>
</html>
